<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI Sound Balancing Tool</title>
<style>
:root{--bg:#f8f7f4;--surface:#fff;--border:#d4d0c8;--text:#1a1a1a;--text-muted:#666;--accent:#2563eb;--accent-hover:#1d4ed8;--accent-light:#dbeafe;--danger:#dc2626;--success:#16a34a;--warning:#d97706;--font:'Segoe UI',system-ui,sans-serif;--mono:ui-monospace,'Courier New',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px}
h1{font-size:1.4em;font-weight:600;margin-bottom:4px}
.header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.subtitle{color:var(--text-muted);font-size:.9em;margin-bottom:20px}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border);flex-wrap:wrap}
.tab{padding:10px 16px;border:none;background:none;cursor:pointer;font-size:.92em;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;font-family:var(--font);transition:color .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.panel{display:none}.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card h2{font-size:1.05em;font-weight:600;margin-bottom:12px}
.card h3{font-size:.95em;font-weight:600;margin-bottom:8px;color:var(--text-muted)}
.freq-table{width:100%;border-collapse:collapse;font-size:.86em}
.freq-table th,.freq-table td{padding:4px 5px;text-align:center;border-bottom:1px solid var(--border)}
.freq-table th{background:var(--bg);font-weight:600;font-size:.8em;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted)}
.freq-table input[type="number"]{width:70px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.88em}
.freq-table select{padding:2px 3px;border:1px solid var(--border);border-radius:4px;font-size:.78em;font-family:var(--font)}
.freq-table input[type="text"]{width:100px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:.8em}
.pbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.85em;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.pbtn:hover{background:var(--accent-light);border-color:var(--accent)}
.pbtn.active{background:var(--accent-light);border-color:var(--accent)}
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-family:var(--font);font-size:.92em;transition:all .15s;min-height:40px}
.btn:hover{background:var(--bg)}.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover{background:var(--accent-hover)}
.btn-large{padding:12px 28px;font-size:1.05em;min-height:48px}.btn:disabled{opacity:.4;cursor:default}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:4px 10px;font-size:.82em;min-height:28px;border-radius:4px}
.controls-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.control-group{display:flex;align-items:center;gap:6px}
.control-group label{font-size:.85em;color:var(--text-muted);white-space:nowrap}
.control-group input[type="range"]{width:110px}
.control-group input[type="number"]{width:65px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.88em}
.control-group select{padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-family:var(--font);font-size:.88em;background:var(--surface)}
.test-display{text-align:center;padding:24px 16px}
.pair-freq{color:var(--text-muted);margin-bottom:8px}
.progress-label{color:var(--text-muted);font-size:.9em}
.judgment-buttons{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.judgment-buttons .btn{min-width:130px;font-size:1em}
.balance-slider-wrap{margin:16px auto;max-width:400px}
.balance-slider-wrap input[type="range"]{width:100%;margin:8px 0}
.balance-value{font-family:var(--mono);font-size:1.15em;font-weight:600;text-align:center}
.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:16px}
canvas{width:100%;height:auto}
.results-table{width:100%;border-collapse:collapse;font-size:.86em;font-family:var(--mono)}
.results-table th,.results-table td{padding:5px 8px;text-align:center;border-bottom:1px solid var(--border)}
.results-table th{background:var(--bg);font-family:var(--font);font-weight:600;font-size:.8em;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted)}
.kbd{display:inline-block;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:var(--bg);font-family:var(--mono);font-size:.78em;line-height:1.4}
.hidden{display:none}
.pair-indicator{display:inline-flex;gap:16px;font-size:1.5em;font-weight:700;margin:8px 0;align-items:center}
.pair-indicator .tone-a,.pair-indicator .tone-b{padding:6px 20px;border-radius:8px}
.pair-indicator .tone-a{background:#dbeafe;color:#1e40af}.pair-indicator .tone-b{background:#fef3c7;color:#92400e}
.pair-indicator .playing{outline:3px solid var(--accent);outline-offset:2px}
.warning-bar{background:#fef3c7;color:var(--warning);padding:8px 14px;border-radius:6px;margin-bottom:10px;font-size:.88em;line-height:1.5}
.round-info{background:#f0fdf4;color:var(--success);padding:8px 14px;border-radius:6px;margin-bottom:10px;font-size:.88em}
.info-box{background:var(--accent-light);color:var(--accent);padding:10px 14px;border-radius:6px;margin-bottom:10px;font-size:.85em;line-height:1.5}
.excluded-row{opacity:.4}
.aba-label{font-size:.65em;font-weight:400;color:var(--text-muted);display:block}
.timer-display{font-family:var(--mono);font-size:.85em;color:var(--text-muted)}
.el-extra{font-size:.7em;color:var(--text-muted);font-weight:400}
.lang-select{padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:.85em;background:var(--surface);font-family:var(--font)}
.explain{font-size:.82em;color:var(--text-muted);line-height:1.5;margin-top:8px;padding:10px;background:var(--bg);border-radius:6px;border-left:3px solid var(--accent)}
.explain-warn{border-left-color:var(--warning)}
.lv-grid{display:grid;grid-template-columns:auto 1fr auto auto;gap:3px 8px;align-items:center;font-size:.88em}
.lv-grid .lv-lbl{font-weight:600;white-space:nowrap;text-align:right;min-width:60px;font-size:.85em;cursor:pointer}
.lv-bar-wrap{height:18px;background:#e5e7eb;border-radius:3px;position:relative;cursor:pointer;min-width:100px}
.lv-bar{height:100%;border-radius:3px;position:absolute;top:0}
.lv-bar.pos{background:#2563eb;left:50%}.lv-bar.neg{background:#dc2626;right:50%}
.lv-grid .lv-val{font-family:var(--mono);font-size:.88em;min-width:55px;text-align:right}
.lv-row{display:contents;cursor:pointer}.lv-row.lv-focus .lv-lbl{color:var(--accent)}.lv-row.lv-focus .lv-bar-wrap{outline:2px solid var(--accent);outline-offset:1px;border-radius:3px}
.lv-num{width:62px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.86em}
.pr-tbl{width:100%;border-collapse:collapse;font-size:.86em}
.pr-tbl td{padding:5px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.pr-tbl td:first-child{width:28px;text-align:center}
.pr-tbl .pr-name{font-weight:600;white-space:nowrap;min-width:80px}
.pr-tbl .pr-param{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pr-tbl .pr-param label{font-size:.82em;color:var(--text-muted);white-space:nowrap}
.pr-tbl .pr-param select,.pr-tbl .pr-param input[type="number"]{padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:.86em}
.pr-tbl .pr-param select{font-family:var(--font)}
.pr-tbl .pr-param input[type="number"]{width:62px;text-align:center}
.pr-row-off{opacity:.45}
@media print{body{background:#fff}.tabs,.btn,.controls-row,.judgment-buttons,.balance-slider-wrap,.no-print{display:none!important}.panel{display:block!important}.card{border:1px solid #ccc;break-inside:avoid}}
@media(max-width:768px){.container{padding:12px}.freq-table{font-size:.76em}.freq-table input[type="number"]{width:55px}.judgment-buttons .btn{min-width:90px}.tab{padding:8px 10px;font-size:.84em}}
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>CI Sound Balancing Tool</h1>
    <div class="controls-row" style="gap:8px">
      <div class="control-group"><label id="lblSide"></label>
        <select id="ciSideSelect" class="lang-select"><option value="left">Links</option><option value="right">Rechts</option></select>
      </div>
      <select class="lang-select" id="langSelect">
        <option value="de">🇩🇪 Deutsch</option><option value="en">🇬🇧 English</option>
        <option value="fr">🇫🇷 Français</option><option value="es">🇪🇸 Español</option>
      </select>
    </div>
  </div>
  <p class="subtitle" id="subtitleText"></p>

  <div class="tabs">
    <button class="tab active" data-tab="intro" id="tabIntro"></button>
    <button class="tab" data-tab="setup" id="tabSetup"></button>
    <button class="tab" data-tab="test" id="tabTest"></button>
    <button class="tab" data-tab="results" id="tabResults"></button>
    <button class="tab" data-tab="levels" id="tabLevels"></button>
    <button class="tab" data-tab="player" id="tabPlayer"></button>
    <button class="tab" data-tab="balance" id="tabBalance"></button>
    <button class="tab" data-tab="file" id="tabFile"></button>
  </div>

  <div id="panel-intro" class="panel active"><div class="card"><h2 data-t="introTitle"></h2><p style="font-size:.88em;color:var(--text-muted);margin-bottom:14px" data-t="introDesc"></p><h3 data-t="introWhat"></h3><div style="font-size:.86em;color:var(--text-muted);margin-bottom:14px" data-t="introFlowDesc"></div><div class="explain explain-warn" data-t="introWarn"></div><h3 style="margin-top:14px" data-t="introAudio"></h3><p style="font-size:.86em;color:var(--text-muted)" data-t="introAudioDesc"></p></div></div>

  <div id="panel-setup" class="panel"><div class="card"><h2 id="freqTitle"></h2><p style="font-size:.84em;color:var(--text-muted);margin-bottom:12px" id="freqHint"></p><div class="controls-row"><div class="control-group"><label id="lblMfr"></label><select id="mfrSelect"></select></div></div><div style="overflow-x:auto"><table class="freq-table" id="freqTable"><thead><tr id="freqTH"></tr></thead><tbody id="freqTB"></tbody></table></div><div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><button class="btn" id="resetBtn"></button><button class="btn" id="sweepBtn"></button><button class="btn" id="stopBtn"></button><label style="margin-left:12px;font-size:.85em;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="corrToggle" checked> <span id="lblCorr"></span></label></div></div><div class="card"><h2 id="toneTitle"></h2><div class="controls-row"><div class="control-group"><label id="lblVol"></label><input type="number" class="vol-num" id="vol1" value="50" min="0" max="100" step="1" style="width:55px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono)"></div><div class="control-group"><label id="lblDur"></label><input type="number" id="dur1" value="1000" min="100" max="3000" step="50"> ms</div><div class="control-group"><label id="lblPau"></label><input type="number" id="pau1" value="500" min="100" max="1000" step="50"> ms</div></div></div></div>

  <div id="panel-test" class="panel"><div class="card no-print"><h2 id="testTitle"></h2><div class="controls-row"><div class="control-group"><label id="lblMode"></label><select id="testMode"><option value="balance" id="optBal"></option><option value="judgment" id="optJdg"></option></select></div><div class="control-group"><label id="lblRun"></label><select id="pairType"><option value="full" id="optFull"></option><option value="conv_fast" id="optCF"></option><option value="manual" id="optMan"></option></select></div></div><div id="runExplain" class="info-box"></div><div class="controls-row"><div class="control-group"><label id="lblRef"></label><select id="refEl"></select></div></div><div class="controls-row"><div class="control-group"><label id="lblVol2"></label><input type="number" class="vol-num" id="vol2" value="50" min="0" max="100" step="1" style="width:55px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono)"></div><div class="control-group"><label id="lblDur2"></label><input type="number" id="dur2" value="1000" min="100" max="3000" step="50"> ms</div><div class="control-group"><label id="lblPau2"></label><input type="number" id="pau2" value="500" min="100" max="1000" step="50"> ms</div></div><div class="controls-row"><label style="font-size:.85em;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="preCorrect"> <span data-t="preCorrectLabel"></span></label></div><div id="manualSel" class="hidden" style="margin-top:8px"><div class="control-group"><label>A:</label><select id="manA"></select><label style="margin-left:10px">B:</label><select id="manB"></select><button class="btn" id="manPlayBtn" style="margin-left:10px">▶</button></div></div><div style="margin-top:12px" class="btn-group"><button class="btn btn-primary btn-large" id="startBtn"></button><button class="btn btn-large" id="stopTBtn" disabled></button></div></div><div class="card" id="testArea" style="display:none"><div id="roundInfo" class="round-info hidden"></div><div class="test-display"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="progress-label" id="progLbl"></span><span class="timer-display" id="timerD">0:00</span></div><div style="display:flex;justify-content:center;margin-bottom:4px"><button class="btn btn-sm" id="swapBtn" style="font-size:.85em;padding:3px 14px;min-height:28px;border-radius:4px">⇄ A↔B</button></div><div class="pair-indicator"><span class="tone-a" id="tAL"><span class="aba-label">A (Ref)</span>E1</span><span style="align-self:center;font-weight:400;font-size:.55em;color:var(--text-muted)">vs.</span><span class="tone-b" id="tBL"><span class="aba-label">B (Slider)</span>E2</span></div><div class="pair-freq" id="pairF"></div><div style="margin:12px 0;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;align-items:center"><button class="btn btn-large" id="undoBtn" disabled>◄ <span data-t="bBack"></span> <span class="kbd">Z</span></button><button class="btn btn-large" id="repBtn">▶ <span data-t="bReplay"></span> <span class="kbd" data-t="kSpace"></span></button><select id="paraI" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:.84em"><option value="aba">ABA</option><option value="ab">AB</option></select><button class="btn" id="exclBtn" style="color:var(--danger)">✕ <span data-t="bExcl"></span> <span class="kbd">X</span></button></div><div id="jdgC" style="display:none"><div class="judgment-buttons"><button class="btn btn-large" id="bAL">A <span data-t="bLoud"></span> <span class="kbd">1</span></button><button class="btn btn-large" id="bEq"><span data-t="bEqual"></span> <span class="kbd">2</span></button><button class="btn btn-large" id="bBL">B <span data-t="bLoud2"></span> <span class="kbd">3</span></button></div></div><div id="balC"><div class="balance-slider-wrap"><p style="font-size:.84em;color:var(--text-muted);margin-bottom:3px" data-t="slHint"></p><input type="range" id="balSl" min="-20" max="20" step="0.1" value="0"><div class="balance-value" id="balV">0.0 dB</div><div id="balAbs" style="font-size:.82em;color:var(--text-muted);text-align:center;margin-top:2px;display:none"></div><div id="extWrap" style="text-align:center;margin-top:5px;display:none"><button class="btn btn-sm" id="extBtn" data-t="bExtend"></button></div></div><div style="margin-top:10px"><button class="btn btn-primary btn-large" id="confBtn"><span data-t="bConf"></span> <span class="kbd" data-t="kEnter"></span></button></div></div></div></div><div id="exclDlg" class="card hidden" style="text-align:center"><h2 data-t="exclTitle"></h2><p id="exclInfo" style="color:var(--text-muted);margin-bottom:14px"></p><div class="btn-group" style="justify-content:center"><button class="btn btn-large" id="exclA"></button><button class="btn btn-large" id="exclB"></button><button class="btn" id="exclCanc" data-t="bCanc"></button></div></div></div>

  <div id="panel-balance" class="panel"><div class="card"><h2 data-t="balTitle"></h2><p style="font-size:.84em;color:var(--text-muted);margin-bottom:14px" data-t="balDesc"></p><div class="control-group" style="margin-bottom:14px"><label data-t="balLabel"></label><input type="range" id="balBalance" min="-12" max="12" step="0.1" value="0" style="width:100%;margin-left:8px"></div><div class="balance-value" id="balValue">0.0 dB</div></div></div>

  <div id="panel-results" class="panel"><div class="card"><h2 id="resTitle"></h2><div id="noRes"><p style="color:var(--text-muted)" data-t="noRes"></p></div><div id="resC" style="display:none"><div id="reliabilityText" style="margin-bottom:14px;padding:12px 16px;background:var(--accent-light);border-radius:8px;border-left:3px solid var(--accent);font-size:.88em;line-height:1.6"></div><p style="font-size:.84em;color:var(--text-muted);margin-bottom:10px" id="resMeta"></p><div class="chart-container"><canvas id="resChart" width="800" height="320"></canvas><p id="chartExpl" style="font-size:.82em;color:var(--text-muted);margin-top:10px;line-height:1.5"></p></div><div style="overflow-x:auto;margin-top:14px"><table class="results-table" id="resT"><thead><tr id="resTH"></tr></thead><tbody id="resTB"></tbody></table></div><div style="margin-top:16px"><button class="btn" id="fClearBtn" style="color:var(--danger)">🗑 <span data-t="fClear"></span></button></div><div style="margin-top:24px;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:8px"><h3 id="glossTitleEl" style="font-size:.95em;font-weight:600;margin-bottom:12px;color:var(--text-muted)"></h3><div style="font-size:.84em;line-height:1.7;display:flex;flex-direction:column;gap:8px"><div id="glossResiduumEl"></div><div id="glossErrBarEl"></div><div id="glossAnpassungEl"></div><div id="glossFarbeEl"></div><div id="glossRefEl"></div><div id="glossLSEl"></div></div></div></div></div></div>
