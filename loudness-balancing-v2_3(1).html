function drawLvChart(){
  const cv=document.getElementById('lvChartCv');if(!cv)return;
  const wp=cv.parentElement,dpr=window.devicePixelRatio||1,W=wp.clientWidth,H=wp.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const showMeas=document.getElementById('lvChkMeas').checked;
  const showMan=document.getElementById('lvChkMan').checked;
  const showPre=document.getElementById('lvChkPre').checked;
  const act=allEl();if(!act.length)return;
  const{levels}=compWLS();const pc=getTotalPresetCurve();
  const measV=act.map(i=>{const hd=bRes.some(r=>(r.a===i||r.b===i));return hd?levels[i]:0;});
  const manV=act.map(i=>manualLevels[i]);
  const preV=act.map(i=>pc[i]);
  const sumV=act.map((_,j)=>(showMeas?measV[j]:0)+(showMan?manV[j]:0)+(showPre?preV[j]:0));
  const yMx=20;
  const pad={left:42,right:16,top:16,bottom:32},pW=W-pad.left-pad.right,pH=H-pad.top-pad.bottom;
  const zY=pad.top+pH/2;const xS=pW/(act.length-1||1);
  const tX=j=>pad.left+j*xS;const tY=v=>pad.top+(yMx-v)*(pH/(2*yMx));
  ctx.strokeStyle='#e5e5e5';ctx.lineWidth=1;
  for(let s=-4;s<=4;s++){const v=s*5,y=tY(v);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
    ctx.fillStyle='#999';ctx.font='9px Consolas,monospace';ctx.textAlign='right';ctx.fillText((v>=0?'+':'')+v,pad.left-4,y+3);}
  ctx.strokeStyle='#aaa';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(pad.left,zY);ctx.lineTo(W-pad.right,zY);ctx.stroke();ctx.setLineDash([]);
  function drawLine(vals,color,width,dash){if(!vals.some(v=>v!==0)&&width<2.5)return;
    ctx.strokeStyle=color;ctx.lineWidth=width;if(dash)ctx.setLineDash(dash);ctx.beginPath();
    for(let j=0;j<act.length;j++){if(j===0)ctx.moveTo(tX(j),tY(vals[j]));else ctx.lineTo(tX(j),tY(vals[j]));}
    ctx.stroke();if(dash)ctx.setLineDash([]);
    for(let j=0;j<act.length;j++){ctx.beginPath();ctx.arc(tX(j),tY(vals[j]),width<2.5?2.5:3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();}}
  if(showMeas)drawLine(measV,'#2563eb',1.5,[4,3]);
  if(showMan)drawLine(manV,'#16a34a',1.5,[4,3]);
  if(showPre)drawLine(preV,'#d97706',1.5,[4,3]);
  drawLine(sumV,'#1a1a1a',2.5,null);
  for(let j=0;j<act.length;j++){ctx.fillStyle=act[j]===refEl?'#2563eb':'#555';ctx.font='9px Segoe UI,sans-serif';ctx.textAlign='center';
    ctx.fillText('E'+dEN(act[j]),tX(j),H-pad.bottom+12);ctx.font='7px Consolas,monospace';ctx.fillStyle='#999';
    ctx.fillText(freqs[act[j]]>=1000?(freqs[act[j]]/1000).toFixed(1)+'k':freqs[act[j]],tX(j),H-pad.bottom+22);}}

function createMonoBuffer(buf){const c=gPC();if(buf.numberOfChannels===1)return buf;const m=c.createBuffer(1,buf.length,buf.sampleRate);const md=m.getChannelData(0);for(let s=0;s<buf.length;s++){let sum=0;for(let ch=0;ch<buf.numberOfChannels;ch++)sum+=buf.getChannelData(ch)[s];md[s]=sum/buf.numberOfChannels;}return m;}
function getPlaybackBuffer(){const mode=getPlayerSide();if(mode==='both'&&pSourceBuf&&pSourceBuf.numberOfChannels>1)return pSourceBuf;return pMonoBuf||pSourceBuf;}
function computeGains(){const src=document.getElementById('plSrc').value;const{levels}=compWLS();const eff=getEffectiveLevels();const g=new Array(nEl).fill(0);for(let i=0;i<nEl;i++){const hd=bRes.some(r=>(r.a===i||r.b===i)&&elSt[r.a]!=='excluded'&&elSt[r.a]!=='mute'&&elSt[r.b]!=='excluded'&&elSt[r.b]!=='mute');if(src==='measured')g[i]=hd?levels[i]:0;else if(src==='levels')g[i]=-eff[i];else g[i]=(hd?levels[i]:0)+(-eff[i]);}return g;}
function getPlayerGains(){const mode=getPlayerSide();if(mode==='left')return withSide('left',computeGains);if(mode==='right')return withSide('right',computeGains);return {left:withSide('left',computeGains),right:withSide('right',computeGains)};}
function documentHasStereoAudio(){return pSourceBuf&&pSourceBuf.numberOfChannels>1;}
document.getElementById('plAudio').addEventListener('change',async function(e){const f=e.target.files[0];if(!f)return;
  try{const c=gPC(),buf=await f.arrayBuffer();pSourceBuf=await c.decodeAudioData(buf);pMonoBuf=createMonoBuffer(pSourceBuf);pBuf=getPlaybackBuffer();
    // Reset playback position for new file
    pOff=0;if(pPlaying){pPause();}
    document.getElementById('plTot').textContent=pFmt(pBuf.duration);document.getElementById('plCur').textContent='0:00';document.getElementById('plTL').value=0;
    document.getElementById('plCtrl').style.display='';
    pBuildEQ();pDrawEQ();pBuildTbl();document.getElementById('plEqViz').style.display='';
  }catch(err){alert('Error: '+err.message);}});
function pCompQ(i){let fL,fH;if(i===0){fL=freqs[0]*freqs[0]/(freqs[1]||freqs[0]);fH=freqs[1]||freqs[0];}else if(i===nEl-1){fL=freqs[i-1];fH=freqs[i]*freqs[i]/freqs[i-1];}else{fL=freqs[i-1];fH=freqs[i+1];}const bw=Math.log2(Math.sqrt(freqs[i]*fH))-Math.log2(Math.sqrt(fL*freqs[i]));return freqs[i]/(freqs[i]*(Math.pow(2,bw/2)-Math.pow(2,-bw/2)));}
function pBuildEQ(){const c=gPC();pEqF.forEach(f=>f.disconnect());pEqF=[];pEqFLeft.forEach(f=>f.disconnect());pEqFLeft=[];pEqFRight.forEach(f=>f.disconnect());pEqFRight=[];pChannelSplitter&&pChannelSplitter.disconnect();pChannelSplitter=null;pChannelMerger&&pChannelMerger.disconnect();pChannelMerger=null;pChannelLeftGain&&pChannelLeftGain.disconnect();pChannelLeftGain=null;pChannelRightGain&&pChannelRightGain.disconnect();pChannelRightGain=null;
  if(!pGain){pGain=c.createGain();pGain.gain.value=parseInt(document.getElementById('plVol').value)/100;pGain.connect(c.destination);}
  pBuf=getPlaybackBuffer();const mode=getPlayerSide();const str=parseInt(document.getElementById('plStr').value)/100;const nhSim=document.getElementById('plNHSim').checked;
  if(mode==='both'&&documentHasStereoAudio()){
    const leftGains=withSide('left',computeGains);const rightGains=withSide('right',computeGains);
    pChannelSplitter=c.createChannelSplitter(2);pChannelMerger=c.createChannelMerger(2);
    for(let i=0;i<nEl;i++){const lf=c.createBiquadFilter();lf.type='peaking';lf.frequency.value=freqs[i];lf.Q.value=pCompQ(i);lf.gain.value=0; if(plEqOn){lf.gain.value=nhSim?leftGains[i]*str:-leftGains[i]*str;}pEqFLeft.push(lf);
      const rf=c.createBiquadFilter();rf.type='peaking';rf.frequency.value=freqs[i];rf.Q.value=pCompQ(i);rf.gain.value=0; if(plEqOn){rf.gain.value=nhSim?rightGains[i]*str:-rightGains[i]*str;}pEqFRight.push(rf);}
    for(let i=0;i<pEqFLeft.length-1;i++){pEqFLeft[i].connect(pEqFLeft[i+1]);pEqFRight[i].connect(pEqFRight[i+1]);}
    pChannelSplitter.connect(pEqFLeft[0],0);pChannelSplitter.connect(pEqFRight[0],1);
    pChannelLeftGain=c.createGain();pChannelRightGain=c.createGain();
    const balance=getPlayerBalance();pChannelLeftGain.gain.value=dB2G(balance);pChannelRightGain.gain.value=dB2G(-balance);
    pEqFLeft[pEqFLeft.length-1].connect(pChannelLeftGain);pEqFRight[pEqFRight.length-1].connect(pChannelRightGain);
    pChannelLeftGain.connect(pChannelMerger,0,0);pChannelRightGain.connect(pChannelMerger,0,1);pEqF.push(pChannelMerger);
  } else {
    const gains=(mode==='left'||mode==='right')?withSide(mode,computeGains):withSide('left',computeGains);
    for(let i=0;i<nEl;i++){const f=c.createBiquadFilter();f.type='peaking';f.frequency.value=freqs[i];f.Q.value=pCompQ(i);f.gain.value=0; if(plEqOn){f.gain.value=nhSim?gains[i]*str:-gains[i]*str;}pEqF.push(f);}
    for(let i=0;i<pEqF.length-1;i++)pEqF[i].connect(pEqF[i+1]);
  }
  pBuildMapNode();}
function pBuildMapNode(){const c=gPC();if(pMapNode){pMapNode.disconnect();pMapNode=null;}
  if(!document.getElementById('plMapOn').checked)return;
  const cv=parseInt(document.getElementById('plMaplaw').value)||500;if(cv<=0)return;
  const ws=c.createWaveShaper();const n=4096,curve=new Float32Array(n);
  for(let i=0;i<n;i++){const x=(i/(n-1))*2-1;const xn=(x+1)/2;const yn=Math.log(1+cv*xn)/Math.log(1+cv);curve[i]=yn*2-1;}
  ws.curve=curve;ws.oversample='4x';pMapNode=ws;}
function pUpdEQ(){const gains=getPlayerGains();const str=parseInt(document.getElementById('plStr').value)/100;const nhSim=document.getElementById('plNHSim').checked;
  if(typeof gains.left!=='undefined'){for(let i=0;i<pEqFLeft.length;i++){pEqFLeft[i].gain.value=plEqOn?(nhSim?gains.left[i]*str:-gains.left[i]*str):0;}for(let i=0;i<pEqFRight.length;i++){pEqFRight[i].gain.value=plEqOn?(nhSim?gains.right[i]*str:-gains.right[i]*str):0;}if(pChannelLeftGain) pChannelLeftGain.gain.value=dB2G(getPlayerBalance());if(pChannelRightGain) pChannelRightGain.gain.value=dB2G(-getPlayerBalance());}
  else{for(let i=0;i<pEqF.length;i++){const g=gains[i]||0;if(plEqOn){pEqF[i].gain.value=nhSim?g*str:-g*str;}else{pEqF[i].gain.value=0;}}}
  pBuildMapNode();pDrawEQ();pBuildTbl();}
function pToggle(){if(!pBuf)return;if(pCtx.state==='suspended')pCtx.resume();if(pPlaying)pPause();else pPlay();}
function pPlay(){if(pSrc){try{pSrc.stop();}catch(e){}}const c=gPC();pSrc=c.createBufferSource();pSrc.buffer=pBuf;
  const mode=getPlayerSide();const stereoMode=(mode==='both'&&documentHasStereoAudio()&&pChannelSplitter);
  const firstNode=stereoMode?pChannelSplitter:(pEqF.length>0?pEqF[0]:pGain);
  const lastEq=stereoMode?pChannelMerger:(pEqF.length>0?pEqF[pEqF.length-1]:null);
  if(pMapNode){pSrc.connect(pMapNode);pMapNode.connect(firstNode);}else{pSrc.connect(firstNode);}
  if(lastEq)lastEq.connect(pGain);
  pSrc.onended=function(){if(pPlaying){pPlaying=false;pOff=0;pUpdBtn();pUpdTL();}};
  pSrc.start(0,pOff);pT0=c.currentTime-pOff;pPlaying=true;pUpdBtn();requestAnimationFrame(pTick);}
function pPause(){if(pSrc){pSrc.onended=null;try{pSrc.stop();}catch(e){}}pOff=pCtx.currentTime-pT0;if(pOff>pBuf.duration)pOff=0;pPlaying=false;pUpdBtn();}
function pStopReset(){if(pPlaying)pPause();pOff=0;pUpdBtn();pUpdTL();}
function pTick(){if(!pPlaying)return;pUpdTL();requestAnimationFrame(pTick);}
function pUpdTL(){if(!pBuf)return;const c=pPlaying?pCtx.currentTime-pT0:pOff,cl=Math.min(c,pBuf.duration);document.getElementById('plCur').textContent=pFmt(cl);document.getElementById('plTL').value=(cl/pBuf.duration)*1000;}
function pUpdBtn(){document.getElementById('plPlay').textContent=pPlaying?'\u23F8':'\u25B6';}
function pFmt(s){if(!isFinite(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
function plCheck(){const src=document.getElementById('plSrc').value;
  const hMeas=bRes.length>0;const hLv=manualLevels.some(v=>v!==0)||presets.some(p=>p.on&&p.strength!==0);
  const hasData=(src==='measured'&&hMeas)||(src==='levels'&&hLv)||(src==='both'&&(hMeas||hLv));
  document.getElementById('plNoD').classList.toggle('hidden',hasData||hMeas||hLv);
  if(pEqF.length>0)pUpdEQ();else{pDrawEQ();pBuildTbl();}
  document.getElementById('plEqViz').style.display='';
  document.getElementById('plNHInfo').classList.toggle('hidden',!document.getElementById('plNHSim').checked);}
document.getElementById('plPlay').addEventListener('click',pToggle);
document.getElementById('plStop').addEventListener('click',pStopReset);
document.getElementById('plTL').addEventListener('input',function(){if(!pBuf)return;pOff=(this.value/1000)*pBuf.duration;document.getElementById('plCur').textContent=pFmt(pOff);if(pPlaying){pPause();pPlay();}});

function pDrawEQ(){const cv=document.getElementById('plEqCv');if(!cv)return;const wp=cv.parentElement,dpr=window.devicePixelRatio||1,W=wp.clientWidth,H=wp.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  let gains=getPlayerGains();if(typeof gains.left!=='undefined'){gains=gains.left;}const str=parseInt(document.getElementById('plStr').value)/100;
  const nhSim=document.getElementById('plNHSim').checked;const allE=allEl();const act=new Set(actEl());
  let mxA=1;for(const i of allE){if(!act.has(i))continue;const g=Math.abs(gains[i])*str;if(g>mxA)mxA=g;}mxA=Math.ceil(mxA/2)*2+2;
  const pad={left:40,right:14,top:14,bottom:26},pW=W-pad.left-pad.right,pH=H-pad.top-pad.bottom,zY=pad.top+pH/2;
  const bW=Math.max(5,(pW/allE.length)*.6),gW=pW/allE.length;
  ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.setLineDash([2,4]);ctx.beginPath();ctx.moveTo(pad.left,zY);ctx.lineTo(W-pad.right,zY);ctx.stroke();
  const steps=Math.min(4,Math.floor(mxA/2));
  for(let s=1;s<=steps;s++){const dB=s*(mxA/steps),yO=(dB/mxA)*(pH/2);ctx.beginPath();ctx.moveTo(pad.left,zY-yO);ctx.lineTo(W-pad.right,zY-yO);ctx.stroke();ctx.beginPath();ctx.moveTo(pad.left,zY+yO);ctx.lineTo(W-pad.right,zY+yO);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#999';ctx.font='9px Consolas,monospace';ctx.textAlign='right';ctx.fillText('+'+dB.toFixed(0),pad.left-4,zY-yO+3);ctx.fillText('-'+dB.toFixed(0),pad.left-4,zY+yO+3);ctx.setLineDash([2,4]);}
  ctx.setLineDash([]);ctx.fillStyle='#999';ctx.font='9px Consolas,monospace';ctx.textAlign='right';ctx.fillText('0',pad.left-4,zY+3);
  for(let j=0;j<allE.length;j++){const i=allE[j],x=pad.left+j*gW+(gW-bW)/2;
    const isAct=act.has(i);
    let ag=isAct&&plEqOn?(nhSim?gains[i]*str:-gains[i]*str):0;const bH=(Math.abs(ag)/mxA)*(pH/2),y=ag>=0?zY-bH:zY;
    if(!isAct){ctx.fillStyle='#d1d5db';ctx.fillRect(x,zY-.5,bW,1);}
    else{ctx.fillStyle=ag===0?'#ccc':ag>=0?'#16a34a':'#dc2626';if(bH>.5)ctx.fillRect(x,y,bW,bH);else{ctx.fillStyle='#ccc';ctx.fillRect(x,zY-.5,bW,1);}}
    ctx.fillStyle=isAct?'#666':'#bbb';ctx.font='8px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('E'+dEN(i),pad.left+j*gW+gW/2,H-pad.bottom+10);
    ctx.font='7px Consolas,monospace';ctx.fillStyle='#999';ctx.fillText(freqs[i]>=1000?(freqs[i]/1000).toFixed(1)+'k':freqs[i],pad.left+j*gW+gW/2,H-pad.bottom+20);}}
function pBuildTbl(){let gains=getPlayerGains();if(typeof gains.left!=='undefined'){gains=gains.left;}const str=parseInt(document.getElementById('plStr').value)/100;
  const nhSim=document.getElementById('plNHSim').checked;
  const h=document.getElementById('plEqH'),lv=document.getElementById('plEqLv'),gn=document.getElementById('plEqGn');
  h.innerHTML='<th></th>';lv.innerHTML='<td style="color:var(--text-muted);font-size:.78em">Pegel</td>';gn.innerHTML='<td style="color:var(--text-muted);font-size:.78em">Gain</td>';
  for(let i=0;i<nEl;i++){h.innerHTML+=`<th>E${dEN(i)}</th>`;
    const v=gains[i];lv.innerHTML+=`<td style="color:${v>.05?'#2563eb':v<-.05?'#dc2626':'#666'}">${v>=0?'+':''}${v.toFixed(1)}</td>`;
    const g=plEqOn?(nhSim?v*str:-v*str):0;gn.innerHTML+=`<td style="color:${g>.05?'#16a34a':g<-.05?'#dc2626':'#666'}">${g>=0?'+':''}${g.toFixed(1)}</td>`;}}
window.addEventListener('resize',()=>{if(bRes.length>0){pDrawEQ();if(document.getElementById('resC').style.display!=='none')renderResults();}
  if(document.getElementById('panel-levels').classList.contains('active'))drawLvChart();});
</script>
