<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI Loudness Balancing Tool</title>
<style>
:root {
  --bg: #f8f7f4; --surface: #fff; --border: #d4d0c8; --text: #1a1a1a;
  --text-muted: #666; --accent: #2563eb; --accent-hover: #1d4ed8;
  --accent-light: #dbeafe; --danger: #dc2626; --success: #16a34a;
  --warning: #d97706; --font: 'Segoe UI',system-ui,-apple-system,sans-serif;
  --mono: 'Consolas','Menlo',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px}
h1{font-size:1.4em;font-weight:600;margin-bottom:4px}
.header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.subtitle{color:var(--text-muted);font-size:0.9em;margin-bottom:20px}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border)}
.tab{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:0.95em;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;font-family:var(--font);transition:color .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.panel{display:none}.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card h2{font-size:1.05em;font-weight:600;margin-bottom:12px}
.freq-table{width:100%;border-collapse:collapse;font-size:.88em}
.freq-table th,.freq-table td{padding:5px 6px;text-align:center;border-bottom:1px solid var(--border)}
.freq-table th{background:var(--bg);font-weight:600;font-size:.82em;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted)}
.freq-table input[type="number"]{width:72px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.9em}
.freq-table select{padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:.8em;font-family:var(--font)}
.freq-table input[type="text"]{width:110px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;font-size:.8em}
.play-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.9em;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.play-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.btn{padding:10px 20px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-family:var(--font);font-size:.95em;transition:all .15s;min-height:44px}
.btn:hover{background:var(--bg)}.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover{background:var(--accent-hover)}
.btn-large{padding:14px 32px;font-size:1.1em;min-height:52px}.btn:disabled{opacity:.4;cursor:default}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.controls-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.control-group{display:flex;align-items:center;gap:8px}
.control-group label{font-size:.85em;color:var(--text-muted);white-space:nowrap}
.control-group input[type="range"]{width:120px}
.control-group input[type="number"]{width:70px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.9em}
.control-group select{padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-family:var(--font);font-size:.9em;background:var(--surface)}
.test-display{text-align:center;padding:30px 20px}
.pair-freq{color:var(--text-muted);margin-bottom:8px}
.progress-label{color:var(--text-muted);font-size:.9em;margin-bottom:12px}
.judgment-buttons{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.judgment-buttons .btn{min-width:140px;font-size:1.05em}
.balance-slider-wrap{margin:20px auto;max-width:420px}
.balance-slider-wrap input[type="range"]{width:100%;margin:10px 0}
.balance-value{font-family:var(--mono);font-size:1.2em;font-weight:600;text-align:center}
.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:16px}
canvas{width:100%;height:auto}
.results-table{width:100%;border-collapse:collapse;font-size:.88em;font-family:var(--mono)}
.results-table th,.results-table td{padding:6px 10px;text-align:center;border-bottom:1px solid var(--border)}
.results-table th{background:var(--bg);font-family:var(--font);font-weight:600;font-size:.82em;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted)}
.kbd{display:inline-block;padding:2px 6px;border:1px solid var(--border);border-radius:3px;background:var(--bg);font-family:var(--mono);font-size:.8em;line-height:1.4}
.hidden{display:none}
.pair-indicator{display:inline-flex;gap:20px;font-size:1.6em;font-weight:700;margin:10px 0;align-items:center}
.pair-indicator .tone-a,.pair-indicator .tone-b{padding:8px 24px;border-radius:8px}
.pair-indicator .tone-a{background:#dbeafe;color:#1e40af}.pair-indicator .tone-b{background:#fef3c7;color:#92400e}
.pair-indicator .playing{outline:3px solid var(--accent);outline-offset:2px}
.info-bar{background:var(--accent-light);color:var(--accent);padding:10px 16px;border-radius:6px;margin-bottom:12px;font-size:.9em}
.warning-bar{background:#fef3c7;color:var(--warning);padding:10px 16px;border-radius:6px;margin-bottom:12px;font-size:.9em}
.round-info{background:#f0fdf4;color:var(--success);padding:10px 16px;border-radius:6px;margin-bottom:12px;font-size:.9em}
.excluded-row{opacity:.4}
.aba-label{font-size:.7em;font-weight:400;color:var(--text-muted);display:block}
.timer-display{font-family:var(--mono);font-size:.85em;color:var(--text-muted)}
.el-label-extra{font-size:.7em;color:var(--text-muted);font-weight:400}
.lang-select{padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:.85em;background:var(--surface);font-family:var(--font)}
@media print{body{background:#fff}.tabs,.btn,.controls-row,.judgment-buttons,.balance-slider-wrap,.no-print{display:none!important}.panel{display:block!important}.card{border:1px solid #ccc;break-inside:avoid}}
@media(max-width:768px){.container{padding:12px}.freq-table{font-size:.78em}.freq-table input[type="number"]{width:58px}.judgment-buttons .btn{min-width:100px}}
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>CI Loudness Balancing Tool</h1>
    <select class="lang-select" id="langSelect">
      <option value="de">Deutsch</option><option value="en">English</option>
      <option value="fr">Français</option><option value="es">Español</option>
    </select>
  </div>
  <p class="subtitle" id="subtitleText"></p>

  <div class="tabs">
    <button class="tab active" data-tab="setup" id="tabSetup"></button>
    <button class="tab" data-tab="test" id="tabTest">Test</button>
    <button class="tab" data-tab="results" id="tabResults"></button>
    <button class="tab" data-tab="player">Player</button>
  </div>

  <!-- ============ SETUP ============ -->
  <div id="panel-setup" class="panel active">
    <div class="card">
      <h2 id="freqTitle"></h2>
      <div class="controls-row" style="margin-bottom:12px;">
        <div class="control-group">
          <label id="lblManufacturer"></label>
          <select id="manufacturerSelect">
            <option value="medel">MED-EL (12)</option>
            <option value="ab">Advanced Bionics (16)</option>
            <option value="cochlear">Cochlear (22)</option>
          </select>
        </div>
      </div>
      <p style="font-size:.85em;color:var(--text-muted);margin-bottom:12px;" id="freqHint"></p>
      <div style="overflow-x:auto;">
        <table class="freq-table" id="freqTable">
          <thead><tr id="freqTableHead"></tr></thead>
          <tbody id="freqBody"></tbody>
        </table>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button class="btn" id="resetFreqBtn"></button>
        <button class="btn" id="sweepBtn"></button>
        <button class="btn" id="stopBtn"></button>
        <label style="margin-left:12px;font-size:.85em;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" id="correctionToggle"> <span id="lblCorrection"></span>
        </label>
      </div>
    </div>
    <div class="card">
      <h2 id="toneParamsTitle"></h2>
      <div class="controls-row">
        <div class="control-group"><label id="lblVolume"></label><input type="range" id="volumeSlider" min="0" max="100" value="50"><span id="volumeLabel">50%</span></div>
        <div class="control-group"><label id="lblDuration"></label><input type="number" id="toneDuration" value="1000" min="100" max="3000" step="50"></div>
        <div class="control-group"><label id="lblPause"></label><input type="number" id="pauseDuration" value="500" min="100" max="1000" step="50"></div>
      </div>
    </div>
  </div>

  <!-- ============ TEST ============ -->
  <div id="panel-test" class="panel">
    <div class="card no-print">
      <h2 id="testSettingsTitle"></h2>
      <div class="controls-row">
        <div class="control-group"><label id="lblMode"></label>
          <select id="testMode"><option value="balance" id="optBalance"></option><option value="judgment" id="optJudgment"></option></select>
        </div>
        <div class="control-group"><label id="lblPairType"></label>
          <select id="pairType">
            <option value="full" id="optFull"></option>
            <option value="convergence" id="optConvergence"></option>
            <option value="convergence_fast" id="optConvFast"></option>
            <option value="adjacent" id="optAdjacent"></option>
            <option value="jump" id="optJump"></option>
            <option value="manual" id="optManual"></option>
          </select>
        </div>
      </div>
      <div class="controls-row">
        <div class="control-group"><label id="lblRefEl"></label><select id="refElectrode"></select></div>
        <div class="control-group"><label id="lblParadigm"></label>
          <select id="paradigm"><option value="aba">ABA</option><option value="ab">AB</option></select>
        </div>
      </div>
      <div class="controls-row">
        <div class="control-group"><label id="lblVol2"></label><input type="range" id="volumeSlider2" min="0" max="100" value="50"><span id="volumeLabel2">50%</span></div>
        <div class="control-group"><label id="lblDur2"></label><input type="number" id="toneDuration2" value="1000" min="100" max="3000" step="50"> ms</div>
        <div class="control-group"><label id="lblPause2"></label><input type="number" id="pauseDuration2" value="500" min="100" max="1000" step="50"> ms</div>
        <div class="control-group"><label id="lblFatigue"></label><input type="number" id="fatigueInterval" value="20" min="5" max="99" step="1"></div>
      </div>
      <div id="adjacentWarning" class="warning-bar hidden" data-t="warnSkew"></div>
      <div id="manualSelect" class="hidden" style="margin-top:12px;">
        <div class="control-group">
          <label>A:</label><select id="manualA"></select>
          <label style="margin-left:12px;">B:</label><select id="manualB"></select>
          <button class="btn" id="manualPlayBtn" style="margin-left:12px;">&#9654;</button>
        </div>
      </div>
      <div style="margin-top:12px;" class="btn-group">
        <button class="btn btn-primary btn-large" id="startTestBtn"></button>
        <button class="btn btn-large" id="stopTestBtn" disabled></button>
      </div>
    </div>
    <div class="card" id="testArea" style="display:none;">
      <div id="roundInfo" class="round-info hidden"></div>
      <div id="fatigueNotice" class="warning-bar hidden"></div>
      <div class="test-display">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span class="progress-label" id="progressLabel"></span>
          <span class="timer-display" id="timerDisplay">0:00</span>
        </div>
        <div class="pair-indicator" id="pairIndicator">
          <span class="tone-a" id="toneALabel"><span class="aba-label">A</span>E1</span>
          <span style="align-self:center;font-weight:400;font-size:.6em;color:var(--text-muted);">vs.</span>
          <span class="tone-b" id="toneBLabel"><span class="aba-label">B</span>E2</span>
        </div>
        <div class="pair-freq" id="pairFreq"></div>
        <div style="margin:16px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center;">
          <button class="btn btn-large" id="undoBtn" disabled>&#9664; <span data-t="btnBack"></span> <span class="kbd">Z</span></button>
          <button class="btn btn-large" id="replayBtn">&#9654; <span data-t="btnReplay"></span> <span class="kbd" data-t="kbdSpace"></span></button>
          <select id="paradigmInline" style="padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-size:.85em;">
            <option value="aba">ABA</option><option value="ab">AB</option>
          </select>
          <button class="btn" id="excludeBtn" style="color:var(--danger);">&#10005; <span data-t="btnExclude"></span> <span class="kbd">X</span></button>
        </div>
        <div id="judgmentControls" style="display:none;">
          <div class="judgment-buttons">
            <button class="btn btn-large" id="btnALouder">A <span data-t="btnLouder"></span> <span class="kbd">1</span></button>
            <button class="btn btn-large" id="btnEqual"><span data-t="btnEqual"></span> <span class="kbd">2</span></button>
            <button class="btn btn-large" id="btnBLouder">B <span data-t="btnLouder2"></span> <span class="kbd">3</span></button>
          </div>
        </div>
        <div id="balanceControls">
          <div class="balance-slider-wrap">
            <p style="font-size:.85em;color:var(--text-muted);margin-bottom:4px;" data-t="sliderHint"></p>
            <input type="range" id="balanceSlider" min="-20" max="20" step="0.1" value="0">
            <div class="balance-value" id="balanceValue">0.0 dB</div>
            <div id="balanceAbsolute" style="font-size:.82em;color:var(--text-muted);text-align:center;margin-top:2px;display:none;"></div>
            <div id="extendRangeWrap" style="text-align:center;margin-top:6px;display:none;">
              <button class="btn" id="extendRangeBtn" style="font-size:.85em;" data-t="btnExtend"></button>
            </div>
          </div>
          <div style="margin-top:12px;">
            <button class="btn btn-primary btn-large" id="confirmBalance"><span data-t="btnConfirm"></span> <span class="kbd">Enter</span></button>
          </div>
        </div>
      </div>
    </div>
    <div id="excludeDialog" class="card hidden" style="text-align:center;">
      <h2 data-t="excludeTitle"></h2>
      <p id="excludeDialogInfo" style="color:var(--text-muted);margin-bottom:16px;"></p>
      <div class="btn-group" style="justify-content:center;">
        <button class="btn btn-large" id="excludeA"></button>
        <button class="btn btn-large" id="excludeB"></button>
        <button class="btn" id="excludeCancel" data-t="btnCancel"></button>
      </div>
    </div>
  </div>

  <!-- ============ RESULTS ============ -->
  <div id="panel-results" class="panel">
    <div class="card">
      <h2 id="resultsTitle"></h2>
      <div id="noResults"><p style="color:var(--text-muted);" data-t="noResults"></p></div>
      <div id="resultsContent" style="display:none;">
        <p style="font-size:.85em;color:var(--text-muted);margin-bottom:12px;" id="resultsMeta"></p>
        <div class="chart-container"><canvas id="resultsChart" width="800" height="320"></canvas>
          <p id="chartExplanation" style="font-size:.82em;color:var(--text-muted);margin-top:10px;line-height:1.5;"></p>
        </div>
        <div style="overflow-x:auto;margin-top:16px;">
          <table class="results-table" id="resultsTable"><thead><tr id="resultsTableHead"></tr></thead><tbody id="resultsTableBody"></tbody></table>
        </div>
        <div class="btn-group" style="margin-top:16px;">
          <button class="btn" id="exportBtn">&#128203;</button>
          <button class="btn" id="saveJsonBtn">&#128190; JSON</button>
          <button class="btn" id="loadJsonBtn">&#128194; JSON</button>
          <button class="btn" id="printBtn">&#128424;</button>
          <button class="btn" id="clearResultsBtn" style="color:var(--danger);">&#128465;</button>
        </div>
        <input type="file" id="jsonFileInput" accept=".json" class="hidden">
      </div>
    </div>
  </div>

  <!-- ============ PLAYER ============ -->
  <div id="panel-player" class="panel">
    <div class="card">
      <h2 data-t="playerTitle"></h2>
      <p style="font-size:.85em;color:var(--text-muted);margin-bottom:12px;" data-t="playerDesc"></p>
      <div id="playerNoData" class="hidden" style="color:var(--warning);font-size:.9em;margin-bottom:12px;" data-t="playerNoData"></div>
      <div style="margin-bottom:16px;">
        <label style="font-size:.85em;color:var(--text-muted);display:block;margin-bottom:4px;" data-t="playerFileLabel"></label>
        <input type="file" id="playerAudioFile" accept=".mp3,.wav,.flac,.ogg,.m4a,.mp4,audio/*" style="font-size:.9em;">
      </div>
      <div id="playerControls" style="display:none;">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;">
          <button class="btn" id="playerPlayBtn" style="width:48px;height:48px;border-radius:50%;font-size:1.2em;display:flex;align-items:center;justify-content:center;padding:0;">&#9654;</button>
          <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
            <input type="range" id="playerTimeline" min="0" max="1000" value="0" step="1" style="width:100%;">
            <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:.8em;color:var(--text-muted);">
              <span id="playerCurrentTime">0:00</span><span id="playerTotalTime">0:00</span>
            </div>
          </div>
        </div>
        <div class="controls-row">
          <div class="control-group"><label data-t="lblVolume"></label><input type="range" id="playerVolume" min="0" max="100" value="80" style="width:80px;"><span id="playerVolumeLabel" style="font-family:var(--mono);font-size:.85em;min-width:36px;">80%</span></div>
          <div class="control-group"><label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" id="playerEqToggle" checked> EQ</label></div>
          <div class="control-group"><label data-t="lblEqStrength"></label><input type="range" id="playerStrength" min="0" max="150" value="100" step="1" style="width:100px;"><span id="playerStrengthLabel" style="font-family:var(--mono);font-size:.85em;min-width:36px;">100%</span></div>
          <span style="font-family:var(--mono);font-size:.75em;color:var(--text-muted);background:var(--bg);padding:2px 8px;border-radius:4px;">Mono</span>
        </div>
      </div>
    </div>
    <div id="playerEqViz" class="card" style="display:none;">
      <h2 data-t="eqCurveTitle"></h2>
      <div style="position:relative;width:100%;height:200px;background:var(--bg);border-radius:8px;overflow:hidden;"><canvas id="playerEqCanvas" style="width:100%;height:100%;display:block;"></canvas></div>
      <div style="margin-top:14px;overflow-x:auto;">
        <table class="results-table" style="font-size:.8em;"><thead><tr id="playerEqHeader"></tr></thead><tbody><tr id="playerEqLevels"></tr></tbody><tbody><tr id="playerEqGains"></tr></tbody></table>
      </div>
      <p style="font-size:.78em;color:var(--text-muted);margin-top:12px;line-height:1.5;padding:10px;background:var(--bg);border-radius:6px;border-left:3px solid var(--warning);" data-t="playerNotice"></p>
    </div>
  </div>
</div>

<script>
// ===========================================
// I18N
// ===========================================
const LANG = {
de: {
  subtitle: 'Wahrgenommene Lautstärke über CI-Elektroden vergleichen',
  tabFreq: 'Frequenzen', tabResults: 'Ergebnisse',
  freqTitle: 'Elektrodenfrequenzen & Status', lblManufacturer: 'Hersteller:',
  freqHint: 'Standardwerte nach bicial. Eigene FAT-Werte direkt eintragen. ▶ spielt Einzelton.',
  thEl: 'El.', thHz: 'Hz', thPlay: '▶', thStatus: 'Status', thNote: 'Notiz',
  resetFreq: 'Zurücksetzen', sweep: '▶ Sweep', stop: '■ Stopp', lblCorrection: 'Korrektur anwenden',
  toneParams: 'Tonparameter', lblVolume: 'Lautstärke:', lblDuration: 'Tondauer (ms):', lblPause: 'Pause (ms):',
  testSettings: 'Testeinstellungen', lblMode: 'Modus:', optBalance: 'Ausgleichsmodus (dB-Offset)',
  optJudgment: 'Urteilsmodus', lblPairType: 'Durchgang:', optFull: 'Vollständig (alle Paare)',
  optConvergence: 'Konvergenz (bis stabil)', optConvFast: 'Konvergenz schnell',
  optAdjacent: 'Benachbarte Paare', optJump: 'Sprungpaare', optManual: 'Manuell',
  lblRefEl: 'Referenzelektrode:', lblParadigm: 'Paradigma:', lblFatigue: 'Pause nach:',
  warnSkew: 'Hinweis: Benachbarte/Sprungpaare sind anfällig für Schiefmessung. Für präzise Ergebnisse „Vollständig" oder „Konvergenz" verwenden.',
  startTest: '▶ Test starten', stopTest: '■ Test beenden',
  btnBack: 'Zurück', btnReplay: 'Nochmal', kbdSpace: 'Leertaste', btnExclude: 'Ausschließen',
  btnLouder: 'lauter', btnLouder2: 'lauter', btnEqual: 'Gleich',
  sliderHint: 'Mittleren Ton (B) anpassen. ◀▶ ±0.5 dB · Shift+◀▶ ±0.1 dB',
  btnExtend: 'Bereich erweitern (±40 dB)', btnConfirm: 'Offset bestätigen', btnCancel: 'Abbrechen',
  excludeTitle: 'Welche Elektrode ausschließen?',
  resultsTitle: 'Ergebnisse', noResults: 'Noch keine Messungen. Starte einen Test.',
  comparison: 'Vergleich', of: 'von', round: 'Runde',
  chartExplBalance: 'Wahrgenommene Lautstärke relativ zu Referenz (0 dB). Positiv = lauter, negativ = leiser. Fehlerbalken = mittleres Residuum. Berechnung: Gewichtete Least Squares.',
  chartExplJudgment: 'Score = „lauter" minus „leiser". Hohe positive Werte = wird als zu laut empfunden.',
  thOffset: 'Offset (dB)', thMeasurements: 'Messungen', thResidual: '∅ Residuum', thWeight: 'Gewicht', thStatusR: 'Status',
  thScore: 'Score', thComparisons: 'Vergleiche',

function initElectrodeArrays() {
  const n = numElectrodes;
  electrodeStatus = new Array(n).fill(null);
  electrodeNotes = new Array(n).fill('');
  electrodeExcludedDuring = new Array(n).fill(null);
}
initElectrodeArrays();

// Electrode display number: Cochlear counts basal=1, so we reverse
function displayElNum(idx) {
  const m = MANUFACTURERS[manufacturer];
  if (m.apicalFirst) return idx + 1; // MED-EL, AB: apikal=1
  return m.count - idx; // Cochlear: basal=1, so apikal=count
}

let audioCtx = null, currentOsc = null, playTimeout = null, loopActive = false, sweepActive = false, isPlaying = false;
let testActive = false, testPairs = [], testIndex = 0, testMode = 'balance';
let currentPairPlayed = false, currentBaseOffset = 0, sliderExtended = false;
let currentPairA = -1, currentPairB = -1;

// ===========================================
// AUDIO
// ===========================================
function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function getVolume() { const s = document.getElementById(testActive ? 'volumeSlider2' : 'volumeSlider'); return Math.pow(s.value/100, 2); }
function getToneDuration() { return parseInt(document.getElementById(testActive ? 'toneDuration2' : 'toneDuration').value) || 1000; }
function getPauseDuration() { return parseInt(document.getElementById(testActive ? 'pauseDuration2' : 'pauseDuration').value) || 500; }
function dbToGain(db) { return Math.pow(10, db/20); }

function stopAllSound() {
  if (currentOsc) { try { currentOsc.stop(); } catch(e) {} currentOsc = null; }
  if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; }
  loopActive = false; sweepActive = false; isPlaying = false; updateToneIndicators(-1);
}

function playTone(freqHz, volume, durationMs, rampMs=20) {
  return new Promise(resolve => {
    const ctx = getAudioCtx(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freqHz;
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(Math.max(0,volume), ctx.currentTime + rampMs/1000);
    gain.gain.setValueAtTime(Math.max(0,volume), ctx.currentTime + (durationMs-rampMs)/1000);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + durationMs/1000);
    osc.connect(gain); gain.connect(ctx.destination); currentOsc = osc;
    osc.start(); osc.stop(ctx.currentTime + durationMs/1000 + 0.01);
    osc.onended = () => { currentOsc = null; resolve(); };
  });
}

function getCorrectionGain(elIdx) {
  if (!document.getElementById('correctionToggle').checked) return 1.0;
  if (balanceResults.length === 0) return 1.0;
  const { levels } = computeWeightedLS();
  return dbToGain(-levels[elIdx]);
}

async function playSingleTone(idx) {
  stopAllSound(); isPlaying = true; updateToneIndicators(idx);
  await playTone(freqs[idx], getVolume() * getCorrectionGain(idx), getToneDuration());
  isPlaying = false; updateToneIndicators(-1);
}

async function playSweep() {
  stopAllSound(); sweepActive = true; isPlaying = true;
  for (let i = 0; i < numElectrodes; i++) {
    if (!sweepActive) break;
    if (electrodeStatus[i] === 'excluded' || electrodeStatus[i] === 'mute') continue;
    updateToneIndicators(i);
    await playTone(freqs[i], getVolume() * getCorrectionGain(i), getToneDuration());
    if (!sweepActive) break;
    await new Promise(r => playTimeout = setTimeout(r, 50 + getPauseDuration()));
  }
  isPlaying = false; sweepActive = false; updateToneIndicators(-1);
}

async function playSequence(elA, elB, offsetDb) {
  const vol = getVolume(), dur = getToneDuration(), pause = getPauseDuration();
  const volB = Math.max(Math.min(vol * dbToGain(offsetDb), 1.0), 0);
  updateToneIndicators(elA, 'a'); await playTone(freqs[elA], vol, dur);
  if (!isPlaying) return; updateToneIndicators(-1);
  await new Promise(r => playTimeout = setTimeout(r, 50 + pause));
  if (!isPlaying) return;
  updateToneIndicators(elB, 'b'); await playTone(freqs[elB], volB, dur);
  if (!isPlaying) return;
  if (document.getElementById('paradigm').value === 'aba') {
    updateToneIndicators(-1); await new Promise(r => playTimeout = setTimeout(r, 50 + pause));
    if (!isPlaying) return; updateToneIndicators(elA, 'a'); await playTone(freqs[elA], vol, dur);
  }
  isPlaying = false; updateToneIndicators(-1);
}

function updateToneIndicators(elIdx, which) {
  document.querySelectorAll('.freq-table .play-btn').forEach((b,i) => { b.style.background = (i===elIdx) ? 'var(--accent-light)' : ''; });
  const a = document.getElementById('toneALabel'), b = document.getElementById('toneBLabel');
  if (a) a.classList.toggle('playing', which==='a');
  if (b) b.classList.toggle('playing', which==='b');
}

function buildFreqTable() {
  const thead = document.getElementById('freqTableHead');
  thead.innerHTML = `<th>${t('thEl')}</th><th>${t('thHz')}</th><th>${t('thPlay')}</th><th>${t('thStatus')}</th><th>${t('thNote')}</th>`;
  const tbody = document.getElementById('freqBody');
  tbody.innerHTML = '';
  const statusOpts = `<option value="">—</option><option value="noisy">${t('statusNoisy')}</option><option value="almostMute">${t('statusAlmostMute')}</option><option value="mute">${t('statusMute')}</option><option value="excluded">${t('statusExcluded')}</option>`;
  for (let i = 0; i < numElectrodes; i++) {
    const tr = document.createElement('tr');
    if (electrodeStatus[i] === 'excluded') tr.classList.add('excluded-row');
    let elLabel = displayElNum(i);
    let extra = '';
    if (i === 0) extra = ` <span class="el-label-extra">(${t('apikal')})</span>`;
    if (i === numElectrodes - 1) extra = ` <span class="el-label-extra">(${t('basal')})</span>`;
    tr.innerHTML = `<td style="font-weight:600;">${elLabel}${extra}</td>
      <td><input type="number" class="freq-input" data-idx="${i}" value="${Math.round(freqs[i])}" min="20" max="20000"></td>
      <td><button class="play-btn" data-idx="${i}">&#9654;</button></td>
      <td><select class="status-select" data-idx="${i}">${statusOpts}</select></td>
      <td><input type="text" class="note-input" data-idx="${i}" value="${electrodeNotes[i]||''}" placeholder="${t('thNote')}"></td>`;
    tbody.appendChild(tr);
    tr.querySelector('.status-select').value = electrodeStatus[i] || '';
  }
  tbody.querySelectorAll('.freq-input').forEach(inp => inp.addEventListener('change', e => {
    const idx=+e.target.dataset.idx, val=parseFloat(e.target.value);
    if (val>=20&&val<=20000) freqs[idx]=val; else e.target.value=Math.round(freqs[idx]);
  }));
  tbody.querySelectorAll('.play-btn').forEach(b => b.addEventListener('click', () => playSingleTone(+b.dataset.idx)));
  tbody.querySelectorAll('.status-select').forEach(s => s.addEventListener('change', e => { electrodeStatus[+e.target.dataset.idx]=e.target.value||null; buildFreqTable(); updateRefSelect(); }));
  tbody.querySelectorAll('.note-input').forEach(n => n.addEventListener('change', e => { electrodeNotes[+e.target.dataset.idx]=e.target.value; }));
  updateRefSelect(); updateManualSelects();
}

function updateRefSelect() {
  const sel = document.getElementById('refElectrode'); const prev = sel.value; sel.innerHTML = '';
  for (let i = 0; i < numElectrodes; i++) {
    if (electrodeStatus[i]==='excluded'||electrodeStatus[i]==='mute') continue;
    const mid = Math.floor(numElectrodes/2);
    sel.innerHTML += `<option value="${i}">E${displayElNum(i)} (${Math.round(freqs[i])} Hz)${i===mid?' – ≈'+t('apikal')+'/'+t('basal'):''}</option>`;
  }
  if (prev && sel.querySelector(`option[value="${prev}"]`)) sel.value = prev;
  else { const mid = Math.floor(numElectrodes/2); sel.value = String(mid); }
  referenceElectrode = +sel.value;
}

function updateManualSelects() {
  ['manualA','manualB'].forEach(id => {
    const s = document.getElementById(id); s.innerHTML = '';
    for (let i = 0; i < numElectrodes; i++) {
      if (electrodeStatus[i]==='excluded'||electrodeStatus[i]==='mute') continue;
      s.innerHTML += `<option value="${i}">E${displayElNum(i)} (${Math.round(freqs[i])} Hz)</option>`;
    }
  });
  const b = document.getElementById('manualB'); if (b.options.length > 1) b.selectedIndex = 1;
}

function switchManufacturer(mfr) {
  manufacturer = mfr;
  const cfg = MANUFACTURERS[mfr];
  numElectrodes = cfg.count;
  freqs = [...cfg.freqs];
  initElectrodeArrays();
  judgmentResults = []; balanceResults = [];
  referenceElectrode = Math.floor(numElectrodes / 2);
  buildFreqTable();
}

function resetFreqs() {
  const cfg = MANUFACTURERS[manufacturer];
  freqs = [...cfg.freqs]; initElectrodeArrays();
  buildFreqTable();
}

// ===========================================
// PAIRS
// ===========================================
function getActiveElectrodes() { return [...Array(numElectrodes).keys()].filter(i => electrodeStatus[i]!=='excluded' && electrodeStatus[i]!=='mute'); }

function getAllPairs() {
  const a = getActiveElectrodes(), p = [];
  for (let i=0;i<a.length;i++) for (let j=i+1;j<a.length;j++) p.push([a[i],a[j]]);
  return p;
}
function getAdjacentPairs() { const a=getActiveElectrodes(),p=[]; for(let i=0;i<a.length-1;i++) p.push([a[i],a[i+1]]); return p; }
function getJumpPairs() {
  const a=getActiveElectrodes(); if(a.length<4) return getAllPairs();
  const n=a.length, step=Math.max(2,Math.floor(n/4)), p=[], seen=new Set();
  const add=(x,y)=>{ if(x!==y){const k=Math.min(x,y)+'-'+Math.max(x,y); if(!seen.has(k)){seen.add(k);p.push([x,y]);}} };
  for(let i=0;i<n-step;i+=step) add(a[i],a[i+step]);
  add(a[0],a[n-1]); add(a[0],a[Math.floor(n/2)]); add(a[Math.floor(n/2)],a[n-1]);
  return p;
}
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function randomizeAB(pairs) { return pairs.map(([x,y])=>Math.random()<0.5?[x,y]:[y,x]); }

// ===========================================
// WEIGHTED LEAST SQUARES
// ===========================================
function getWeight(elIdx) {
  const s = electrodeStatus[elIdx];
  if (s === 'excluded' || s === 'mute') return 0;
  if (s === 'almostMute') return 0.1;
  if (s === 'noisy') return 0.5;
  return 1.0;
}

function computeWeightedLS() {
  const n = numElectrodes;
  const levels = new Array(n).fill(0);
  // Filter out results involving excluded/mute electrodes
  const valid = balanceResults.filter(r => {
    if (r.a<0||r.a>=n||r.b<0||r.b>=n) return false;
    const sa=electrodeStatus[r.a], sb=electrodeStatus[r.b];
    return sa!=='excluded'&&sa!=='mute'&&sb!=='excluded'&&sb!=='mute';
  });
  if (valid.length === 0) return { levels, residuals: [], elResiduals: new Array(n).fill(0), elWeights: new Array(n).fill(1) };

  for (let iter = 0; iter < 80; iter++) {
    const sums = new Array(n).fill(0), weights = new Array(n).fill(0);
    for (const r of valid) {
      const w = Math.min(getWeight(r.a), getWeight(r.b));
      const estB = levels[r.a] - r.offset;
      sums[r.b] += estB * w; weights[r.b] += w;
      const estA = levels[r.b] + r.offset;
      sums[r.a] += estA * w; weights[r.a] += w;
    }
    for (let i = 0; i < n; i++) {
      if (i === referenceElectrode) { levels[i] = 0; continue; }
      if (weights[i] > 0) levels[i] = sums[i] / weights[i];
    }
  }

  // Residuals
  const residuals = valid.map(r => {
    const expected = levels[r.a] - levels[r.b];
    return { ...r, residual: Math.abs(r.offset - expected) };
  });
  // Per-electrode average residual
  const elResArr = new Array(n).fill(null).map(()=>[]);
  for (const r of residuals) { elResArr[r.a].push(r.residual); elResArr[r.b].push(r.residual); }
  const elResiduals = elResArr.map(arr => arr.length>0 ? arr.reduce((a,b)=>a+b,0)/arr.length : 0);
  const elWeights = new Array(n).fill(0).map((_,i)=>getWeight(i));

  return { levels, residuals, elResiduals, elWeights };
}

// ===========================================
// CONVERGENCE
// ===========================================
function getConvergencePairs(fast) {
  if (fast && balanceResults.length > 0) {
    const { residuals } = computeWeightedLS();
    // Filter residuals to only include active electrodes
    const active = new Set(getActiveElectrodes());
    const validRes = residuals.filter(r => active.has(r.a) && active.has(r.b));
    validRes.sort((a,b) => b.residual - a.residual);
    const topCount = Math.max(5, Math.ceil(validRes.length * 0.2));
    const topPairs = validRes.slice(0, topCount).map(r => [r.a, r.b]);
    const allP = getAllPairs();
    const extra = shuffle(allP).slice(0, Math.min(5, allP.length));
    const seen = new Set(), merged = [];
    [...topPairs, ...extra].forEach(p => { const k=Math.min(p[0],p[1])+'-'+Math.max(p[0],p[1]); if(!seen.has(k)){seen.add(k);merged.push(p);} });
    return merged;
  }
  return getAllPairs();
}

// ===========================================
// TEST
// ===========================================
function startTest() {
  const pt = document.getElementById('pairType').value;
  testMode = document.getElementById('testMode').value;
  referenceElectrode = +document.getElementById('refElectrode').value;
  if (pt === 'manual') return;
  let pairs;
  if (pt==='adjacent') pairs=getAdjacentPairs();
  else if (pt==='jump') pairs=getJumpPairs();
  else if (pt==='full') pairs=getAllPairs();
  else if (pt==='convergence') pairs=getConvergencePairs(false);
  else if (pt==='convergence_fast') pairs=getConvergencePairs(true);
  else pairs=getAllPairs();
  testPairs = randomizeAB(shuffle(pairs));
  testIndex=0; undoStack=[]; testActive=true; currentPairPlayed=false; comparisonCount=0;
  convergenceRound=(pt==='convergence'||pt==='convergence_fast')?1:0;
  testStartTime=Date.now();
  document.getElementById('startTestBtn').disabled=true;
  document.getElementById('stopTestBtn').disabled=false;
  document.getElementById('testArea').style.display='block';
  document.getElementById('excludeDialog').classList.add('hidden');
  document.getElementById('fatigueNotice').classList.add('hidden');
  if (convergenceRound>0) { const ri=document.getElementById('roundInfo'); ri.textContent=`${t('round')} ${convergenceRound} – ${testPairs.length} ${t('comparison')}`;ri.classList.remove('hidden'); }
  else document.getElementById('roundInfo').classList.add('hidden');
  startTimer(); showModeControls(); showCurrentPair();
}
function endTest() { stopAllSound(); testActive=false; document.getElementById('startTestBtn').disabled=false; document.getElementById('stopTestBtn').disabled=true; document.getElementById('testArea').style.display='none'; document.getElementById('excludeDialog').classList.add('hidden'); stopTimer(); }
function showModeControls() { const j=testMode==='judgment'; document.getElementById('judgmentControls').style.display=j?'':'none'; document.getElementById('balanceControls').style.display=j?'none':''; }

function showCurrentPair() {
  if (testIndex >= testPairs.length) {
    if (convergenceRound>0) return startNextConvergenceRound();
    endTest(); switchTab('results'); renderResults(); return;
  }
  const fi = parseInt(document.getElementById('fatigueInterval').value)||20;
  if (comparisonCount>0 && comparisonCount%fi===0) {
    const el=Math.floor((Date.now()-testStartTime)/1000); const m=Math.floor(el/60),s=el%60;
    document.getElementById('fatigueNotice').innerHTML=`${comparisonCount} ${t('fatigueMsg')} (${m}:${String(s).padStart(2,'0')})`;
    document.getElementById('fatigueNotice').classList.remove('hidden');
  } else document.getElementById('fatigueNotice').classList.add('hidden');
  const [a,b]=testPairs[testIndex]; currentPairA=a; currentPairB=b;
  document.getElementById('progressLabel').textContent=`${t('comparison')} ${testIndex+1} ${t('of')} ${testPairs.length}${convergenceRound>0?` (${t('round')} ${convergenceRound})`:''}`;
  document.getElementById('toneALabel').innerHTML=`<span class="aba-label">A (Ref)</span>E${displayElNum(a)}`;
  document.getElementById('toneBLabel').innerHTML=`<span class="aba-label">B (Slider)</span>E${displayElNum(b)}`;
  document.getElementById('pairFreq').textContent=`${Math.round(freqs[a])} Hz vs. ${Math.round(freqs[b])} Hz`;
  if (testMode==='balance') {
    const existing=balanceResults.find(r=>(r.a===a&&r.b===b)||(r.a===b&&r.b===a));
    currentBaseOffset=existing?((existing.a===a)?existing.offset:-existing.offset):0;
    resetSliderRange(); document.getElementById('balanceSlider').value=0;
    document.getElementById('balanceValue').textContent='0.0 dB'; updateBalanceAbsolute(0);
  }
  currentPairPlayed=false; updateUndoBtn(); playCurrentPair();
}

function playCurrentPair() {
  if (testIndex>=testPairs.length) return; stopAllSound(); isPlaying=true;
  if (testMode==='balance') { playSequence(currentPairA,currentPairB,currentBaseOffset+parseFloat(document.getElementById('balanceSlider').value)); }
  else playSequence(currentPairA,currentPairB,0);
  currentPairPlayed=true;
}

function recordJudgment(result) {
  if (!testActive||testIndex>=testPairs.length||!currentPairPlayed) return;
  const a=currentPairA,b=currentPairB,ne={a,b,result,timestamp:Date.now()};
  const ei=judgmentResults.findIndex(r=>(r.a===a&&r.b===b)||(r.a===b&&r.b===a));
  if (ei>=0) { undoStack.push({type:'j',action:'r',entry:ne,prev:{...judgmentResults[ei]}}); judgmentResults[ei]=ne; }
  else { undoStack.push({type:'j',action:'a',entry:ne}); judgmentResults.push(ne); }
  testIndex++; comparisonCount++; updateUndoBtn(); showCurrentPair();
}

function recordBalance() {
  if (!testActive||testIndex>=testPairs.length) return;
  const a=currentPairA,b=currentPairB,total=currentBaseOffset+parseFloat(document.getElementById('balanceSlider').value);
  const ne={a,b,offset:total,timestamp:Date.now()};
  const ei=balanceResults.findIndex(r=>(r.a===a&&r.b===b)||(r.a===b&&r.b===a));
  if (ei>=0) { undoStack.push({type:'b',action:'r',entry:ne,prev:{...balanceResults[ei]}}); balanceResults[ei]=ne; }
  else { undoStack.push({type:'b',action:'a',entry:ne}); balanceResults.push(ne); }
  testIndex++; comparisonCount++; updateUndoBtn(); showCurrentPair();
}

function undoLast() {
  if (!testActive||undoStack.length===0||testIndex<=0) return;
  stopAllSound(); testIndex--; comparisonCount=Math.max(0,comparisonCount-1);
  const u=undoStack.pop();
  if (u.type==='j') { if(u.action==='a'){const i=judgmentResults.findIndex(r=>r.timestamp===u.entry.timestamp);if(i>=0)judgmentResults.splice(i,1);}else{const i=judgmentResults.findIndex(r=>r.a===u.entry.a&&r.b===u.entry.b);if(i>=0)judgmentResults[i]=u.prev;} }
  else { if(u.action==='a'){const i=balanceResults.findIndex(r=>r.timestamp===u.entry.timestamp);if(i>=0)balanceResults.splice(i,1);}else{const i=balanceResults.findIndex(r=>r.a===u.entry.a&&r.b===u.entry.b);if(i>=0)balanceResults[i]=u.prev;} }
  updateUndoBtn(); document.getElementById('fatigueNotice').classList.add('hidden'); showCurrentPair();
}
function updateUndoBtn() { document.getElementById('undoBtn').disabled=(testIndex<=0||undoStack.length===0); }

function startNextConvergenceRound() {
  const {residuals}=computeWeightedLS();
  const active=new Set(getActiveElectrodes());
  const validRes=residuals.filter(r=>active.has(r.a)&&active.has(r.b));
  const maxR=validRes.length>0?Math.max(...validRes.map(r=>r.residual)):0;
  if (maxR<1.0) { endTest(); switchTab('results'); renderResults(); return; }
  convergenceRound++;
  const sorted=[...validRes].sort((a,b)=>b.residual-a.residual);
  const topPairs=sorted.slice(0,Math.max(5,Math.ceil(sorted.length*0.2))).map(r=>[r.a,r.b]);
  const allP=getAllPairs(), extra=shuffle(allP).slice(0,Math.min(Math.max(3,Math.floor(allP.length*0.1)),8));
  const seen=new Set(),merged=[];
  [...topPairs,...extra].forEach(p=>{const k=Math.min(p[0],p[1])+'-'+Math.max(p[0],p[1]);if(!seen.has(k)){seen.add(k);merged.push(p);}});
  testPairs=randomizeAB(shuffle(merged)); testIndex=0; undoStack=[];
  const ri=document.getElementById('roundInfo');
  ri.textContent=`${t('round')} ${convergenceRound} – ${merged.length} (max residuum: ${maxR.toFixed(1)} dB)`;
  ri.classList.remove('hidden'); showCurrentPair();
}

// Exclude during test
function showExcludeDialog() {
  if (!testActive||testIndex>=testPairs.length) return; stopAllSound();
  const a=currentPairA,b=currentPairB;
  document.getElementById('excludeDialogInfo').textContent=`E${displayElNum(a)} (${Math.round(freqs[a])} Hz) vs. E${displayElNum(b)} (${Math.round(freqs[b])} Hz)`;
  document.getElementById('excludeA').textContent=`E${displayElNum(a)} ${t('btnExclude')}`;
  document.getElementById('excludeB').textContent=`E${displayElNum(b)} ${t('btnExclude')}`;
  document.getElementById('excludeA').onclick=()=>doExclude(a);
  document.getElementById('excludeB').onclick=()=>doExclude(b);
  document.getElementById('excludeDialog').classList.remove('hidden');
}
function doExclude(idx) {
  electrodeStatus[idx]='excluded'; electrodeExcludedDuring[idx]=Date.now();
  const rem=testPairs.slice(testIndex).filter(([a,b])=>a!==idx&&b!==idx);
  testPairs=[...testPairs.slice(0,testIndex),...rem];
  document.getElementById('excludeDialog').classList.add('hidden'); buildFreqTable();
  const ri=document.getElementById('roundInfo');
  ri.textContent=`E${displayElNum(idx)} ${t('excludedDuring')}. ${testPairs.length-testIndex} ${t('pairsRemaining')}.`;
  ri.classList.remove('hidden');
  if (testIndex>=testPairs.length) { endTest(); switchTab('results'); renderResults(); } else showCurrentPair();
}

  if (currentBaseOffset!==0) { const tot=currentBaseOffset+sv; ae.textContent=`${t('total')}: ${tot>=0?'+':''}${tot.toFixed(1)} dB (${t('previous')}: ${currentBaseOffset>=0?'+':''}${currentBaseOffset.toFixed(1)} dB)`; ae.style.display=''; }
  else ae.style.display='none';

function extendSliderRange() { const s=document.getElementById('balanceSlider'); sliderExtended=true;s.min='-40';s.max='40'; document.getElementById('extendRangeWrap').style.display='none'; }

// Timer

function stopTimer() { if(timerInterval){clearInterval(timerInterval);timerInterval=null;} }

  if(a===b) return; const [pa,pb]=Math.random()<0.5?[a,b]:[b,a];

    for(const r of valid){pairCounts[r.a]++;pairCounts[r.b]++;}

    for (let i=0;i<numElectrodes;i++) {

      if(electrodeStatus[i]){const lb={noisy:t('statusNoisy'),almostMute:t('statusAlmostMute'),mute:t('statusMute'),excluded:t('excluded')};stH=lb[electrodeStatus[i]]||'';}
      if(electrodeNotes[i])stH+=(stH?' · ':'')+electrodeNotes[i];
      tr.innerHTML=`<td style="font-weight:600;">${displayElNum(i)}</td><td>${Math.round(freqs[i])}</td>
        <td style="color:${isExcl?'#999':v>0.05?'#2563eb':v<-0.05?'#dc2626':'#666'}">${isExcl?'—':(v>=0?'+':'')+v.toFixed(1)}</td>
        <td>${pairCounts[i]||'—'}</td><td>${elResiduals[i]>0?elResiduals[i].toFixed(1):'—'}</td>
        <td>${isExcl?'—':elWeights[i].toFixed(1)}</td><td style="font-size:.8em;">${stH}</td>`;
      tbody.appendChild(tr);
    }
    drawChart(document.getElementById('resultsChart'),levels,elResiduals,true);

  } else if (hJ) {

}

// ===========================================
// CHART with error bars
// ===========================================
function drawChart(canvas,values,residuals,isOffset) {
  const ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.clientWidth-32,h=320;
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.scale(dpr,dpr);
  const pad={top:30,right:20,bottom:50,left:60};
  const plotW=w-pad.left-pad.right,plotH=h-pad.top-pad.bottom;
  ctx.clearRect(0,0,w,h);
  const active=getActiveElectrodes(), aVals=active.map(i=>values[i]);
  const aRes=residuals?active.map(i=>residuals[i]):null;
  let yMin,yMax;
  if(isOffset){let am=Math.max(Math.ceil(Math.max(...aVals.map(Math.abs),1)),5);if(aRes){am=Math.max(am,Math.ceil(Math.max(...active.map(i=>Math.abs(values[i])+residuals[i]))));}yMin=-am;yMax=am;}
  else{yMin=Math.min(0,...aVals);yMax=Math.max(0,...aVals);const r=yMax-yMin||1;yMin-=r*0.1;yMax+=r*0.1;}
  const xS=plotW/(active.length-1||1),toX=i=>pad.left+i*xS,toY=v=>pad.top+(yMax-v)*(plotH/(yMax-yMin||1));
  // Grid
  ctx.strokeStyle='#e5e5e5';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const v=yMin+(yMax-yMin)*i/5,y=toY(v);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();ctx.fillStyle='#999';ctx.font='11px Consolas,monospace';ctx.textAlign='right';ctx.fillText(v.toFixed(1),pad.left-8,y+4);}
  if(yMin<0&&yMax>0){ctx.strokeStyle='#aaa';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(pad.left,toY(0));ctx.lineTo(w-pad.right,toY(0));ctx.stroke();ctx.setLineDash([]);}
  // Bars
  const barW=Math.min(xS*0.6,36);
  for(let i=0;i<active.length;i++){const v=aVals[i],x=toX(i)-barW/2,yZ=toY(0),yV=toY(v);
    ctx.fillStyle=v>0.05?'#2563eb':v<-0.05?'#dc2626':'#9ca3af';
    ctx.fillRect(x,Math.min(yZ,yV),barW,Math.abs(yV-yZ)||2);
    // Error bars
    if(aRes&&aRes[i]>0){const r=aRes[i],yTop=toY(v+r),yBot=toY(v-r);
      ctx.strokeStyle='#00000044';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(toX(i),yTop);ctx.lineTo(toX(i),yBot);ctx.stroke();
      ctx.beginPath();ctx.moveTo(toX(i)-4,yTop);ctx.lineTo(toX(i)+4,yTop);ctx.stroke();
      ctx.beginPath();ctx.moveTo(toX(i)-4,yBot);ctx.lineTo(toX(i)+4,yBot);ctx.stroke();
    }
    // X labels
    ctx.fillStyle=active[i]===referenceElectrode?'#2563eb':'#555';
    ctx.font=(active[i]===referenceElectrode?'bold ':'')+'11px Segoe UI,sans-serif';ctx.textAlign='center';
    ctx.fillText('E'+displayElNum(active[i]),toX(i),h-pad.bottom+16);
    ctx.font='9px Consolas,monospace';ctx.fillStyle='#999';
    ctx.fillText(Math.round(freqs[active[i]]),toX(i),h-pad.bottom+28);
    // apikal/basal labels
    if(i===0){ctx.font='9px Segoe UI,sans-serif';ctx.fillStyle='#999';ctx.fillText(t('apikal'),toX(i),h-pad.bottom+39);}
    if(i===active.length-1){ctx.font='9px Segoe UI,sans-serif';ctx.fillStyle='#999';ctx.fillText(t('basal'),toX(i),h-pad.bottom+39);}
  }
  // Line
  ctx.strokeStyle='#2563eb55';ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<active.length;i++){if(i===0)ctx.moveTo(toX(i),toY(aVals[i]));else ctx.lineTo(toX(i),toY(aVals[i]));}ctx.stroke();
  // Dots
  for(let i=0;i<active.length;i++){ctx.beginPath();ctx.arc(toX(i),toY(aVals[i]),4,0,Math.PI*2);ctx.fillStyle='#2563eb';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}
  // Y label
  ctx.save();ctx.translate(14,pad.top+plotH/2);ctx.rotate(-Math.PI/2);ctx.fillStyle='#666';ctx.font='11px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('dB',0,0);ctx.restore();
}

function exportText() {
  const L=[],now=new Date().toLocaleString(lang==='de'?'de-DE':'en-US'),vol=document.getElementById('volumeSlider2').value;
  L.push(`CI Loudness Balancing – ${now}`);
  L.push(`${MANUFACTURERS[manufacturer].name} (${numElectrodes}) | ${t('lblVolume')} ${vol}% | Ref: E${displayElNum(referenceElectrode)}`);L.push('');
  if(balanceResults.length>0){const{levels,elResiduals}=computeWeightedLS();
    L.push(`${t('thEl')}  ${t('thHz')}      ${t('thOffset')}    ${t('thResidual')}  ${t('thStatusR')}`);
    L.push('───  ────────  ─────────  ────────  ──────');
    for(let i=0;i<numElectrodes;i++){const st=electrodeStatus[i]||'',n=electrodeNotes[i]?` (${electrodeNotes[i]})`:'',excl=st==='excluded'||st==='mute';
      L.push(`${String(displayElNum(i)).padStart(3)}  ${String(Math.round(freqs[i])).padStart(5)} Hz  ${excl?'    —    ':((levels[i]>=0?'+':'')+levels[i].toFixed(1)+' dB').padStart(9)}  ${excl?'  —   ':(elResiduals[i].toFixed(1)+' dB').padStart(8)}  ${st}${n}`);}}
  return L.join('\n');
}
function copyResults(){navigator.clipboard.writeText(exportText()).then(()=>alert(t('copyDone'))).catch(()=>{const ta=document.createElement('textarea');ta.value=exportText();document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert(t('copyDone'));});}
function saveJson(){
  const d={version:3,date:new Date().toISOString(),manufacturer,frequencies:freqs,electrodeStatus,electrodeNotes,electrodeExcludedDuring,referenceElectrode,judgmentResults,balanceResults,volume:document.getElementById('volumeSlider2').value};
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}),a=document.createElement('a');
  const now=new Date(),ds=now.toISOString().slice(0,10),ts=String(now.getHours()).padStart(2,'0')+'-'+String(now.getMinutes()).padStart(2,'0');
  a.href=URL.createObjectURL(blob);a.download=`loudness-balancing-${ds}-${ts}.json`;a.click();
}
function loadJson(file){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);
  if(d.manufacturer&&MANUFACTURERS[d.manufacturer]){manufacturer=d.manufacturer;numElectrodes=MANUFACTURERS[manufacturer].count;}
  if(d.frequencies)freqs=d.frequencies;if(d.electrodeStatus)electrodeStatus=d.electrodeStatus;if(d.electrodeNotes)electrodeNotes=d.electrodeNotes;
  if(d.electrodeExcludedDuring)electrodeExcludedDuring=d.electrodeExcludedDuring;if(d.referenceElectrode!==undefined)referenceElectrode=d.referenceElectrode;
  if(d.judgmentResults)judgmentResults=d.judgmentResults;if(d.balanceResults)balanceResults=d.balanceResults;
  document.getElementById('manufacturerSelect').value=manufacturer;buildFreqTable();renderResults();switchTab('results');
}catch(err){alert('Error: '+err.message);}};r.readAsText(file);}
function clearResults(){if(!confirm(t('deleteConfirm')))return;judgmentResults=[];balanceResults=[];renderResults();}

// ===========================================
// TABS

function switchTab(name){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+name));if(name==='results')renderResults();if(name==='player')playerCheckData();}

// ===========================================
// INIT
// ===========================================
document.addEventListener('DOMContentLoaded', () => {
  // Load saved language
  try { const sl=localStorage.getItem('ci-lb-lang'); if(sl&&LANG[sl]){document.getElementById('langSelect').value=sl;lang=sl;} } catch(e){}
  applyLang();

  document.getElementById('langSelect').addEventListener('change', applyLang);
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
  document.getElementById('resetFreqBtn').addEventListener('click',resetFreqs);
  document.getElementById('sweepBtn').addEventListener('click',playSweep);
  document.getElementById('stopBtn').addEventListener('click',stopAllSound);
  document.getElementById('manufacturerSelect').addEventListener('change',e=>switchManufacturer(e.target.value));

  // Volume sync
  document.getElementById('volumeSlider').addEventListener('input',e=>{document.getElementById('volumeLabel').textContent=e.target.value+'%';document.getElementById('volumeSlider2').value=e.target.value;document.getElementById('volumeLabel2').textContent=e.target.value+'%';});
  document.getElementById('volumeSlider2').addEventListener('input',e=>{document.getElementById('volumeLabel2').textContent=e.target.value+'%';document.getElementById('volumeSlider').value=e.target.value;document.getElementById('volumeLabel').textContent=e.target.value+'%';});

  document.getElementById('pairType').addEventListener('change',e=>{const v=e.target.value;document.getElementById('adjacentWarning').classList.toggle('hidden',v!=='adjacent'&&v!=='jump');document.getElementById('manualSelect').classList.toggle('hidden',v!=='manual');});
  document.getElementById('refElectrode').addEventListener('change',e=>{referenceElectrode=+e.target.value;});
  document.getElementById('paradigm').addEventListener('change',e=>{document.getElementById('paradigmInline').value=e.target.value;});
  document.getElementById('paradigmInline').addEventListener('change',e=>{document.getElementById('paradigm').value=e.target.value;});

  document.getElementById('startTestBtn').addEventListener('click',startTest);
  document.getElementById('stopTestBtn').addEventListener('click',()=>{endTest();renderResults();});
  document.getElementById('replayBtn').addEventListener('click',playCurrentPair);
  document.getElementById('undoBtn').addEventListener('click',undoLast);
  document.getElementById('manualPlayBtn').addEventListener('click',playManualPair);
  document.getElementById('excludeBtn').addEventListener('click',showExcludeDialog);
  document.getElementById('excludeCancel').addEventListener('click',()=>{document.getElementById('excludeDialog').classList.add('hidden');playCurrentPair();});

  const jH=r=>()=>{if(document.getElementById('pairType').value==='manual'){recordJudgment(r);afterManualResult();}else recordJudgment(r);};
  document.getElementById('btnALouder').addEventListener('click',jH('a'));
  document.getElementById('btnEqual').addEventListener('click',jH('equal'));
  document.getElementById('btnBLouder').addEventListener('click',jH('b'));

  document.getElementById('balanceSlider').addEventListener('input',e=>{const v=parseFloat(e.target.value);document.getElementById('balanceValue').textContent=v.toFixed(1)+' dB';updateBalanceAbsolute(v);});
  document.getElementById('balanceSlider').addEventListener('change',e=>e.target.blur());
  document.getElementById('balanceSlider').addEventListener('mouseup',e=>e.target.blur());
  document.getElementById('balanceSlider').addEventListener('touchend',e=>e.target.blur());
  document.getElementById('extendRangeBtn').addEventListener('click',extendSliderRange);
  document.getElementById('confirmBalance').addEventListener('click',()=>{if(document.getElementById('pairType').value==='manual'){recordBalance();afterManualResult();}else recordBalance();});

  document.getElementById('exportBtn').addEventListener('click',copyResults);
  document.getElementById('saveJsonBtn').addEventListener('click',saveJson);
  document.getElementById('loadJsonBtn').addEventListener('click',()=>document.getElementById('jsonFileInput').click());
  document.getElementById('jsonFileInput').addEventListener('change',e=>{if(e.target.files[0])loadJson(e.target.files[0]);});
  document.getElementById('printBtn').addEventListener('click',()=>window.print());
  document.getElementById('clearResultsBtn').addEventListener('click',clearResults);

  // Keyboard
  document.addEventListener('keydown',e=>{
    if(!testActive) return; if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
    if(e.code==='Space'){e.preventDefault();playCurrentPair();}
    if(e.key==='z'||e.key==='Z'){e.preventDefault();undoLast();}
    if(e.key==='x'||e.key==='X'){e.preventDefault();showExcludeDialog();}
    if(testMode==='judgment'){if(e.key==='1'){e.preventDefault();document.getElementById('btnALouder').click();}if(e.key==='2'){e.preventDefault();document.getElementById('btnEqual').click();}if(e.key==='3'){e.preventDefault();document.getElementById('btnBLouder').click();}}
    if(testMode==='balance'&&e.key==='Enter'){e.preventDefault();document.getElementById('confirmBalance').click();}
    if(testMode==='balance'&&(e.key==='ArrowLeft'||e.key==='ArrowRight')){e.preventDefault();const s=document.getElementById('balanceSlider'),step=e.shiftKey?0.1:0.5;let v=parseFloat(s.value);if(e.key==='ArrowLeft')v=Math.max(parseFloat(s.min),+(v-step).toFixed(1));if(e.key==='ArrowRight')v=Math.min(parseFloat(s.max),+(v+step).toFixed(1));s.value=v;document.getElementById('balanceValue').textContent=v.toFixed(1)+' dB';updateBalanceAbsolute(v);}
  });

  // Load from localStorage
  try{const saved=localStorage.getItem('ci-loudness-data-v3');if(saved){const d=JSON.parse(saved);
    if(d.manufacturer&&MANUFACTURERS[d.manufacturer]){manufacturer=d.manufacturer;numElectrodes=MANUFACTURERS[manufacturer].count;document.getElementById('manufacturerSelect').value=manufacturer;}
    if(d.frequencies)freqs=d.frequencies;if(d.electrodeStatus)electrodeStatus=d.electrodeStatus;if(d.electrodeNotes)electrodeNotes=d.electrodeNotes;
    if(d.electrodeExcludedDuring)electrodeExcludedDuring=d.electrodeExcludedDuring;if(d.referenceElectrode!==undefined)referenceElectrode=d.referenceElectrode;
    if(d.judgmentResults)judgmentResults=d.judgmentResults;if(d.balanceResults)balanceResults=d.balanceResults;
    buildFreqTable();}}catch(e){}

  setInterval(()=>{try{localStorage.setItem('ci-loudness-data-v3',JSON.stringify({manufacturer,frequencies:freqs,electrodeStatus,electrodeNotes,electrodeExcludedDuring,referenceElectrode,judgmentResults,balanceResults}));}catch(e){}},5000);
});

// ===========================================
// PLAYER
// ===========================================
let playerCtx=null,playerBuffer=null,playerSource=null,playerGain=null,playerEqFilters=[],playerPlaying=false,playerStartOffset=0,playerStartTime2=0;

function getPlayerCtx(){if(!playerCtx)playerCtx=new(window.AudioContext||window.webkitAudioContext)();if(playerCtx.state==='suspended')playerCtx.resume();return playerCtx;}

document.getElementById('playerAudioFile').addEventListener('change',async function(e){
  const file=e.target.files[0];if(!file)return;
  try{const ctx=getPlayerCtx(),buf=await file.arrayBuffer();playerBuffer=await ctx.decodeAudioData(buf);
    if(playerBuffer.numberOfChannels>1){const m=ctx.createBuffer(1,playerBuffer.length,playerBuffer.sampleRate),md=m.getChannelData(0);for(let s=0;s<playerBuffer.length;s++){let sum=0;for(let c=0;c<playerBuffer.numberOfChannels;c++)sum+=playerBuffer.getChannelData(c)[s];md[s]=sum/playerBuffer.numberOfChannels;}playerBuffer=m;}
    document.getElementById('playerTotalTime').textContent=playerFmt(playerBuffer.duration);
    document.getElementById('playerControls').style.display=''; playerBuildEQ(); playerDrawEQ(); playerBuildTable();
    document.getElementById('playerEqViz').style.display='';
  }catch(err){alert('Error: '+err.message);}
});

function playerComputeQ(idx){let fL,fH;if(idx===0){fL=freqs[0]*freqs[0]/freqs[1];fH=freqs[1];}else if(idx===numElectrodes-1){fL=freqs[idx-1];fH=freqs[idx]*freqs[idx]/freqs[idx-1];}else{fL=freqs[idx-1];fH=freqs[idx+1];}const bw=Math.log2(Math.sqrt(freqs[idx]*fH))-Math.log2(Math.sqrt(fL*freqs[idx]));return freqs[idx]/(freqs[idx]*(Math.pow(2,bw/2)-Math.pow(2,-bw/2)));}

function playerBuildEQ(){const ctx=getPlayerCtx();playerEqFilters.forEach(f=>f.disconnect());playerEqFilters=[];
  if(!playerGain){playerGain=ctx.createGain();playerGain.gain.value=parseInt(document.getElementById('playerVolume').value)/100;playerGain.connect(ctx.destination);}
  const{levels}=computeWeightedLS();const eqOn=document.getElementById('playerEqToggle').checked,str=parseInt(document.getElementById('playerStrength').value)/100;
  for(let i=0;i<numElectrodes;i++){const f=ctx.createBiquadFilter();f.type='peaking';f.frequency.value=freqs[i];f.Q.value=playerComputeQ(i);
    const excl=electrodeStatus[i]==='excluded'||electrodeStatus[i]==='mute';
    // Check if electrode has usable data
    const hasData=balanceResults.some(r=>(r.a===i||r.b===i)&&electrodeStatus[r.a]!=='excluded'&&electrodeStatus[r.a]!=='mute'&&electrodeStatus[r.b]!=='excluded'&&electrodeStatus[r.b]!=='mute');
    f.gain.value=(hasData&&eqOn)?-levels[i]*str:0;
    playerEqFilters.push(f);}
  for(let i=0;i<playerEqFilters.length-1;i++)playerEqFilters[i].connect(playerEqFilters[i+1]);
}

function playerUpdateEQ(){const{levels}=computeWeightedLS();const eqOn=document.getElementById('playerEqToggle').checked,str=parseInt(document.getElementById('playerStrength').value)/100;
  for(let i=0;i<playerEqFilters.length;i++){const hasData=balanceResults.some(r=>(r.a===i||r.b===i)&&electrodeStatus[r.a]!=='excluded'&&electrodeStatus[r.a]!=='mute'&&electrodeStatus[r.b]!=='excluded'&&electrodeStatus[r.b]!=='mute');playerEqFilters[i].gain.value=(hasData&&eqOn)?-levels[i]*str:0;}
  playerDrawEQ();playerBuildTable();}

function playerTogglePlay(){if(!playerBuffer)return;if(playerCtx.state==='suspended')playerCtx.resume();if(playerPlaying)playerPause();else playerPlay();}
function playerPlay(){if(playerSource){try{playerSource.stop();}catch(e){}}const ctx=getPlayerCtx();playerSource=ctx.createBufferSource();playerSource.buffer=playerBuffer;
  if(playerEqFilters.length>0){playerSource.connect(playerEqFilters[0]);playerEqFilters[playerEqFilters.length-1].connect(playerGain);}else playerSource.connect(playerGain);
  playerSource.onended=function(){if(playerPlaying){playerPlaying=false;playerStartOffset=0;playerUpdateBtn();playerUpdateTL();}};
  playerSource.start(0,playerStartOffset);playerStartTime2=ctx.currentTime-playerStartOffset;playerPlaying=true;playerUpdateBtn();requestAnimationFrame(playerTick);}
function playerPause(){if(playerSource){playerSource.onended=null;try{playerSource.stop();}catch(e){}}playerStartOffset=playerCtx.currentTime-playerStartTime2;if(playerStartOffset>playerBuffer.duration)playerStartOffset=0;playerPlaying=false;playerUpdateBtn();}
function playerTick(){if(!playerPlaying)return;playerUpdateTL();requestAnimationFrame(playerTick);}
function playerUpdateTL(){if(!playerBuffer)return;const c=playerPlaying?playerCtx.currentTime-playerStartTime2:playerStartOffset;const cl=Math.min(c,playerBuffer.duration);document.getElementById('playerCurrentTime').textContent=playerFmt(cl);document.getElementById('playerTimeline').value=(cl/playerBuffer.duration)*1000;}
function playerUpdateBtn(){document.getElementById('playerPlayBtn').textContent=playerPlaying?'\u23F8':'\u25B6';}
function playerFmt(s){if(!isFinite(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
function playerCheckData(){const h=balanceResults.length>0;document.getElementById('playerNoData').classList.toggle('hidden',h);if(h&&playerEqFilters.length>0)playerUpdateEQ();}

document.getElementById('playerPlayBtn').addEventListener('click',playerTogglePlay);
document.getElementById('playerTimeline').addEventListener('input',function(){if(!playerBuffer)return;playerStartOffset=(this.value/1000)*playerBuffer.duration;document.getElementById('playerCurrentTime').textContent=playerFmt(playerStartOffset);if(playerPlaying){playerPause();playerPlay();}});
document.getElementById('playerVolume').addEventListener('input',function(){if(playerGain)playerGain.gain.value=this.value/100;document.getElementById('playerVolumeLabel').textContent=this.value+'%';});
document.getElementById('playerEqToggle').addEventListener('change',playerUpdateEQ);
document.getElementById('playerStrength').addEventListener('input',function(){document.getElementById('playerStrengthLabel').textContent=this.value+'%';playerUpdateEQ();});

function playerDrawEQ(){const canvas=document.getElementById('playerEqCanvas');if(!canvas)return;const wrap=canvas.parentElement,dpr=window.devicePixelRatio||1,W=wrap.clientWidth,H=wrap.clientHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const{levels}=computeWeightedLS();const eqOn=document.getElementById('playerEqToggle').checked,str=parseInt(document.getElementById('playerStrength').value)/100;
  const active=getActiveElectrodes();let maxAbs=1;for(const i of active){const g=Math.abs(levels[i])*str;if(g>maxAbs)maxAbs=g;}maxAbs=Math.ceil(maxAbs/2)*2+2;
  const pad={left:44,right:16,top:16,bottom:28},plotW=W-pad.left-pad.right,plotH=H-pad.top-pad.bottom,zeroY=pad.top+plotH/2;
  const barW=Math.max(6,(plotW/active.length)*0.6),gapW=plotW/active.length;
  ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.setLineDash([2,4]);ctx.beginPath();ctx.moveTo(pad.left,zeroY);ctx.lineTo(W-pad.right,zeroY);ctx.stroke();
  const steps=Math.min(4,Math.floor(maxAbs/2));
  for(let s=1;s<=steps;s++){const dB=s*(maxAbs/steps),yOff=(dB/maxAbs)*(plotH/2);ctx.beginPath();ctx.moveTo(pad.left,zeroY-yOff);ctx.lineTo(W-pad.right,zeroY-yOff);ctx.stroke();ctx.beginPath();ctx.moveTo(pad.left,zeroY+yOff);ctx.lineTo(W-pad.right,zeroY+yOff);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#999';ctx.font='10px Consolas,monospace';ctx.textAlign='right';ctx.fillText('+'+dB.toFixed(0),pad.left-4,zeroY-yOff+3);ctx.fillText('-'+dB.toFixed(0),pad.left-4,zeroY+yOff+3);ctx.setLineDash([2,4]);}
  ctx.setLineDash([]);ctx.fillStyle='#999';ctx.font='10px Consolas,monospace';ctx.textAlign='right';ctx.fillText('0',pad.left-4,zeroY+3);
  for(let j=0;j<active.length;j++){const i=active[j],x=pad.left+j*gapW+(gapW-barW)/2;
    const hasData=balanceResults.some(r=>(r.a===i||r.b===i)&&electrodeStatus[r.a]!=='excluded'&&electrodeStatus[r.a]!=='mute'&&electrodeStatus[r.b]!=='excluded'&&electrodeStatus[r.b]!=='mute');
    let ag=hasData&&eqOn?-levels[i]*str:0;const bH=(Math.abs(ag)/maxAbs)*(plotH/2),y=ag>=0?zeroY-bH:zeroY;
    ctx.fillStyle=!hasData?'#ccc':ag>=0?'#16a34a':'#dc2626';if(bH>0.5)ctx.fillRect(x,y,barW,bH);else{ctx.fillStyle='#ccc';ctx.fillRect(x,zeroY-0.5,barW,1);}
    ctx.fillStyle='#666';ctx.font='9px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('E'+displayElNum(i),pad.left+j*gapW+gapW/2,H-pad.bottom+12);
    ctx.font='8px Consolas,monospace';ctx.fillStyle='#999';ctx.fillText(freqs[i]>=1000?(freqs[i]/1000).toFixed(1)+'k':freqs[i],pad.left+j*gapW+gapW/2,H-pad.bottom+22);}
}

function playerBuildTable(){const{levels}=computeWeightedLS();const eqOn=document.getElementById('playerEqToggle').checked,str=parseInt(document.getElementById('playerStrength').value)/100;
  const hdr=document.getElementById('playerEqHeader'),lv=document.getElementById('playerEqLevels'),gn=document.getElementById('playerEqGains');
  hdr.innerHTML='<th></th>';lv.innerHTML='<td style="color:var(--text-muted);font-size:.8em;">Pegel</td>';gn.innerHTML='<td style="color:var(--text-muted);font-size:.8em;">Gain</td>';
  for(let i=0;i<numElectrodes;i++){hdr.innerHTML+=`<th>E${displayElNum(i)}</th>`;
    const hasData=balanceResults.some(r=>(r.a===i||r.b===i)&&electrodeStatus[r.a]!=='excluded'&&electrodeStatus[r.a]!=='mute'&&electrodeStatus[r.b]!=='excluded'&&electrodeStatus[r.b]!=='mute');
    if(!hasData){lv.innerHTML+='<td style="opacity:.4;">—</td>';gn.innerHTML+='<td style="opacity:.4;">—</td>';continue;}
    const v=levels[i];lv.innerHTML+=`<td style="color:${v>0.05?'#2563eb':v<-0.05?'#dc2626':'#666'}">${v>=0?'+':''}${v.toFixed(1)}</td>`;
    const g=eqOn?-v*str:0;gn.innerHTML+=`<td style="color:${g>0.05?'#16a34a':g<-0.05?'#dc2626':'#666'}">${g>=0?'+':''}${g.toFixed(1)}</td>`;}}

window.addEventListener('resize',()=>{if(balanceResults.length>0)playerDrawEQ();});
</script>
