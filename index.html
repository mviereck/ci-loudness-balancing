<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI Loudness Balancing Tool</title>
<style>
:root{--bg:#f8f7f4;--surface:#fff;--border:#d4d0c8;--text:#1a1a1a;--text-muted:#666;--accent:#2563eb;--accent-hover:#1d4ed8;--accent-light:#dbeafe;--danger:#dc2626;--success:#16a34a;--warning:#d97706;--font:'Segoe UI',system-ui,-apple-system,sans-serif;--mono:'Consolas','Menlo',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px}
h1{font-size:1.4em;font-weight:600;margin-bottom:4px}
.header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.subtitle{color:var(--text-muted);font-size:.9em;margin-bottom:20px}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border);flex-wrap:wrap}
.tab{padding:10px 16px;border:none;background:none;cursor:pointer;font-size:.92em;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;font-family:var(--font);transition:color .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.panel{display:none}.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card h2{font-size:1.05em;font-weight:600;margin-bottom:12px}
.card h3{font-size:.95em;font-weight:600;margin-bottom:8px;color:var(--text-muted)}
.freq-table{width:100%;border-collapse:collapse;font-size:.86em}
.freq-table th,.freq-table td{padding:4px 5px;text-align:center;border-bottom:1px solid var(--border)}
.freq-table th{background:var(--bg);font-weight:600;font-size:.8em;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted)}
.freq-table input[type="number"]{width:70px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.88em}
.freq-table select{padding:2px 3px;border:1px solid var(--border);border-radius:4px;font-size:.78em;font-family:var(--font)}
.freq-table input[type="text"]{width:100px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:.8em}
.pbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.85em;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.pbtn:hover{background:var(--accent-light);border-color:var(--accent)}
.pbtn.active{background:var(--accent-light);border-color:var(--accent)}
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-family:var(--font);font-size:.92em;transition:all .15s;min-height:40px}
.btn:hover{background:var(--bg)}.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover{background:var(--accent-hover)}
.btn-large{padding:12px 28px;font-size:1.05em;min-height:48px}.btn:disabled{opacity:.4;cursor:default}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:4px 10px;font-size:.82em;min-height:28px;border-radius:4px}
.controls-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.control-group{display:flex;align-items:center;gap:6px}
.control-group label{font-size:.85em;color:var(--text-muted);white-space:nowrap}
.control-group input[type="range"]{width:110px}
.control-group input[type="number"]{width:65px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.88em}
.control-group select{padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-family:var(--font);font-size:.88em;background:var(--surface)}
.test-display{text-align:center;padding:24px 16px}
.pair-freq{color:var(--text-muted);margin-bottom:8px}
.progress-label{color:var(--text-muted);font-size:.9em}
.judgment-buttons{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.judgment-buttons .btn{min-width:130px;font-size:1em}
.balance-slider-wrap{margin:16px auto;max-width:400px}
.balance-slider-wrap input[type="range"]{width:100%;margin:8px 0}
.balance-value{font-family:var(--mono);font-size:1.15em;font-weight:600;text-align:center}
.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:16px}
canvas{width:100%;height:auto}
.results-table{width:100%;border-collapse:collapse;font-size:.86em;font-family:var(--mono)}
.results-table th,.results-table td{padding:5px 8px;text-align:center;border-bottom:1px solid var(--border)}
.results-table th{background:var(--bg);font-family:var(--font);font-weight:600;font-size:.8em;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted)}
.kbd{display:inline-block;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:var(--bg);font-family:var(--mono);font-size:.78em;line-height:1.4}
.hidden{display:none}
.pair-indicator{display:inline-flex;gap:16px;font-size:1.5em;font-weight:700;margin:8px 0;align-items:center}
.pair-indicator .tone-a,.pair-indicator .tone-b{padding:6px 20px;border-radius:8px}
.pair-indicator .tone-a{background:#dbeafe;color:#1e40af}.pair-indicator .tone-b{background:#fef3c7;color:#92400e}
.pair-indicator .playing{outline:3px solid var(--accent);outline-offset:2px}
.warning-bar{background:#fef3c7;color:var(--warning);padding:8px 14px;border-radius:6px;margin-bottom:10px;font-size:.88em;line-height:1.5}
.round-info{background:#f0fdf4;color:var(--success);padding:8px 14px;border-radius:6px;margin-bottom:10px;font-size:.88em}
.info-box{background:var(--accent-light);color:var(--accent);padding:10px 14px;border-radius:6px;margin-bottom:10px;font-size:.85em;line-height:1.5}
.excluded-row{opacity:.4}
.aba-label{font-size:.65em;font-weight:400;color:var(--text-muted);display:block}
.timer-display{font-family:var(--mono);font-size:.85em;color:var(--text-muted)}
.el-extra{font-size:.7em;color:var(--text-muted);font-weight:400}
.lang-select{padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:.85em;background:var(--surface);font-family:var(--font)}
.explain{font-size:.82em;color:var(--text-muted);line-height:1.5;margin-top:8px;padding:10px;background:var(--bg);border-radius:6px;border-left:3px solid var(--accent)}
.explain-warn{border-left-color:var(--warning)}
@media print{body{background:#fff}.tabs,.btn,.controls-row,.judgment-buttons,.balance-slider-wrap,.no-print{display:none!important}.panel{display:block!important}.card{border:1px solid #ccc;break-inside:avoid}}
@media(max-width:768px){.container{padding:12px}.freq-table{font-size:.76em}.freq-table input[type="number"]{width:55px}.judgment-buttons .btn{min-width:90px}.tab{padding:8px 10px;font-size:.84em}}
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>CI Loudness Balancing Tool</h1>
    <select class="lang-select" id="langSelect">
      <option value="de">🇩🇪 Deutsch</option><option value="en">🇬🇧 English</option>
      <option value="fr">🇫🇷 Français</option><option value="es">🇪🇸 Español</option>
    </select>
  </div>
  <p class="subtitle" id="subtitleText"></p>

  <div class="tabs">
    <button class="tab active" data-tab="setup" id="tabSetup"></button>
    <button class="tab" data-tab="test" id="tabTest">Test</button>
    <button class="tab" data-tab="results" id="tabResults"></button>
    <button class="tab" data-tab="player" id="tabPlayer">Player</button>
    <button class="tab" data-tab="file" id="tabFile"></button>
  </div>

  <!-- ===== SETUP ===== -->
  <div id="panel-setup" class="panel active">
    <div class="card">
      <h2 id="freqTitle"></h2>
      <div class="controls-row">
        <div class="control-group"><label id="lblMfr"></label>
          <select id="mfrSelect"><option value="medel">MED-EL (12)</option><option value="ab">Advanced Bionics (16)</option><option value="cochlear">Cochlear (22)</option></select>
        </div>
      </div>
      <p style="font-size:.84em;color:var(--text-muted);margin-bottom:10px" id="freqHint"></p>
      <div style="overflow-x:auto"><table class="freq-table" id="freqTable"><thead><tr id="freqTH"></tr></thead><tbody id="freqTB"></tbody></table></div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn" id="resetBtn"></button>
        <button class="btn" id="sweepBtn"></button>
        <button class="btn" id="stopBtn"></button>
        <label style="margin-left:12px;font-size:.85em;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="corrToggle"> <span id="lblCorr"></span>
        </label>
      </div>
    </div>
    <div class="card">
      <h2 id="toneTitle"></h2>
      <div class="controls-row">
        <div class="control-group"><label id="lblVol"></label><input type="range" id="vol1" min="0" max="100" value="50"><span id="volL1">50%</span></div>
        <div class="control-group"><label id="lblDur"></label><input type="number" id="dur1" value="1000" min="100" max="3000" step="50"> ms</div>
        <div class="control-group"><label id="lblPau"></label><input type="number" id="pau1" value="500" min="100" max="1000" step="50"> ms</div>
      </div>
    </div>
  </div>

  <!-- ===== TEST ===== -->
  <div id="panel-test" class="panel">
    <div class="card no-print">
      <h2 id="testTitle"></h2>
      <div class="controls-row">
        <div class="control-group"><label id="lblMode"></label>
          <select id="testMode"><option value="balance" id="optBal"></option><option value="judgment" id="optJdg"></option></select></div>
        <div class="control-group"><label id="lblRun"></label>
          <select id="pairType"><option value="full" id="optFull"></option><option value="convergence" id="optConv"></option><option value="conv_fast" id="optCF"></option><option value="manual" id="optMan"></option></select></div>
      </div>
      <div id="runExplain" class="info-box"></div>
      <div class="controls-row">
        <div class="control-group"><label id="lblRef"></label><select id="refEl"></select></div>
      </div>
      <div class="controls-row">
        <div class="control-group"><label id="lblVol2"></label><input type="range" id="vol2" min="0" max="100" value="50"><span id="volL2">50%</span></div>
        <div class="control-group"><label id="lblDur2"></label><input type="number" id="dur2" value="1000" min="100" max="3000" step="50"> ms</div>
        <div class="control-group"><label id="lblPau2"></label><input type="number" id="pau2" value="500" min="100" max="1000" step="50"> ms</div>
      </div>
      <div id="manualSel" class="hidden" style="margin-top:8px">
        <div class="control-group"><label>A:</label><select id="manA"></select><label style="margin-left:10px">B:</label><select id="manB"></select>
          <button class="btn" id="manPlayBtn" style="margin-left:10px">&#9654;</button></div>
      </div>
      <div style="margin-top:12px" class="btn-group">
        <button class="btn btn-primary btn-large" id="startBtn"></button>
        <button class="btn btn-large" id="stopTBtn" disabled></button>
      </div>
    </div>
    <div class="card" id="testArea" style="display:none">
      <div id="roundInfo" class="round-info hidden"></div>
      <div class="test-display">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span class="progress-label" id="progLbl"></span><span class="timer-display" id="timerD">0:00</span>
        </div>
        <div class="pair-indicator">
          <span class="tone-a" id="tAL"><span class="aba-label">A (Ref)</span>E1</span>
          <span style="align-self:center;font-weight:400;font-size:.55em;color:var(--text-muted)">vs.</span>
          <span class="tone-b" id="tBL"><span class="aba-label">B (Slider)</span>E2</span>
        </div>
        <div class="pair-freq" id="pairF"></div>
        <div style="margin:12px 0;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;align-items:center">
          <button class="btn btn-large" id="undoBtn" disabled>&#9664; <span data-t="bBack"></span> <span class="kbd">Z</span></button>
          <button class="btn btn-large" id="repBtn">&#9654; <span data-t="bReplay"></span> <span class="kbd" data-t="kSpace"></span></button>
          <select id="paraI" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:.84em"><option value="aba">ABA</option><option value="ab">AB</option></select>
          <button class="btn" id="exclBtn" style="color:var(--danger)">&#10005; <span data-t="bExcl"></span> <span class="kbd">X</span></button>
        </div>
        <div id="jdgC" style="display:none"><div class="judgment-buttons">
          <button class="btn btn-large" id="bAL">A <span data-t="bLoud"></span> <span class="kbd">1</span></button>
          <button class="btn btn-large" id="bEq"><span data-t="bEqual"></span> <span class="kbd">2</span></button>
          <button class="btn btn-large" id="bBL">B <span data-t="bLoud2"></span> <span class="kbd">3</span></button>
        </div></div>
        <div id="balC">
          <div class="balance-slider-wrap">
            <p style="font-size:.84em;color:var(--text-muted);margin-bottom:3px" data-t="slHint"></p>
            <input type="range" id="balSl" min="-20" max="20" step="0.1" value="0">
            <div class="balance-value" id="balV">0.0 dB</div>
            <div id="balAbs" style="font-size:.82em;color:var(--text-muted);text-align:center;margin-top:2px;display:none"></div>
            <div id="extWrap" style="text-align:center;margin-top:5px;display:none"><button class="btn btn-sm" id="extBtn" data-t="bExtend"></button></div>
          </div>
          <div style="margin-top:10px"><button class="btn btn-primary btn-large" id="confBtn"><span data-t="bConf"></span> <span class="kbd">Enter</span></button></div>
        </div>
      </div>
    </div>
    <div id="exclDlg" class="card hidden" style="text-align:center">
      <h2 data-t="exclTitle"></h2><p id="exclInfo" style="color:var(--text-muted);margin-bottom:14px"></p>
      <div class="btn-group" style="justify-content:center"><button class="btn btn-large" id="exclA"></button><button class="btn btn-large" id="exclB"></button><button class="btn" id="exclCanc" data-t="bCanc"></button></div>
    </div>
  </div>

  <!-- ===== RESULTS ===== -->
  <div id="panel-results" class="panel">
    <div class="card">
      <h2 id="resTitle"></h2>
      <div id="noRes"><p style="color:var(--text-muted)" data-t="noRes"></p></div>
      <div id="resC" style="display:none">
        <p style="font-size:.84em;color:var(--text-muted);margin-bottom:10px" id="resMeta"></p>
        <div class="chart-container"><canvas id="resChart" width="800" height="320"></canvas>
          <p id="chartExpl" style="font-size:.82em;color:var(--text-muted);margin-top:10px;line-height:1.5"></p>
        </div>
        <div style="overflow-x:auto;margin-top:14px"><table class="results-table" id="resT"><thead><tr id="resTH"></tr></thead><tbody id="resTB"></tbody></table></div>
        <div class="explain" id="resExplain"></div>
      </div>
    </div>
  </div>

  <!-- ===== PLAYER ===== -->
  <div id="panel-player" class="panel">
    <div class="card">
      <h2 data-t="plTitle"></h2>
      <p style="font-size:.84em;color:var(--text-muted);margin-bottom:10px" data-t="plDesc"></p>
      <div id="plNoD" class="hidden warning-bar" data-t="plNoData"></div>
      <div style="margin-bottom:14px"><label style="font-size:.84em;color:var(--text-muted);display:block;margin-bottom:4px" data-t="plFile"></label>
        <input type="file" id="plAudio" accept=".mp3,.wav,.flac,.ogg,.m4a,.mp4,audio/*" style="font-size:.88em"></div>
      <div id="plCtrl" style="display:none">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <button class="btn" id="plPlay" style="width:44px;height:44px;border-radius:50%;font-size:1.1em;display:flex;align-items:center;justify-content:center;padding:0">&#9654;</button>
          <div style="flex:1;display:flex;flex-direction:column;gap:3px">
            <input type="range" id="plTL" min="0" max="1000" value="0" step="1" style="width:100%">
            <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:.78em;color:var(--text-muted)"><span id="plCur">0:00</span><span id="plTot">0:00</span></div>
          </div>
        </div>
        <div class="controls-row">
          <div class="control-group"><label data-t="lblVol"></label><input type="range" id="plVol" min="0" max="100" value="80" style="width:80px"><span id="plVolL" style="font-family:var(--mono);font-size:.84em;min-width:34px">80%</span></div>
          <div class="control-group"><label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="plEqOn" checked> EQ</label></div>
          <div class="control-group"><label data-t="plEqStr"></label><input type="range" id="plStr" min="0" max="150" value="100" step="1" style="width:90px"><span id="plStrL" style="font-family:var(--mono);font-size:.84em;min-width:34px">100%</span></div>
          <div class="btn-group"><button class="btn btn-sm plStrBtn" data-v="50">50%</button><button class="btn btn-sm plStrBtn" data-v="75">75%</button><button class="btn btn-sm plStrBtn" data-v="100">100%</button><button class="btn btn-sm plStrBtn" data-v="150">150%</button></div>
          <span style="font-family:var(--mono);font-size:.72em;color:var(--text-muted);background:var(--bg);padding:2px 6px;border-radius:4px">Mono</span>
        </div>
        <div class="controls-row" style="margin-top:8px">
          <div class="control-group"><label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="plNHSim"> <span data-t="plNHLabel"></span></label></div>
        </div>
        <div id="plNHInfo" class="explain explain-warn hidden" data-t="plNHExpl"></div>
        <div class="controls-row" style="margin-top:8px">
          <div class="control-group"><label>MAPLAW c:</label><input type="number" id="plMaplaw" value="500" min="0" max="8000" step="50" style="width:80px"><span style="font-size:.8em;color:var(--text-muted);margin-left:4px">(0–8000)</span></div>
          <div class="control-group"><label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="plMapOn"> <span data-t="plMapLabel"></span></label></div>
        </div>
        <div id="plMapInfo" class="explain hidden" data-t="plMapExpl"></div>
      </div>
    </div>
    <div id="plEqViz" class="card" style="display:none">
      <h2 data-t="plEqTitle"></h2>
      <div style="position:relative;width:100%;height:180px;background:var(--bg);border-radius:8px;overflow:hidden"><canvas id="plEqCv" style="width:100%;height:100%;display:block"></canvas></div>
      <div style="margin-top:12px;overflow-x:auto"><table class="results-table" style="font-size:.78em"><thead><tr id="plEqH"></tr></thead><tbody><tr id="plEqLv"></tr><tr id="plEqGn"></tr></tbody></table></div>
      <p class="explain explain-warn" data-t="plNotice"></p>
    </div>
  </div>

  <!-- ===== FILE ===== -->
  <div id="panel-file" class="panel">
    <div class="card">
      <h2 data-t="fileTitle"></h2>
      <p style="font-size:.84em;color:var(--text-muted);margin-bottom:14px" data-t="fileDesc"></p>
      <div class="btn-group" style="margin-bottom:16px">
        <button class="btn" id="fLoadBtn">&#128194; <span data-t="fLoad"></span></button>
        <button class="btn" id="fSaveBtn">&#128190; <span data-t="fSave"></span></button>
        <button class="btn" id="fPrintBtn">&#128424; <span data-t="fPrint"></span></button>
        <button class="btn" id="fCopyBtn">&#128203; <span data-t="fCopy"></span></button>
        <button class="btn" id="fClearBtn" style="color:var(--danger)">&#128465; <span data-t="fClear"></span></button>
      </div>
      <input type="file" id="fInput" accept=".json" class="hidden">
      <div class="explain" data-t="fExplain"></div>
    </div>
    <div class="card">
      <h2>EasyEffects Export</h2>
      <p style="font-size:.84em;color:var(--text-muted);margin-bottom:10px" data-t="eeDesc"></p>
      <button class="btn" id="eeExportBtn">&#128190; <span data-t="eeExport"></span></button>
      <div class="explain" style="margin-top:10px" data-t="eeHowTo"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// I18N
// ============================================================
const L={
de:{
subtitle:'Wahrgenommene Lautstärke über CI-Elektroden vergleichen · v4',
tabFreq:'Frequenzen',tabResults:'Ergebnisse',tabFile:'Laden/Speichern',
freqTitle:'Elektrodenfrequenzen & Status',lblMfr:'Hersteller:',
freqHint:'Standardwerte nach bicial. Eigene FAT-Werte direkt eintragen. ▶ = Einzelton, ◼ = Dauerton (Klick beendet).',
thEl:'El.',thHz:'Hz',thPlay:'▶',thHold:'◼',thSt:'Status',thNote:'Notiz',
resetFreq:'Zurücksetzen',sweep:'▶ Sweep',stop:'■ Stopp',lblCorr:'Korrektur anwenden',
toneTitle:'Tonparameter',lblVol:'Lautstärke:',lblDur:'Tondauer:',lblPau:'Pause:',
testTitle:'Testeinstellungen',lblMode:'Modus:',optBal:'Ausgleichsmodus (dB-Offset)',optJdg:'Urteilsmodus (A/gleich/B)',
lblRun:'Testverfahren:',optFull:'Vollständig (alle Paare)',optConv:'Konvergenz (bis stabil)',optCF:'Konvergenz schnell',optMan:'Manuell',

const MFR={medel:{name:'MED-EL',n:12,apFirst:true,freqs:[120,235,384,579,836,1175,1624,2222,3019,4084,5507,7410]},ab:{name:'Advanced Bionics',n:16,apFirst:true,freqs:[333,455,540,642,762,906,1076,1278,1518,1803,2142,2544,3022,3590,4264,6665]},cochlear:{name:'Cochlear',n:22,apFirst:false,freqs:[250,375,500,625,750,875,1000,1125,1250,1500,1750,2000,2250,2625,3000,3500,4000,4625,5250,6000,6875,8000]}};
let mfr='medel',nEl=12,freqs=[...MFR.medel.freqs];
let elSt=[],elNt=[],elExDur=[];
function initEl(){elSt=new Array(nEl).fill(null);elNt=new Array(nEl).fill('');elExDur=new Array(nEl).fill(null);}
initEl();
function dEN(i){return MFR[mfr].apFirst?i+1:nEl-i;}

let audioCtx=null,curOsc=null,playTO=null,sweepAct=false,isPlay=false,holdIdx=-1;
let testAct=false,testPairs=[],testIdx=0,testMode='balance',curPlayed=false,curBase=0,slExt=false;
let curA=-1,curB=-1,undoSt=[],tStart=0,tInt=null,compCnt=0,convRnd=0,refEl=5;
let jRes=[],bRes=[];

// ============================================================
// AUDIO
// ============================================================
function gAC(){if(!audioCtx||audioCtx.state==='closed')audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function gVol(){return Math.pow((testAct?document.getElementById('vol2'):document.getElementById('vol1')).value/100,2);}
function gDur(){return parseInt((testAct?document.getElementById('dur2'):document.getElementById('dur1')).value)||1000;}
function gPau(){return parseInt((testAct?document.getElementById('pau2'):document.getElementById('pau1')).value)||500;}
function dB2G(d){return Math.pow(10,d/20);}
function stopAll(){if(curOsc){try{curOsc.stop();}catch(e){}curOsc=null;}if(playTO){clearTimeout(playTO);playTO=null;}sweepAct=false;isPlay=false;holdIdx=-1;updInd(-1);}
function playTone(hz,vol,ms,ramp=20){return new Promise(r=>{const c=gAC(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=hz;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(Math.max(0,vol),c.currentTime+ramp/1000);g.gain.setValueAtTime(Math.max(0,vol),c.currentTime+(ms-ramp)/1000);g.gain.linearRampToValueAtTime(0,c.currentTime+ms/1000);o.connect(g);g.connect(c.destination);curOsc=o;o.start();o.stop(c.currentTime+ms/1000+.01);o.onended=()=>{curOsc=null;r();};});}
function playHold(hz,vol){stopAll();const c=gAC(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=hz;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(Math.max(0,vol),c.currentTime+.02);o.connect(g);g.connect(c.destination);curOsc=o;o.start();}
function corrG(i){if(!document.getElementById('corrToggle').checked||bRes.length===0)return 1;const{levels}=compWLS();return dB2G(-levels[i]);}
async function playSingle(i){stopAll();isPlay=true;updInd(i);await playTone(freqs[i],gVol()*corrG(i),gDur());isPlay=false;updInd(-1);}
function toggleHold(i){if(holdIdx===i){stopAll();return;}stopAll();holdIdx=i;updInd(i);playHold(freqs[i],gVol()*corrG(i));}
async function playSweep(){stopAll();sweepAct=true;isPlay=true;for(let i=0;i<nEl;i++){if(!sweepAct)break;if(elSt[i]==='excluded'||elSt[i]==='mute')continue;updInd(i);await playTone(freqs[i],gVol()*corrG(i),gDur());if(!sweepAct)break;await new Promise(r=>playTO=setTimeout(r,50+gPau()));}isPlay=false;sweepAct=false;updInd(-1);}
async function playSeq(eA,eB,off){const v=gVol(),d=gDur(),p=gPau(),vB=Math.max(Math.min(v*dB2G(off),1),0);
  updInd(eA,'a');await playTone(freqs[eA],v,d);if(!isPlay)return;updInd(-1);await new Promise(r=>playTO=setTimeout(r,50+p));if(!isPlay)return;
  updInd(eB,'b');await playTone(freqs[eB],vB,d);if(!isPlay)return;
  if(document.getElementById('paraI').value==='aba'){updInd(-1);await new Promise(r=>playTO=setTimeout(r,50+p));if(!isPlay)return;updInd(eA,'a');await playTone(freqs[eA],v,d);}
  isPlay=false;updInd(-1);}
function updInd(i,w){document.querySelectorAll('.freq-table .pbtn[data-a="play"]').forEach((b,j)=>{b.style.background=(j===i)?'var(--accent-light)':'';});
  const a=document.getElementById('tAL'),b=document.getElementById('tBL');if(a)a.classList.toggle('playing',w==='a');if(b)b.classList.toggle('playing',w==='b');}

function buildFreqTable(){
  document.getElementById('freqTH').innerHTML=`<th>${t('thEl')}</th><th>${t('thHz')}</th><th>${t('thPlay')}</th><th>${t('thHold')}</th><th>${t('thSt')}</th><th>${t('thNote')}</th>`;
  const tb=document.getElementById('freqTB');tb.innerHTML='';
  const so=`<option value="">—</option><option value="noisy">${t('stNoisy')}</option><option value="almostMute">${t('stAlmMute')}</option><option value="mute">${t('stMute')}</option><option value="excluded">${t('stExcl')}</option>`;
  for(let i=0;i<nEl;i++){const tr=document.createElement('tr');if(elSt[i]==='excluded')tr.classList.add('excluded-row');
    let ex='';if(i===0)ex=` <span class="el-extra">(${t('apikal')})</span>`;if(i===nEl-1)ex=` <span class="el-extra">(${t('basal')})</span>`;
    tr.innerHTML=`<td style="font-weight:600">${dEN(i)}${ex}</td><td><input type="number" class="fi" data-i="${i}" value="${Math.round(freqs[i])}" min="20" max="20000"></td><td><button class="pbtn" data-a="play" data-i="${i}">&#9654;</button></td><td><button class="pbtn" data-a="hold" data-i="${i}">&#9724;</button></td><td><select class="ss" data-i="${i}">${so}</select></td><td><input type="text" class="ni" data-i="${i}" value="${elNt[i]||''}" placeholder="${t('thNote')}"></td>`;
    tb.appendChild(tr);tr.querySelector('.ss').value=elSt[i]||'';}
  tb.querySelectorAll('.fi').forEach(inp=>inp.addEventListener('change',e=>{const i=+e.target.dataset.i,v=parseFloat(e.target.value);if(v>=20&&v<=20000)freqs[i]=v;else e.target.value=Math.round(freqs[i]);}));
  tb.querySelectorAll('.pbtn[data-a="play"]').forEach(b=>b.addEventListener('click',()=>playSingle(+b.dataset.i)));
  tb.querySelectorAll('.pbtn[data-a="hold"]').forEach(b=>b.addEventListener('click',()=>toggleHold(+b.dataset.i)));
  tb.querySelectorAll('.ss').forEach(s=>s.addEventListener('change',e=>{elSt[+e.target.dataset.i]=e.target.value||null;buildFreqTable();updRef();}));
  tb.querySelectorAll('.ni').forEach(n=>n.addEventListener('change',e=>{elNt[+e.target.dataset.i]=e.target.value;}));
  updRef();updManSel();}
function updRef(){const s=document.getElementById('refEl'),p=s.value;s.innerHTML='';
  for(let i=0;i<nEl;i++){if(elSt[i]==='excluded'||elSt[i]==='mute')continue;s.innerHTML+=`<option value="${i}">E${dEN(i)} (${Math.round(freqs[i])} Hz)</option>`;}
  if(p&&s.querySelector(`option[value="${p}"]`))s.value=p;else s.value=String(Math.floor(nEl/2));refEl=+s.value;}
function updManSel(){['manA','manB'].forEach(id=>{const s=document.getElementById(id);s.innerHTML='';for(let i=0;i<nEl;i++){if(elSt[i]==='excluded'||elSt[i]==='mute')continue;s.innerHTML+=`<option value="${i}">E${dEN(i)} (${Math.round(freqs[i])} Hz)</option>`;}});const b=document.getElementById('manB');if(b.options.length>1)b.selectedIndex=1;}
function switchMfr(m){mfr=m;nEl=MFR[m].n;freqs=[...MFR[m].freqs];initEl();jRes=[];bRes=[];refEl=Math.floor(nEl/2);buildFreqTable();}
function resetFreqs(){freqs=[...MFR[mfr].freqs];initEl();buildFreqTable();}

// ============================================================
// PAIRS & WEIGHTED LEAST SQUARES
// ============================================================
function actEl(){return[...Array(nEl).keys()].filter(i=>elSt[i]!=='excluded'&&elSt[i]!=='mute');}
function allPairs(){const a=actEl(),p=[];for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++)p.push([a[i],a[j]]);return p;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function randAB(p){return p.map(([x,y])=>Math.random()<.5?[x,y]:[y,x]);}
function gWt(i){const s=elSt[i];if(s==='excluded'||s==='mute')return 0;if(s==='almostMute')return .1;if(s==='noisy')return .5;return 1;}
function compWLS(){const n=nEl,lv=new Array(n).fill(0);
  const valid=bRes.filter(r=>r.a>=0&&r.a<n&&r.b>=0&&r.b<n&&elSt[r.a]!=='excluded'&&elSt[r.a]!=='mute'&&elSt[r.b]!=='excluded'&&elSt[r.b]!=='mute');
  if(!valid.length)return{levels:lv,residuals:[],elRes:new Array(n).fill(0),elWt:new Array(n).fill(1)};
  for(let it=0;it<80;it++){const su=new Array(n).fill(0),wt=new Array(n).fill(0);
    for(const r of valid){const w=Math.min(gWt(r.a),gWt(r.b));su[r.b]+=(lv[r.a]-r.offset)*w;wt[r.b]+=w;su[r.a]+=(lv[r.b]+r.offset)*w;wt[r.a]+=w;}
    for(let i=0;i<n;i++){if(i===refEl){lv[i]=0;continue;}if(wt[i]>0)lv[i]=su[i]/wt[i];}}
  const res=valid.map(r=>({...r,residual:Math.abs(r.offset-(lv[r.a]-lv[r.b]))}));
  const ea=new Array(n).fill(null).map(()=>[]);for(const r of res){ea[r.a].push(r.residual);ea[r.b].push(r.residual);}
  const elRes=ea.map(a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0);
  return{levels:lv,residuals:res,elRes,elWt:new Array(n).fill(0).map((_,i)=>gWt(i))};}

function getConvPairs(fast){
  if(fast&&bRes.length>0){const{residuals}=compWLS();const act=new Set(actEl());
    const vr=residuals.filter(r=>act.has(r.a)&&act.has(r.b)).sort((a,b)=>b.residual-a.residual);
    const tp=vr.slice(0,Math.max(5,Math.ceil(vr.length*.2))).map(r=>[r.a,r.b]);
    const ap=allPairs(),ex=shuffle(ap).slice(0,Math.min(5,ap.length));
    const seen=new Set(),mg=[];[...tp,...ex].forEach(p=>{const k=Math.min(p[0],p[1])+'-'+Math.max(p[0],p[1]);if(!seen.has(k)){seen.add(k);mg.push(p);}});return mg;}
  return allPairs();}

// ============================================================
// TEST
// ============================================================
function startTest(){const pt=document.getElementById('pairType').value;testMode=document.getElementById('testMode').value;refEl=+document.getElementById('refEl').value;
  if(pt==='manual')return;let p;
  if(pt==='full')p=allPairs();else if(pt==='convergence')p=getConvPairs(false);else if(pt==='conv_fast')p=getConvPairs(true);else p=allPairs();
  testPairs=randAB(shuffle(p));testIdx=0;undoSt=[];testAct=true;curPlayed=false;compCnt=0;
  convRnd=(pt==='convergence'||pt==='conv_fast')?1:0;tStart=Date.now();
  document.getElementById('startBtn').disabled=true;document.getElementById('stopTBtn').disabled=false;
  document.getElementById('testArea').style.display='block';document.getElementById('exclDlg').classList.add('hidden');
  if(convRnd>0){const ri=document.getElementById('roundInfo');ri.textContent=`${t('round')} ${convRnd} – ${testPairs.length} ${t('comp')}`;ri.classList.remove('hidden');}
  else document.getElementById('roundInfo').classList.add('hidden');
  startTmr();showMode();showCurPair();}
function endTest(){stopAll();testAct=false;document.getElementById('startBtn').disabled=false;document.getElementById('stopTBtn').disabled=true;document.getElementById('testArea').style.display='none';document.getElementById('exclDlg').classList.add('hidden');stopTmr();}
function showMode(){const j=testMode==='judgment';document.getElementById('jdgC').style.display=j?'':'none';document.getElementById('balC').style.display=j?'none':'';}
function showCurPair(){
  if(testIdx>=testPairs.length){if(convRnd>0)return nextConvRnd();endTest();switchTab('results');renderResults();return;}
  const[a,b]=testPairs[testIdx];curA=a;curB=b;
  document.getElementById('progLbl').textContent=`${t('comp')} ${testIdx+1} ${t('of')} ${testPairs.length}${convRnd>0?` (${t('round')} ${convRnd})`:''}`;
  document.getElementById('tAL').innerHTML=`<span class="aba-label">A (Ref)</span>E${dEN(a)}`;
  document.getElementById('tBL').innerHTML=`<span class="aba-label">B (Slider)</span>E${dEN(b)}`;
  document.getElementById('pairF').textContent=`${Math.round(freqs[a])} Hz vs. ${Math.round(freqs[b])} Hz`;
  if(testMode==='balance'){const ex=bRes.find(r=>(r.a===a&&r.b===b)||(r.a===b&&r.b===a));curBase=ex?((ex.a===a)?ex.offset:-ex.offset):0;
    rstSlR();document.getElementById('balSl').value=0;document.getElementById('balV').textContent='0.0 dB';updBalAbs(0);}
  curPlayed=false;updUndo();playCur();}
function playCur(){if(testIdx>=testPairs.length)return;stopAll();isPlay=true;
  if(testMode==='balance')playSeq(curA,curB,curBase+parseFloat(document.getElementById('balSl').value));
  else playSeq(curA,curB,0);curPlayed=true;}
function recJdg(r){if(!testAct||testIdx>=testPairs.length||!curPlayed)return;const a=curA,b=curB,ne={a,b,result:r,timestamp:Date.now()};
  const ei=jRes.findIndex(x=>(x.a===a&&x.b===b)||(x.a===b&&x.b===a));
  if(ei>=0){undoSt.push({t:'j',a:'r',e:ne,p:{...jRes[ei]}});jRes[ei]=ne;}else{undoSt.push({t:'j',a:'a',e:ne});jRes.push(ne);}
  testIdx++;compCnt++;updUndo();showCurPair();}
function recBal(){if(!testAct||testIdx>=testPairs.length)return;const a=curA,b=curB,tot=curBase+parseFloat(document.getElementById('balSl').value);
  const ne={a,b,offset:tot,timestamp:Date.now()};
  const ei=bRes.findIndex(x=>(x.a===a&&x.b===b)||(x.a===b&&x.b===a));
  if(ei>=0){undoSt.push({t:'b',a:'r',e:ne,p:{...bRes[ei]}});bRes[ei]=ne;}else{undoSt.push({t:'b',a:'a',e:ne});bRes.push(ne);}
  testIdx++;compCnt++;updUndo();showCurPair();}
function undoL(){if(!testAct||!undoSt.length||testIdx<=0)return;stopAll();testIdx--;compCnt=Math.max(0,compCnt-1);
  const u=undoSt.pop();if(u.t==='j'){if(u.a==='a'){const i=jRes.findIndex(x=>x.timestamp===u.e.timestamp);if(i>=0)jRes.splice(i,1);}else{const i=jRes.findIndex(x=>x.a===u.e.a&&x.b===u.e.b);if(i>=0)jRes[i]=u.p;}}
  else{if(u.a==='a'){const i=bRes.findIndex(x=>x.timestamp===u.e.timestamp);if(i>=0)bRes.splice(i,1);}else{const i=bRes.findIndex(x=>x.a===u.e.a&&x.b===u.e.b);if(i>=0)bRes[i]=u.p;}}
  updUndo();showCurPair();}
function updUndo(){document.getElementById('undoBtn').disabled=(testIdx<=0||!undoSt.length);}
function nextConvRnd(){const{residuals}=compWLS();const act=new Set(actEl());
  const vr=residuals.filter(r=>act.has(r.a)&&act.has(r.b));const mx=vr.length?Math.max(...vr.map(r=>r.residual)):0;
  if(mx<1){endTest();switchTab('results');renderResults();return;}convRnd++;
  const sr=[...vr].sort((a,b)=>b.residual-a.residual);const tp=sr.slice(0,Math.max(5,Math.ceil(sr.length*.2))).map(r=>[r.a,r.b]);
  const ap=allPairs(),ex=shuffle(ap).slice(0,Math.min(Math.max(3,Math.floor(ap.length*.1)),8));
  const seen=new Set(),mg=[];[...tp,...ex].forEach(p=>{const k=Math.min(p[0],p[1])+'-'+Math.max(p[0],p[1]);if(!seen.has(k)){seen.add(k);mg.push(p);}});
  testPairs=randAB(shuffle(mg));testIdx=0;undoSt=[];
  document.getElementById('roundInfo').textContent=`${t('round')} ${convRnd} – ${mg.length} (max res: ${mx.toFixed(1)} dB)`;document.getElementById('roundInfo').classList.remove('hidden');showCurPair();}
function showExclDlg(){if(!testAct||testIdx>=testPairs.length)return;stopAll();
  document.getElementById('exclInfo').textContent=`E${dEN(curA)} (${Math.round(freqs[curA])} Hz) vs. E${dEN(curB)} (${Math.round(freqs[curB])} Hz)`;
  document.getElementById('exclA').textContent=`E${dEN(curA)} ${t('bExcl')}`;document.getElementById('exclB').textContent=`E${dEN(curB)} ${t('bExcl')}`;
  document.getElementById('exclA').onclick=()=>doExcl(curA);document.getElementById('exclB').onclick=()=>doExcl(curB);
  document.getElementById('exclDlg').classList.remove('hidden');}
function doExcl(i){elSt[i]='excluded';elExDur[i]=Date.now();const rem=testPairs.slice(testIdx).filter(([a,b])=>a!==i&&b!==i);
  testPairs=[...testPairs.slice(0,testIdx),...rem];document.getElementById('exclDlg').classList.add('hidden');buildFreqTable();
  document.getElementById('roundInfo').textContent=`E${dEN(i)} ${t('exclDuring')}. ${testPairs.length-testIdx} ${t('pairsRem')}.`;document.getElementById('roundInfo').classList.remove('hidden');
  if(testIdx>=testPairs.length){endTest();switchTab('results');renderResults();}else showCurPair();}
function updBalAbs(sv){const ae=document.getElementById('balAbs'),ew=document.getElementById('extWrap');
  if(curBase!==0){const tot=curBase+sv;ae.textContent=`${t('total')}: ${tot>=0?'+':''}${tot.toFixed(1)} dB (${t('prev')}: ${curBase>=0?'+':''}${curBase.toFixed(1)} dB)`;ae.style.display='';}else ae.style.display='none';
  const s=document.getElementById('balSl');ew.style.display=(!slExt&&Math.abs(parseFloat(s.value))>=parseFloat(s.max)-.5)?'':'none';}
function rstSlR(){const s=document.getElementById('balSl');slExt=false;s.min='-20';s.max='20';s.step='0.1';document.getElementById('extWrap').style.display='none';}
function extSlR(){document.getElementById('balSl').min='-40';document.getElementById('balSl').max='40';slExt=true;document.getElementById('extWrap').style.display='none';}
function startTmr(){tStart=Date.now();tInt=setInterval(updTmr,1000);updTmr();}
function stopTmr(){if(tInt){clearInterval(tInt);tInt=null;}}
function updTmr(){const e=Math.floor((Date.now()-tStart)/1000);document.getElementById('timerD').textContent=`${Math.floor(e/60)}:${String(e%60).padStart(2,'0')}`;}
function playManPair(){const a=parseInt(document.getElementById('manA').value),b=parseInt(document.getElementById('manB').value);if(a===b)return;
  const[pa,pb]=Math.random()<.5?[a,b]:[b,a];testAct=true;testPairs=[[pa,pb]];testIdx=0;undoSt=[];testMode=document.getElementById('testMode').value;convRnd=0;
  document.getElementById('testArea').style.display='block';document.getElementById('stopTBtn').disabled=false;document.getElementById('roundInfo').classList.add('hidden');showMode();
  document.getElementById('progLbl').textContent=t('manComp');curA=pa;curB=pb;
  document.getElementById('tAL').innerHTML=`<span class="aba-label">A</span>E${dEN(pa)}`;document.getElementById('tBL').innerHTML=`<span class="aba-label">B</span>E${dEN(pb)}`;
  document.getElementById('pairF').textContent=`${Math.round(freqs[pa])} Hz vs. ${Math.round(freqs[pb])} Hz`;
  if(testMode==='balance'){const ex=bRes.find(r=>(r.a===pa&&r.b===pb)||(r.a===pb&&r.b===pa));curBase=ex?((ex.a===pa)?ex.offset:-ex.offset):0;rstSlR();document.getElementById('balSl').value=0;document.getElementById('balV').textContent='0.0 dB';updBalAbs(0);}
  curPlayed=false;startTmr();playCur();}
function afterManRes(){stopTmr();document.getElementById('testArea').style.display='none';testAct=false;renderResults();}

// ============================================================
// RESULTS
// ============================================================
function renderResults(){const hJ=jRes.length>0,hB=bRes.length>0;
  if(!hJ&&!hB){document.getElementById('noRes').style.display='';document.getElementById('resC').style.display='none';return;}
  document.getElementById('noRes').style.display='none';document.getElementById('resC').style.display='';
  const vol=document.getElementById('vol2').value;
  let meta=`${new Date().toLocaleString(lang==='de'?'de-DE':lang==='fr'?'fr-FR':lang==='es'?'es-ES':'en-US')}`;
  if(hB)meta+=` · ${bRes.length} bal.`;if(hJ)meta+=` · ${jRes.length} jdg.`;
  meta+=` · ${t('lblVol')} ${vol}% · Ref: E${dEN(refEl)} · ${MFR[mfr].name}`;
  document.getElementById('resMeta').innerHTML=meta;
  const th=document.getElementById('resTH'),tb=document.getElementById('resTB');th.innerHTML='';tb.innerHTML='';
  if(hB){const{levels,elRes,elWt}=compWLS();const pc=new Array(nEl).fill(0);
    const valid=bRes.filter(r=>elSt[r.a]!=='excluded'&&elSt[r.a]!=='mute'&&elSt[r.b]!=='excluded'&&elSt[r.b]!=='mute');
    for(const r of valid){pc[r.a]++;pc[r.b]++;}
    th.innerHTML=`<th>${t('thEl')}</th><th>${t('thHz')}</th><th>${t('thOff')}</th><th>${t('thMes')}</th><th>${t('thRes')}</th><th>${t('thWgt')}</th><th>${t('thStR')}</th>`;
    for(let i=0;i<nEl;i++){const tr=document.createElement('tr'),v=levels[i],ex=elSt[i]==='excluded'||elSt[i]==='mute';if(ex)tr.classList.add('excluded-row');
      let st='';if(elSt[i]){const lb={noisy:t('stNoisy'),almostMute:t('stAlmMute'),mute:t('stMute'),excluded:t('excluded')};st=lb[elSt[i]]||'';}if(elNt[i])st+=(st?' · ':'')+elNt[i];
      tr.innerHTML=`<td style="font-weight:600">${dEN(i)}</td><td>${Math.round(freqs[i])}</td><td style="color:${ex?'#999':v>.05?'#2563eb':v<-.05?'#dc2626':'#666'}">${ex?'—':(v>=0?'+':'')+v.toFixed(1)}</td><td>${pc[i]||'—'}</td><td>${elRes[i]>0?elRes[i].toFixed(1):'—'}</td><td>${ex?'—':elWt[i].toFixed(1)}</td><td style="font-size:.78em">${st}</td>`;tb.appendChild(tr);}
    drawChart(document.getElementById('resChart'),levels,elRes,true);document.getElementById('chartExpl').textContent=t('chartExplB');
  }else if(hJ){const sc=new Array(nEl).fill(0),cc=new Array(nEl).fill(0);
    for(const r of jRes){cc[r.a]++;cc[r.b]++;if(r.result==='a'){sc[r.a]++;sc[r.b]--;}else if(r.result==='b'){sc[r.b]++;sc[r.a]--;}}
    th.innerHTML=`<th>${t('thEl')}</th><th>${t('thHz')}</th><th>${t('thSc')}</th><th>${t('thComp')}</th>`;
    for(let i=0;i<nEl;i++){const tr=document.createElement('tr'),s=sc[i];tr.innerHTML=`<td style="font-weight:600">${dEN(i)}</td><td>${Math.round(freqs[i])}</td><td style="color:${s>0?'#2563eb':s<0?'#dc2626':'#666'}">${s>0?'+':''}${s}</td><td>${cc[i]||'—'}</td>`;tb.appendChild(tr);}
    drawChart(document.getElementById('resChart'),sc,null,false);document.getElementById('chartExpl').textContent=t('chartExplJ');}
  document.getElementById('resExplain').textContent=t('resExplain');}

// ============================================================
// CHART
// ============================================================
function drawChart(cv,vals,res,isOff){const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1,w=cv.parentElement.clientWidth-32,h=320;
  cv.width=w*dpr;cv.height=h*dpr;cv.style.width=w+'px';cv.style.height=h+'px';ctx.scale(dpr,dpr);
  const pad={top:30,right:20,bottom:55,left:55},pW=w-pad.left-pad.right,pH=h-pad.top-pad.bottom;ctx.clearRect(0,0,w,h);
  const act=actEl(),aV=act.map(i=>vals[i]),aR=res?act.map(i=>res[i]):null;
  let yMn,yMx;if(isOff){let am=Math.max(Math.ceil(Math.max(...aV.map(Math.abs),1)),5);if(aR)am=Math.max(am,Math.ceil(Math.max(...act.map(i=>Math.abs(vals[i])+res[i]))));yMn=-am;yMx=am;}
  else{yMn=Math.min(0,...aV);yMx=Math.max(0,...aV);const r=yMx-yMn||1;yMn-=r*.1;yMx+=r*.1;}
  const xS=pW/(act.length-1||1),tX=i=>pad.left+i*xS,tY=v=>pad.top+(yMx-v)*(pH/(yMx-yMn||1));
  ctx.strokeStyle='#e5e5e5';ctx.lineWidth=1;for(let i=0;i<=5;i++){const v=yMn+(yMx-yMn)*i/5,y=tY(v);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();ctx.fillStyle='#999';ctx.font='10px Consolas,monospace';ctx.textAlign='right';ctx.fillText(v.toFixed(1),pad.left-8,y+4);}
  if(yMn<0&&yMx>0){ctx.strokeStyle='#aaa';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(pad.left,tY(0));ctx.lineTo(w-pad.right,tY(0));ctx.stroke();ctx.setLineDash([]);}
  const bW=Math.min(xS*.6,34);
  for(let i=0;i<act.length;i++){const v=aV[i],x=tX(i)-bW/2,yZ=tY(0),yV=tY(v);ctx.fillStyle=v>.05?'#2563eb':v<-.05?'#dc2626':'#9ca3af';ctx.fillRect(x,Math.min(yZ,yV),bW,Math.abs(yV-yZ)||2);
    if(aR&&aR[i]>0){const r=aR[i],yt=tY(v+r),yb=tY(v-r);ctx.strokeStyle='#00000044';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(tX(i),yt);ctx.lineTo(tX(i),yb);ctx.stroke();ctx.beginPath();ctx.moveTo(tX(i)-4,yt);ctx.lineTo(tX(i)+4,yt);ctx.stroke();ctx.beginPath();ctx.moveTo(tX(i)-4,yb);ctx.lineTo(tX(i)+4,yb);ctx.stroke();}
    ctx.fillStyle=act[i]===refEl?'#2563eb':'#555';ctx.font=(act[i]===refEl?'bold ':'')+'10px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('E'+dEN(act[i]),tX(i),h-pad.bottom+14);
    ctx.font='8px Consolas,monospace';ctx.fillStyle='#999';ctx.fillText(Math.round(freqs[act[i]]),tX(i),h-pad.bottom+25);
    if(i===0){ctx.font='8px Segoe UI,sans-serif';ctx.fillText(t('apikal'),tX(i),h-pad.bottom+36);}
    if(i===act.length-1){ctx.font='8px Segoe UI,sans-serif';ctx.fillText(t('basal'),tX(i),h-pad.bottom+36);}}
  ctx.strokeStyle='#2563eb44';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<act.length;i++){if(i===0)ctx.moveTo(tX(i),tY(aV[i]));else ctx.lineTo(tX(i),tY(aV[i]));}ctx.stroke();
  for(let i=0;i<act.length;i++){ctx.beginPath();ctx.arc(tX(i),tY(aV[i]),3.5,0,Math.PI*2);ctx.fillStyle='#2563eb';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();}
  ctx.save();ctx.translate(12,pad.top+pH/2);ctx.rotate(-Math.PI/2);ctx.fillStyle='#666';ctx.font='10px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('dB',0,0);ctx.restore();}

function expText(){const ls=[],now=new Date().toLocaleString(lang==='de'?'de-DE':'en-US'),vol=document.getElementById('vol2').value;
  ls.push(`CI Loudness Balancing – ${now}`);ls.push(`${MFR[mfr].name} (${nEl}) | ${t('lblVol')} ${vol}% | Ref: E${dEN(refEl)}`);ls.push('');
  if(bRes.length>0){const{levels,elRes}=compWLS();ls.push(`${t('thEl')}  ${t('thHz')}      ${t('thOff')}     ${t('thRes')}   ${t('thStR')}`);ls.push('───  ────────  ─────────  ────────  ──────');
    for(let i=0;i<nEl;i++){const st=elSt[i]||'',n=elNt[i]?` (${elNt[i]})`:'',ex=st==='excluded'||st==='mute';ls.push(`${String(dEN(i)).padStart(3)}  ${String(Math.round(freqs[i])).padStart(5)} Hz  ${ex?'    —    ':((levels[i]>=0?'+':'')+levels[i].toFixed(1)+' dB').padStart(9)}  ${ex?'  —   ':(elRes[i].toFixed(1)+' dB').padStart(8)}  ${st}${n}`);}}return ls.join('\n');}
function copyRes(){navigator.clipboard.writeText(expText()).then(()=>alert(t('copyDone'))).catch(()=>{const ta=document.createElement('textarea');ta.value=expText();document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert(t('copyDone'));});}
function saveJson(){const d={version:4,date:new Date().toISOString(),manufacturer:mfr,frequencies:freqs,electrodeStatus:elSt,electrodeNotes:elNt,electrodeExcludedDuring:elExDur,referenceElectrode:refEl,paradigm:document.getElementById('paraI').value,toneDuration:parseInt(document.getElementById('dur1').value),pauseDuration:parseInt(document.getElementById('pau1').value),judgmentResults:jRes,balanceResults:bRes,volume:document.getElementById('vol2').value};
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}),a=document.createElement('a');
  const now=new Date(),ds=now.toISOString().slice(0,10),hm=String(now.getHours()).padStart(2,'0')+'-'+String(now.getMinutes()).padStart(2,'0');
  a.href=URL.createObjectURL(blob);a.download=`loudness-balancing-${ds}-${hm}.json`;a.click();}
function loadJson(file){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);
  if(d.manufacturer&&MFR[d.manufacturer]){mfr=d.manufacturer;nEl=MFR[mfr].n;document.getElementById('mfrSelect').value=mfr;}
  if(d.frequencies)freqs=d.frequencies;if(d.electrodeStatus)elSt=d.electrodeStatus;if(d.electrodeNotes)elNt=d.electrodeNotes;
  if(d.electrodeExcludedDuring)elExDur=d.electrodeExcludedDuring;if(d.referenceElectrode!==undefined)refEl=d.referenceElectrode;
  if(d.paradigm)document.getElementById('paraI').value=d.paradigm;
  if(d.toneDuration){document.getElementById('dur1').value=d.toneDuration;document.getElementById('dur2').value=d.toneDuration;}
  if(d.pauseDuration){document.getElementById('pau1').value=d.pauseDuration;document.getElementById('pau2').value=d.pauseDuration;}
  if(d.judgmentResults)jRes=d.judgmentResults;if(d.balanceResults)bRes=d.balanceResults;
  buildFreqTable();renderResults();switchTab('results');
}catch(err){alert('Error: '+err.message);}};r.readAsText(file);}
function clearRes(){if(!confirm(t('delConfirm')))return;jRes=[];bRes=[];renderResults();}

function exportEasyEffects(){if(bRes.length===0){alert(t('plNoData'));return;}
  const{levels}=compWLS();const bands=[];
  for(let i=0;i<nEl;i++){const hd=bRes.some(r=>(r.a===i||r.b===i)&&elSt[r.a]!=='excluded'&&elSt[r.a]!=='mute'&&elSt[r.b]!=='excluded'&&elSt[r.b]!=='mute');
    if(!hd)continue;const f=freqs[i],g=-levels[i];
    let fL,fH;if(i===0){fL=f*f/(freqs[1]||f);fH=freqs[1]||f;}else if(i===nEl-1){fL=freqs[i-1];fH=f*f/freqs[i-1];}else{fL=freqs[i-1];fH=freqs[i+1];}
    const bwOct=Math.log2(Math.sqrt(f*fH))-Math.log2(Math.sqrt(fL*f));const q=f/(f*(Math.pow(2,bwOct/2)-Math.pow(2,-bwOct/2)));
    bands.push({frequency:f,gain:parseFloat(g.toFixed(1)),q:parseFloat(q.toFixed(2)),type:'Bell'});}
  const preset={output:{'equalizer#0':{bypass:false,input_gain:0,output_gain:0,num_bands:bands.length}},};
  bands.forEach((b,i)=>{preset.output['equalizer#0'][`band${i}`]={frequency:b.frequency,gain:b.gain,mode:'APO (DR)',q:b.q,type:b.type};});
  const blob=new Blob([JSON.stringify(preset,null,2)],{type:'application/json'}),a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='ci-correction-easyeffects.json';a.click();}

// PLAYER
// ============================================================
let pCtx=null,pBuf=null,pSrc=null,pGain=null,pEqF=[],pMapNode=null,pPlaying=false,pOff=0,pT0=0;
function gPC(){if(!pCtx)pCtx=new(window.AudioContext||window.webkitAudioContext)();if(pCtx.state==='suspended')pCtx.resume();return pCtx;}
document.getElementById('plAudio').addEventListener('change',async function(e){const f=e.target.files[0];if(!f)return;
  try{const c=gPC(),buf=await f.arrayBuffer();pBuf=await c.decodeAudioData(buf);
    if(pBuf.numberOfChannels>1){const m=c.createBuffer(1,pBuf.length,pBuf.sampleRate),md=m.getChannelData(0);for(let s=0;s<pBuf.length;s++){let sm=0;for(let ch=0;ch<pBuf.numberOfChannels;ch++)sm+=pBuf.getChannelData(ch)[s];md[s]=sm/pBuf.numberOfChannels;}pBuf=m;}
    document.getElementById('plTot').textContent=pFmt(pBuf.duration);document.getElementById('plCtrl').style.display='';
    pBuildEQ();pDrawEQ();pBuildTbl();document.getElementById('plEqViz').style.display='';
  }catch(err){alert('Error: '+err.message);}});
function pCompQ(i){let fL,fH;if(i===0){fL=freqs[0]*freqs[0]/(freqs[1]||freqs[0]);fH=freqs[1]||freqs[0];}else if(i===nEl-1){fL=freqs[i-1];fH=freqs[i]*freqs[i]/freqs[i-1];}else{fL=freqs[i-1];fH=freqs[i+1];}const bw=Math.log2(Math.sqrt(freqs[i]*fH))-Math.log2(Math.sqrt(fL*freqs[i]));return freqs[i]/(freqs[i]*(Math.pow(2,bw/2)-Math.pow(2,-bw/2)));}
function pBuildEQ(){const c=gPC();pEqF.forEach(f=>f.disconnect());pEqF=[];
  if(!pGain){pGain=c.createGain();pGain.gain.value=parseInt(document.getElementById('plVol').value)/100;pGain.connect(c.destination);}
  const{levels}=compWLS();const eqOn=document.getElementById('plEqOn').checked,str=parseInt(document.getElementById('plStr').value)/100;
  const nhSim=document.getElementById('plNHSim').checked;
  for(let i=0;i<nEl;i++){const f=c.createBiquadFilter();f.type='peaking';f.frequency.value=freqs[i];f.Q.value=pCompQ(i);
    const hd=bRes.some(r=>(r.a===i||r.b===i)&&elSt[r.a]!=='excluded'&&elSt[r.a]!=='mute'&&elSt[r.b]!=='excluded'&&elSt[r.b]!=='mute');
    if(hd&&eqOn){f.gain.value=nhSim?levels[i]*str:-levels[i]*str;}else{f.gain.value=0;}pEqF.push(f);}
  for(let i=0;i<pEqF.length-1;i++)pEqF[i].connect(pEqF[i+1]);
  pBuildMapNode();}
function pBuildMapNode(){const c=gPC();if(pMapNode){pMapNode.disconnect();pMapNode=null;}
  if(!document.getElementById('plMapOn').checked)return;
  const cv=parseInt(document.getElementById('plMaplaw').value)||500;if(cv<=0)return;
  const ws=c.createWaveShaper();const n=4096,curve=new Float32Array(n);
  for(let i=0;i<n;i++){const x=(i/(n-1))*2-1;// input -1 to 1
    const xn=(x+1)/2;// 0 to 1
    const yn=Math.log(1+cv*xn)/Math.log(1+cv);
    curve[i]=yn*2-1;}
  ws.curve=curve;ws.oversample='4x';pMapNode=ws;}
function pUpdEQ(){const{levels}=compWLS();const eqOn=document.getElementById('plEqOn').checked,str=parseInt(document.getElementById('plStr').value)/100;
  const nhSim=document.getElementById('plNHSim').checked;
  for(let i=0;i<pEqF.length;i++){const hd=bRes.some(r=>(r.a===i||r.b===i)&&elSt[r.a]!=='excluded'&&elSt[r.a]!=='mute'&&elSt[r.b]!=='excluded'&&elSt[r.b]!=='mute');
    if(hd&&eqOn){pEqF[i].gain.value=nhSim?levels[i]*str:-levels[i]*str;}else{pEqF[i].gain.value=0;}}
  pBuildMapNode();pDrawEQ();pBuildTbl();}
function pToggle(){if(!pBuf)return;if(pCtx.state==='suspended')pCtx.resume();if(pPlaying)pPause();else pPlay();}
function pPlay(){if(pSrc){try{pSrc.stop();}catch(e){}}const c=gPC();pSrc=c.createBufferSource();pSrc.buffer=pBuf;
  // Chain: source -> [maplaw] -> eq filters -> gain -> destination
  let firstNode=pEqF.length>0?pEqF[0]:pGain;
  let lastEq=pEqF.length>0?pEqF[pEqF.length-1]:null;
  if(pMapNode){pSrc.connect(pMapNode);pMapNode.connect(firstNode);}else{pSrc.connect(firstNode);}
  if(lastEq)lastEq.connect(pGain);
  pSrc.onended=function(){if(pPlaying){pPlaying=false;pOff=0;pUpdBtn();pUpdTL();}};
  pSrc.start(0,pOff);pT0=c.currentTime-pOff;pPlaying=true;pUpdBtn();requestAnimationFrame(pTick);}
function pPause(){if(pSrc){pSrc.onended=null;try{pSrc.stop();}catch(e){}}pOff=pCtx.currentTime-pT0;if(pOff>pBuf.duration)pOff=0;pPlaying=false;pUpdBtn();}
function pTick(){if(!pPlaying)return;pUpdTL();requestAnimationFrame(pTick);}
function pUpdTL(){if(!pBuf)return;const c=pPlaying?pCtx.currentTime-pT0:pOff,cl=Math.min(c,pBuf.duration);document.getElementById('plCur').textContent=pFmt(cl);document.getElementById('plTL').value=(cl/pBuf.duration)*1000;}
function pUpdBtn(){document.getElementById('plPlay').textContent=pPlaying?'\u23F8':'\u25B6';}
function pFmt(s){if(!isFinite(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
function plCheck(){const h=bRes.length>0;document.getElementById('plNoD').classList.toggle('hidden',h);
  if(h){if(pEqF.length>0)pUpdEQ();else{pDrawEQ();pBuildTbl();}document.getElementById('plEqViz').style.display=bRes.length>0?'':'none';}
  document.getElementById('plMapInfo').classList.toggle('hidden',!document.getElementById('plMapOn').checked);
  document.getElementById('plNHInfo').classList.toggle('hidden',!document.getElementById('plNHSim').checked);}
document.getElementById('plPlay').addEventListener('click',pToggle);
document.getElementById('plTL').addEventListener('input',function(){if(!pBuf)return;pOff=(this.value/1000)*pBuf.duration;document.getElementById('plCur').textContent=pFmt(pOff);if(pPlaying){pPause();pPlay();}});
document.getElementById('plVol').addEventListener('input',function(){if(pGain)pGain.gain.value=this.value/100;document.getElementById('plVolL').textContent=this.value+'%';});
document.getElementById('plEqOn').addEventListener('change',pUpdEQ);
document.getElementById('plStr').addEventListener('input',function(){document.getElementById('plStrL').textContent=this.value+'%';pUpdEQ();});
document.querySelectorAll('.plStrBtn').forEach(b=>b.addEventListener('click',function(){const v=this.dataset.v;document.getElementById('plStr').value=v;document.getElementById('plStrL').textContent=v+'%';pUpdEQ();}));
document.getElementById('plNHSim').addEventListener('change',function(){document.getElementById('plNHInfo').classList.toggle('hidden',!this.checked);pUpdEQ();});
document.getElementById('plMapOn').addEventListener('change',function(){document.getElementById('plMapInfo').classList.toggle('hidden',!this.checked);if(pBuf){pBuildEQ();if(pPlaying){pPause();pPlay();}}});
document.getElementById('plMaplaw').addEventListener('change',function(){if(pBuf&&document.getElementById('plMapOn').checked){pBuildMapNode();if(pPlaying){pPause();pPlay();}}});

function pDrawEQ(){const cv=document.getElementById('plEqCv');if(!cv)return;const wp=cv.parentElement,dpr=window.devicePixelRatio||1,W=wp.clientWidth,H=wp.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const{levels}=compWLS();const eqOn=document.getElementById('plEqOn').checked,str=parseInt(document.getElementById('plStr').value)/100;
  const nhSim=document.getElementById('plNHSim').checked;const act=actEl();
  let mxA=1;for(const i of act){const g=Math.abs(levels[i])*str;if(g>mxA)mxA=g;}mxA=Math.ceil(mxA/2)*2+2;
  const pad={left:40,right:14,top:14,bottom:26},pW=W-pad.left-pad.right,pH=H-pad.top-pad.bottom,zY=pad.top+pH/2;
  const bW=Math.max(5,(pW/act.length)*.6),gW=pW/act.length;
  ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.setLineDash([2,4]);ctx.beginPath();ctx.moveTo(pad.left,zY);ctx.lineTo(W-pad.right,zY);ctx.stroke();
  const steps=Math.min(4,Math.floor(mxA/2));
  for(let s=1;s<=steps;s++){const dB=s*(mxA/steps),yO=(dB/mxA)*(pH/2);ctx.beginPath();ctx.moveTo(pad.left,zY-yO);ctx.lineTo(W-pad.right,zY-yO);ctx.stroke();ctx.beginPath();ctx.moveTo(pad.left,zY+yO);ctx.lineTo(W-pad.right,zY+yO);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#999';ctx.font='9px Consolas,monospace';ctx.textAlign='right';ctx.fillText('+'+dB.toFixed(0),pad.left-4,zY-yO+3);ctx.fillText('-'+dB.toFixed(0),pad.left-4,zY+yO+3);ctx.setLineDash([2,4]);}
  ctx.setLineDash([]);ctx.fillStyle='#999';ctx.font='9px Consolas,monospace';ctx.textAlign='right';ctx.fillText('0',pad.left-4,zY+3);
  for(let j=0;j<act.length;j++){const i=act[j],x=pad.left+j*gW+(gW-bW)/2;
    const hd=bRes.some(r=>(r.a===i||r.b===i)&&elSt[r.a]!=='excluded'&&elSt[r.a]!=='mute'&&elSt[r.b]!=='excluded'&&elSt[r.b]!=='mute');
    let ag=hd&&eqOn?(nhSim?levels[i]*str:-levels[i]*str):0;const bH=(Math.abs(ag)/mxA)*(pH/2),y=ag>=0?zY-bH:zY;
    ctx.fillStyle=!hd?'#ccc':ag>=0?'#16a34a':'#dc2626';if(bH>.5)ctx.fillRect(x,y,bW,bH);else{ctx.fillStyle='#ccc';ctx.fillRect(x,zY-.5,bW,1);}
    ctx.fillStyle='#666';ctx.font='8px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('E'+dEN(i),pad.left+j*gW+gW/2,H-pad.bottom+10);
    ctx.font='7px Consolas,monospace';ctx.fillStyle='#999';ctx.fillText(freqs[i]>=1000?(freqs[i]/1000).toFixed(1)+'k':freqs[i],pad.left+j*gW+gW/2,H-pad.bottom+20);}}
function pBuildTbl(){const{levels}=compWLS();const eqOn=document.getElementById('plEqOn').checked,str=parseInt(document.getElementById('plStr').value)/100;
  const nhSim=document.getElementById('plNHSim').checked;
  const h=document.getElementById('plEqH'),lv=document.getElementById('plEqLv'),gn=document.getElementById('plEqGn');
  h.innerHTML='<th></th>';lv.innerHTML='<td style="color:var(--text-muted);font-size:.78em">Pegel</td>';gn.innerHTML='<td style="color:var(--text-muted);font-size:.78em">Gain</td>';
  for(let i=0;i<nEl;i++){h.innerHTML+=`<th>E${dEN(i)}</th>`;
    const hd=bRes.some(r=>(r.a===i||r.b===i)&&elSt[r.a]!=='excluded'&&elSt[r.a]!=='mute'&&elSt[r.b]!=='excluded'&&elSt[r.b]!=='mute');
    if(!hd){lv.innerHTML+='<td style="opacity:.4">—</td>';gn.innerHTML+='<td style="opacity:.4">—</td>';continue;}
    const v=levels[i];lv.innerHTML+=`<td style="color:${v>.05?'#2563eb':v<-.05?'#dc2626':'#666'}">${v>=0?'+':''}${v.toFixed(1)}</td>`;
    const g=eqOn?(nhSim?v*str:-v*str):0;gn.innerHTML+=`<td style="color:${g>.05?'#16a34a':g<-.05?'#dc2626':'#666'}">${g>=0?'+':''}${g.toFixed(1)}</td>`;}}
window.addEventListener('resize',()=>{if(bRes.length>0){pDrawEQ();if(document.getElementById('resC').style.display!=='none')renderResults();}});
