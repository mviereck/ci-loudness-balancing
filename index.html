<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI Sound Balancing Tool</title>
<style>
:root{--bg:#f8f7f4;--surface:#fff;--border:#d4d0c8;--text:#1a1a1a;--text-muted:#666;--accent:#2563eb;--accent-hover:#1d4ed8;--accent-light:#dbeafe;--danger:#dc2626;--success:#16a34a;--warning:#d97706;--font:'Segoe UI',system-ui,-apple-system,sans-serif;--mono:'Consolas','Menlo',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:20px}
h1{font-size:1.4em;font-weight:600;margin-bottom:4px}
.header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.subtitle{color:var(--text-muted);font-size:.9em;margin-bottom:20px}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border);flex-wrap:wrap}
.tab{padding:10px 16px;border:none;background:none;cursor:pointer;font-size:.92em;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;font-family:var(--font);transition:color .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.panel{display:none}.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card h2{font-size:1.05em;font-weight:600;margin-bottom:12px}
.card h3{font-size:.95em;font-weight:600;margin-bottom:8px;color:var(--text-muted)}
.freq-table{width:100%;border-collapse:collapse;font-size:.86em}
.freq-table th,.freq-table td{padding:4px 5px;text-align:center;border-bottom:1px solid var(--border)}
.freq-table th{background:var(--bg);font-weight:600;font-size:.8em;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted)}
.freq-table input[type="number"]{width:70px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.88em}
.freq-table select{padding:2px 3px;border:1px solid var(--border);border-radius:4px;font-size:.78em;font-family:var(--font)}
.freq-table input[type="text"]{width:100px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:.8em}
.pbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:.85em;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.pbtn:hover{background:var(--accent-light);border-color:var(--accent)}
.pbtn.active{background:var(--accent-light);border-color:var(--accent)}
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;font-family:var(--font);font-size:.92em;transition:all .15s;min-height:40px}
.btn:hover{background:var(--bg)}.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover{background:var(--accent-hover)}
.btn-large{padding:12px 28px;font-size:1.05em;min-height:48px}.btn:disabled{opacity:.4;cursor:default}
button:disabled{opacity:.4;cursor:not-allowed !important;pointer-events:none}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:4px 10px;font-size:.82em;min-height:28px;border-radius:4px}
.controls-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.control-group{display:flex;align-items:center;gap:6px}
.control-group label{font-size:.85em;color:var(--text-muted);white-space:nowrap}
.control-group input[type="range"]{width:110px}
.control-group input[type="number"]{width:65px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.88em}
.control-group select{padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-family:var(--font);font-size:.88em;background:var(--surface)}
.test-display{text-align:center;padding:24px 16px}
.pair-freq{color:var(--text-muted);margin-bottom:8px}
.progress-label{color:var(--text-muted);font-size:.9em}
.judgment-buttons{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.judgment-buttons .btn{min-width:130px;font-size:1em}
.balance-slider-wrap{margin:16px auto;max-width:400px}
.balance-slider-wrap input[type="range"]{width:100%;margin:8px 0}
.balance-value{font-family:var(--mono);font-size:1.15em;font-weight:600;text-align:center}
.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:16px}
canvas{width:100%;height:auto}
.results-table{width:100%;border-collapse:collapse;font-size:.86em;font-family:var(--mono)}
.results-table th,.results-table td{padding:5px 8px;text-align:center;border-bottom:1px solid var(--border)}
.results-table th{background:var(--bg);font-family:var(--font);font-weight:600;font-size:.8em;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted)}
.kbd{display:inline-block;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:var(--bg);font-family:var(--mono);font-size:.78em;line-height:1.4}
.hidden{display:none}
.pair-indicator{display:inline-flex;gap:16px;font-size:1.5em;font-weight:700;margin:8px 0;align-items:center}
.pair-indicator .tone-a,.pair-indicator .tone-b{padding:6px 20px;border-radius:8px}
.pair-indicator .tone-a{background:#dbeafe;color:#1e40af}.pair-indicator .tone-b{background:#fef3c7;color:#92400e}
.pair-indicator .playing{outline:3px solid var(--accent);outline-offset:2px}
.warning-bar{background:#fef3c7;color:var(--warning);padding:8px 14px;border-radius:6px;margin-bottom:10px;font-size:.88em;line-height:1.5}
.round-info{background:#f0fdf4;color:var(--success);padding:8px 14px;border-radius:6px;margin-bottom:10px;font-size:.88em}
.info-box{background:var(--accent-light);color:var(--accent);padding:10px 14px;border-radius:6px;margin-bottom:10px;font-size:.85em;line-height:1.5}
.excluded-row{opacity:.4}
.aba-label{font-size:.65em;font-weight:400;color:var(--text-muted);display:block}
.timer-display{font-family:var(--mono);font-size:.85em;color:var(--text-muted)}
.el-extra{font-size:.7em;color:var(--text-muted);font-weight:400}
.lang-select{padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:.85em;background:var(--surface);font-family:var(--font)}
select:disabled{opacity:.4;cursor:not-allowed}
.explain{font-size:.82em;color:var(--text-muted);line-height:1.5;margin-top:8px;padding:10px;background:var(--bg);border-radius:6px;border-left:3px solid var(--accent)}
.explain-warn{border-left-color:var(--warning)}
.lv-grid{display:grid;grid-template-columns:auto 1fr auto auto;gap:3px 8px;align-items:center;font-size:.88em}
.lv-grid .lv-lbl{font-weight:600;white-space:nowrap;text-align:right;min-width:60px;font-size:.85em;cursor:pointer}
.lv-bar-wrap{height:18px;background:#e5e7eb;border-radius:3px;position:relative;cursor:pointer;min-width:100px}
.lv-bar{height:100%;border-radius:3px;position:absolute;top:0}
.lv-bar.pos{background:#2563eb;left:50%}.lv-bar.neg{background:#dc2626;right:50%}
.lv-grid .lv-val{font-family:var(--mono);font-size:.88em;min-width:55px;text-align:right}
.lv-row{display:contents;cursor:pointer}.lv-row.lv-focus .lv-lbl{color:var(--accent)}.lv-row.lv-focus .lv-bar-wrap{outline:2px solid var(--accent);outline-offset:1px;border-radius:3px}
.lv-num{width:62px;padding:2px 4px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.86em}
.pr-tbl{width:100%;border-collapse:collapse;font-size:.86em}
.pr-tbl td{padding:5px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.pr-tbl td:first-child{width:28px;text-align:center}
.pr-tbl .pr-name{font-weight:600;white-space:nowrap;min-width:80px}
.pr-tbl .pr-param{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pr-tbl .pr-param label{font-size:.82em;color:var(--text-muted);white-space:nowrap}
.pr-tbl .pr-param select,.pr-tbl .pr-param input[type="number"]{padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:.86em}
.pr-tbl .pr-param select{font-family:var(--font)}
.pr-tbl .pr-param input[type="number"]{width:62px;text-align:center}
.pr-row-off{opacity:.45}
.modal-overlay{display:none;position:fixed;inset:0;background:#0006;z-index:999;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;min-width:320px;max-width:90vw;box-shadow:0 8px 32px #0004;text-align:center}
.modal-box h2{font-size:1.05em;font-weight:600;margin-bottom:10px}
@media print{body{background:#fff}.tabs,.btn,.controls-row,.judgment-buttons,.balance-slider-wrap,.no-print{display:none!important}.panel{display:block!important}.card{border:1px solid #ccc;break-inside:avoid}.print-section{display:block!important}}
.side-btn-active{background:var(--success)!important;color:#fff!important;border-color:var(--success)!important}
@media(max-width:768px){.container{padding:12px}.freq-table{font-size:.76em}.freq-table input[type="number"]{width:55px}.judgment-buttons .btn{min-width:90px}.tab{padding:8px 10px;font-size:.84em}}
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>CI Sound Balancing Tool</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <select class="lang-select" id="langSelect">
        <option value="de">🇩🇪 Deutsch</option><option value="en">🇬🇧 English</option>
        <option value="fr">🇫🇷 Français</option><option value="es">🇪🇸 Español</option>
      </select>
    </div>
  </div>
  <div style="display:flex;justify-content:center;gap:10px;margin-bottom:14px">
    <button id="sideLeftBtn" data-t="sideLeft" onclick="setActiveSide('left')" style="min-width:110px;padding:10px 24px;font-size:1.05em;font-weight:700;border-radius:6px;border:2px solid var(--border);cursor:pointer;font-family:var(--font);transition:all .15s;letter-spacing:.04em">LINKS</button>
    <button id="sideRightBtn" data-t="sideRight" onclick="setActiveSide('right')" style="min-width:110px;padding:10px 24px;font-size:1.05em;font-weight:700;border-radius:6px;border:2px solid var(--border);cursor:pointer;font-family:var(--font);transition:all .15s;letter-spacing:.04em">RECHTS</button>
  </div>
  <!-- hidden select kept for JS compatibility -->
  <select id="ciSideSelect" style="display:none"><option value="left">Links</option><option value="right">Rechts</option></select>
  <p class="subtitle" id="subtitleText"></p>

  <div class="tabs">
    <button class="tab active" data-tab="intro" id="tabIntro"></button>
    <button class="tab" data-tab="setup" id="tabSetup"></button>
    <button class="tab" data-tab="test" id="tabTest"></button>
    <button class="tab" data-tab="results" id="tabResults"></button>
    <button class="tab" data-tab="levels" id="tabLevels"></button>
    <button class="tab" data-tab="player" id="tabPlayer"></button>
    <button class="tab" data-tab="balance" id="tabBalance"></button>
    <button class="tab" data-tab="file" id="tabFile"></button>
  </div>

  <!-- ===== INTRO ===== -->
  <div id="panel-intro" class="panel active">
    <div class="card">
      <h2 data-t="introTitle"></h2>
      <p style="font-size:.88em;color:var(--text-muted);margin-bottom:14px" data-t="introDesc"></p>
      <h3 data-t="introWhat"></h3>
      <div style="font-size:.86em;color:var(--text-muted);margin-bottom:14px" data-t="introFlowDesc"></div>
      <div class="explain explain-warn" data-t="introWarn"></div>
      <h3 style="margin-top:14px" data-t="introAudio"></h3>
      <p style="font-size:.86em;color:var(--text-muted)" data-t="introAudioDesc"></p>
    </div>
  </div>

  <!-- ===== SETUP ===== -->
  <div id="panel-setup" class="panel">
    <div class="card">
      <h2 id="freqTitle"></h2>
      <p style="font-size:.84em;color:var(--text-muted);margin-bottom:8px" id="freqHint"></p>
      <div id="freqDeactHintEl" class="explain explain-warn" style="margin-bottom:12px"></div>
      <div id="freqAbfHintEl" class="explain explain-warn" style="margin-bottom:12px"></div>
      <div class="controls-row">
        <div class="control-group"><label id="lblMfr"></label>
          <select id="mfrSelect"><option value="medel">MED-EL (12)</option><option value="ab">Advanced Bionics (16)</option><option value="cochlear">Cochlear (22)</option></select>
        </div>
      </div>
      <div style="overflow-x:auto"><table class="freq-table" id="freqTable"><thead><tr id="freqTH"></tr></thead><tbody id="freqTB"></tbody></table></div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn" id="sweepBtn"></button>
        <button class="btn" id="stopBtn"></button>
        <label style="margin-left:12px;font-size:.85em;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="corrToggle" checked> <span id="lblCorr"></span>
        </label>
      </div>
    </div>
    <div class="card">
      <h2 id="toneTitle"></h2>
      <div class="controls-row">
        <div class="control-group"><label id="lblVol"></label><input type="number" class="vol-num" id="vol1" value="50" min="0" max="100" step="1" style="width:55px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.88em">%</div>
        <div class="control-group"><label id="lblDur"></label><input type="number" id="dur1" value="1000" min="100" max="3000" step="50"> ms</div>
        <div class="control-group"><label id="lblPau"></label><input type="number" id="pau1" value="500" min="100" max="1000" step="50"> ms</div>
      </div>
    </div>
  </div>

  <!-- ===== TEST ===== -->
  <div id="panel-test" class="panel">
    <div class="card no-print">
      <h2 id="testTitle"></h2>
      <div class="controls-row">
        <div class="control-group"><label id="lblMode"></label>
          <select id="testMode"><option value="balance" id="optBal"></option><option value="judgment" id="optJdg"></option></select></div>
        <div class="control-group"><label id="lblRun"></label>
          <select id="pairType"><option value="full" id="optFull"></option><option value="conv_fast" id="optCF"></option><option value="manual" id="optMan"></option></select></div>
      </div>
      <div id="runExplain" class="info-box"></div>
      <div class="controls-row">
        <div class="control-group"><label id="lblRef"></label><select id="refEl"></select></div>
      </div>
      <div class="controls-row">
        <div class="control-group"><label id="lblVol2"></label><input type="number" class="vol-num" id="vol2" value="50" min="0" max="100" step="1" style="width:55px;padding:3px 5px;border:1px solid var(--border);border-radius:4px;text-align:center;font-family:var(--mono);font-size:.88em">%</div>
        <div class="control-group"><label id="lblDur2"></label><input type="number" id="dur2" value="1000" min="100" max="3000" step="50"> ms</div>
        <div class="control-group"><label id="lblPau2"></label><input type="number" id="pau2" value="500" min="100" max="1000" step="50"> ms</div>
      </div>
      <div class="controls-row">
        <label style="font-size:.85em;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="preCorrect"> <span data-t="preCorrectLabel"></span>
        </label>
      </div>
      <div id="manualSel" class="hidden" style="margin-top:8px">
        <div class="control-group"><label>A:</label><select id="manA"></select><label style="margin-left:10px">B:</label><select id="manB"></select>
          <button class="btn" id="manPlayBtn" style="margin-left:10px">&#9654;</button></div>
      </div>
      <div style="margin-top:12px" class="btn-group">
        <button class="btn btn-primary btn-large" id="startBtn"></button>
        <button class="btn btn-large" id="stopTBtn" disabled></button>
      </div>
    </div>
    <div class="card" id="testArea" style="display:none">
      <div id="roundInfo" class="round-info hidden"></div>
      <div id="testLockedInfo" class="warning-bar" style="display:none" data-t="testLockedInfo"></div>
      <div class="test-display">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span class="progress-label" id="progLbl"></span><span class="timer-display" id="timerD">0:00</span>
        </div>
        <div style="display:flex;justify-content:center;margin-bottom:4px">
          <button class="btn btn-sm" id="swapBtn" style="font-size:.85em;padding:3px 14px;min-height:28px;border-radius:4px">⇄ A↔B</button>
        </div>
        <div class="pair-indicator">
          <span class="tone-a" id="tAL"><span class="aba-label">A (Ref)</span>E1</span>
          <span style="align-self:center;font-weight:400;font-size:.55em;color:var(--text-muted)">vs.</span>
          <span class="tone-b" id="tBL"><span class="aba-label">B (Slider)</span>E2</span>
        </div>
        <div class="pair-freq" id="pairF"></div>
        <div style="margin:12px 0;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;align-items:center">
          <button class="btn btn-large" id="undoBtn" disabled>&#9664; <span data-t="bBack"></span> <span class="kbd">Z</span></button>
          <button class="btn btn-large" id="repBtn">&#9654; <span data-t="bReplay"></span> <span class="kbd" data-t="kSpace"></span></button>
          <select id="paraI" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:.84em"><option value="aba">ABA</option><option value="ab">AB</option></select>
          <button class="btn" id="exclBtn" style="color:var(--danger)">&#10005; <span data-t="bExcl"></span> <span class="kbd">X</span></button>
        </div>
        <div id="jdgC" style="display:none"><div class="judgment-buttons">
          <button class="btn btn-large" id="bAL">A <span data-t="bLoud"></span> <span class="kbd">1</span></button>
          <button class="btn btn-large" id="bEq"><span data-t="bEqual"></span> <span class="kbd">2</span></button>
          <button class="btn btn-large" id="bBL">B <span data-t="bLoud2"></span> <span class="kbd">3</span></button>
        </div></div>
        <div id="balC">
          <div class="balance-slider-wrap">
            <p style="font-size:.84em;color:var(--text-muted);margin-bottom:3px" data-t="slHint"></p>
            <input type="range" id="balSl" min="-20" max="20" step="0.1" value="0">
            <div class="balance-value" id="balV">0.0 dB</div>
            <div id="balAbs" style="font-size:.82em;color:var(--text-muted);text-align:center;margin-top:2px;display:none"></div>
            <div id="extWrap" style="text-align:center;margin-top:5px;display:none"><button class="btn btn-sm" id="extBtn" data-t="bExtend"></button></div>
          </div>
          <div style="margin-top:10px"><button class="btn btn-primary btn-large" id="confBtn"><span data-t="bConf"></span> <span class="kbd" data-t="kEnter"></span></button></div>
        </div>
      </div>
    </div>
    <div id="exclDlg" class="card hidden" style="text-align:center">
      <h2 data-t="exclTitle"></h2><p id="exclInfo" style="color:var(--text-muted);margin-bottom:14px"></p>
      <div class="btn-group" style="justify-content:center"><button class="btn btn-large" id="exclA"></button><button class="btn btn-large" id="exclB"></button><button class="btn" id="exclCanc" data-t="bCanc"></button></div>
    </div>
  </div>

  <!-- ===== BALANCE ===== -->
  <div id="panel-balance" class="panel">
    <div class="card">
      <h2 data-t="balTitle"></h2>
      <p style="font-size:.84em;color:var(--text-muted);margin-bottom:14px" data-t="balDesc"></p>
      <div class="control-group" style="margin-bottom:14px">
        <label data-t="balLabel"></label>
        <input type="range" id="balBalance" min="-12" max="12" step="0.1" value="0" style="width:100%;margin-left:8px">
      </div>
      <div class="balance-value" id="balValue">0.0 dB</div>
    </div>
  </div>

  <!-- ===== RESULTS ===== -->
  <div id="panel-results" class="panel">
    <div class="card">
      <h2 id="resTitle"></h2>
      <div id="noRes"><p style="color:var(--text-muted)" data-t="noRes"></p></div>
      <div id="resC" style="display:none">
        <div id="reliabilityText" style="margin-bottom:14px;padding:12px 16px;background:var(--accent-light);border-radius:8px;border-left:3px solid var(--accent);font-size:.88em;line-height:1.6"></div>
        <p style="font-size:.84em;color:var(--text-muted);margin-bottom:10px" id="resMeta"></p>
        <div class="chart-container"><canvas id="resChart" width="800" height="320"></canvas>
          <p id="chartExpl" style="font-size:.82em;color:var(--text-muted);margin-top:10px;line-height:1.5"></p>
        </div>
        <div style="overflow-x:auto;margin-top:14px"><table class="results-table" id="resT"><thead><tr id="resTH"></tr></thead><tbody id="resTB"></tbody></table></div>
        <div style="margin-top:16px">
          <button class="btn" id="fClearBtn" style="color:var(--danger)">&#128465; <span data-t="fClear"></span></button>
        </div>
        <div style="margin-top:24px;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:8px">
          <h3 id="glossTitleEl" style="font-size:.95em;font-weight:600;margin-bottom:12px;color:var(--text-muted)"></h3>
          <div style="font-size:.84em;line-height:1.7;display:flex;flex-direction:column;gap:8px">
            <div id="glossResiduumEl"></div>
            <div id="glossErrBarEl"></div>

introTitle:'Sound Balancing Tool for Cochlear Implant Users',
introDesc:'This tool helps CI users systematically compare the perceived loudness of their electrodes and create an individual correction curve. The goal is to set exactly equal loudness across all electrodes – the fundamental basis for good hearing with CI. This setting is optimal for music and natural sounds. Adjustments for speech intelligibility or effects such as bass boost are also possible and can be tested live.',
introWhat:'What is the workflow?',
introWhatDesc:'',
introFlow:'',
introFlowDesc:'<b>1. Side</b> – Select the side on which you wear your CI in the top right corner. If you wear two CIs, perform the measurement (Step 3) for both.<br><b>2. Implant</b> – Select your manufacturer. If known, adjust the frequency values listed for each electrode; standard values are pre-configured by default.<br><b>Important:</b> Deactivated electrodes must be marked under “Status”.<br><b>3. Measurement</b> – Start a test sequence. The tool plays pairs of tones; adjust the settings until both tones sound equally loud. Recommendation: Set the volume to a level that borders on being uncomfortable.<br><b>4. Player</b> – Load a music file and listen to the difference with and without the correction applied.<br><b>5. Levels</b> – Optional: Apply global settings (e.g., speech emphasis, bass boosting) and listen to the difference live in the player simultaneously.',
introWarn:'Use a CI program without speech filters that otherwise matches your main program. Speech filters tend to distort tones. Connect your CI via Bluetooth for the clearest possible sound..',
introAudio:'For your audiologist',
tabPlayer:'Player',tabBalance:'Stereo-Balance',
introAudioDesc:'The results can be printed out. The printout includes the measurement results, your requested corrections, and the resulting equalizer values. This allows your audiologist to see exactly where adjustments are needed.<br>Project Homepage: <a href="https://github.com/mviereck/ci-loudness-balancing" target="_blank" style="color:var(--accent)">https://github.com/mviereck/ci-loudness-balancing</a>',
freqTitle:'Manufacturer, electrode frequencies & status',lblSide:'Side:',lblMfr:'Manufacturer:',
freqHint:'Select your CI manufacturer. Mark problematic electrodes under "Status". Status "Deactivated" = electrode switched off in the CI itself, will be automatically excluded. Default Hz values from bicial; enter your own FAT values in "Hz custom". ▶ = single tone, ◼ = sustained tone.',
freqDeactHint:'<b>Important – deactivated electrodes:</b> When electrodes in your CI are deactivated, the implant redistributes the frequency range across the remaining active electrodes. The centre frequencies of all other electrodes shift as a result – the pre-set default values no longer apply.<br>Mark deactivated electrodes under “Status” and enter the current centre frequencies from your fitting. Without correct frequencies, measurements and the player equalizer will not be meaningful.',

recommend:'Recommendation: <br> - Set the volume to a level that borders on being uncomfortable.<br> - Use a Bluetooth connection for streaming if at all possible.<br> - First, perform the "Complete" test procedure, then "Convergence." Both can be repeated as often as desired.<br> - "Complete" is organized in rounds. In each round, every electrode is compared exactly once. Reliable first estimates emerge after about three or four completed rounds; dependable values only after all rounds are finished.<br> - If you stop early, the next start of "Complete" resumes where you left off.<br> - If the settings appear fundamentally sound, check the "Fine-tuning" box after running these two test variants, and then run "Convergence" again.<br> - On the "Measurement Results" tab, the quality of the adjustment can be assessed based on the colors.',

tabIntro:'Introduction',tabFreq:'Implant',tabTest:'Mesure',tabResults:'Résultats',tabFile:'Charger/Sauver',
introTitle:'CI Sound Balancing Tool',introDesc:'Cet outil aide les porteurs d\'IC à comparer systématiquement le volume perçu de leurs électrodes et à créer une courbe de correction individuelle. L\'objectif est d\'obtenir un volume exactement égal pour toutes les électrodes – la base fondamentale d\'une bonne audition avec IC. Ce réglage est optimal pour la musique et les sons naturels. Des ajustements pour la compréhension de la parole ou des effets comme le renforcement des basses sont également possibles.',introWhat:'Quel est le déroulement?',introWhatDesc:'',introFlow:'',introFlowDesc:'<b>1. Côté</b> – Sélectionnez, dans le coin supérieur droit, le côté sur lequel vous portez votre implant cochléaire. Si vous portez deux implants, effectuez la mesure (Étape 3) pour chacun d\'eux.<br><b>2. Implant</b> – Sélectionnez le fabricant de votre implant cochléaire. Si vous les connaissez, ajustez les valeurs de fréquence indiquées pour chaque électrode ; des valeurs standard sont préconfigurées par défaut.<br><b>Important :</b> Les électrodes désactivées doivent être marquées sous «Statut».<br><b>3. Mesure</b> – Lancez une séquence de test. L\'outil diffuse des paires de sons ; ajustez les réglages jusqu\'à ce que les deux sons vous semblent avoir exactement le même volume. Recommandation : réglez le volume à un niveau frisant l\'inconfort.<br><b>4. Lecteur</b> – Chargez un fichier musical et écoutez la différence, avec et sans l\'application de la correction.<br><b>5. Niveaux</b> – Facultatif : Appliquez des réglages globaux (par ex. accentuation de la parole, renforcement des basses) et écoutez simultanément la différence en direct dans le lecteur.',introWarn:'Si possible, utilisez un programme d\'implant cochléaire sans filtre vocal qui corresponde par ailleurs à votre programme principal. Les filtres vocaux ont tendance à déformer les sons. Connectez votre implant cochléaire via Bluetooth pour obtenir le son le plus clair possible.',introAudio:'Pour votre audiologiste',tabPlayer:'Player',tabBalance:'Stereo-Balance',introAudioDesc:'Les résultats peuvent être imprimés. Le document contient les résultats de mesure, vos corrections souhaitées et les valeurs égaliseur. Cela permet à votre audiologiste de voir directement où un ajustement est nécessaire.<br>Page d\'accueil du projet : <a href="https://github.com/mviereck/ci-loudness-balancing" target="_blank" style="color:var(--accent)">https://github.com/mviereck/ci-loudness-balancing</a>',
freqTitle:'Fabricant, fréquences & statut',lblMfr:'Fabricant:',freqHint:'Sélectionnez le fabricant de votre IC. Marquez les électrodes problématiques sous «Statut». Statut «Désactivé» = électrode éteinte dans l’IC lui-même, sera automatiquement exclue. Valeurs Hz par défaut selon bicial; entrez vos propres valeurs FAT dans «Hz propres». ▶ = son, ◼ = son continu.',
freqDeactHint:'<b>Important – électrodes désactivées :</b> Lorsque des électrodes de votre IC sont désactivées, l’implant redistribue la plage de fréquences sur les électrodes actives restantes. Les fréquences centrales de toutes les autres électrodes se déplacent en conséquence – les valeurs standard préconfigurées ne s’appliquent alors plus.<br>Marquez les électrodes désactivées sous «Statut» et saisissez les fréquences centrales actuelles de votre réglage. Sans fréquences correctes, les mesures et l’égaliseur du lecteur ne seront pas significatifs.',thEl:'Él.',thHzStd:'Hz standard',thHzOwn:'Hz propres',thPlay:'▶',thHold:'◼',thSt:'Statut',thNote:'Note',thExclCb:'Exclure',
stDeactivated:'Désactivé dans IC',
warnDeactivated:'Attention : tableau de fréquences probablement pas à jour. Vous avez marqué des électrode(s) comme désactivées, mais les valeurs de fréquence correspondent encore aux valeurs standard. Lorsque des électrodes sont désactivées dans l’IC, les bandes de fréquence se redistribuent sur les électrodes actives. Veuillez demander à votre audiologiste les fréquences centrales actuelles et les saisir ici – sinon les mesures et l’égaliseur ne seront pas significatifs.',resetFreq:'Réinitialiser',sweep:'▶ Balayage',stop:'■ Stop',lblCorr:'Correction',lblLevels:'Appliquer les niveaux',toneTitle:'Paramètres',lblVol:'Volume:',lblDur:'Durée:',lblPau:'Pause:',testTitle:'Paramètres de test',lblMode:'Mode:',optBal:'Équilibrage (dB)',optJdg:'Jugement',lblRun:'Type:',optFull:'Complet',optCF:'Convergence',optMan:'Manuel',lblRef:'Réf.:',lblVol2:'Volume:',lblDur2:'Durée:',lblPau2:'Pause:',preCorrectLabel:'Ajustement fin avec valeurs pré-corrigées',runExplFull:'Toutes les paires d\'électrodes sont comparées en tours. Dans chaque tour, chaque électrode est comparée exactement une fois. A et B attribués aléatoirement. Méthode la plus précise. Recommandé comme premier passage.',runExplCF:'Re-test des paires les plus incertaines. Répétable à volonté.',runExplMan:'Choisir deux électrodes.',recommend:'Recommandé: <br> - Réglez le volume à un niveau qui frôle l\'inconfort.<br> - Utilisez autant que possible une connexion Bluetooth pour la diffusion.<br> - D\'abord «Complet», puis «Convergence». Si les réglages sont fondamentalement corrects, cochez «Ajustement fin» et répétez «Convergence». Dans l\'onglet Résultats, évaluez la qualité par les couleurs. Toutes les mesures peuvent être répétées à volonté et améliorent le résultat. Les résultats sont toujours conservés.',startTest:'▶ Démarrer',stopTest:'■ Arrêter',testLockedInfo:'Impossible de quitter cet onglet pendant qu\'un test est en cours.',bBack:'Retour',bReplay:'Rejouer',kSpace:'Espace',kEnter:'Entrée',bExcl:'Exclure',bLoud:'plus fort',bLoud2:'plus fort',bEqual:'Égal',slHint:'Ajuster B. ◀▶ ±0,5 dB · Shift ±0,1 dB',bExtend:'±40 dB',bConf:'Confirmer',bCanc:'Annuler',exclTitle:'Exclure quelle électrode?',resTitle:'Résultats',noRes:'Pas de mesures.',comp:'Comparaison',of:'de',round:'Tour',chartExplB:'Volume perçu relatif. Barres d\'erreur = résidu moyen.',chartExplJ:'Score = jugements.',thOff:'Offset',thMes:'Mesures',thRes:'Résidu',thWgt:'Poids',thStR:'Statut',thSc:'Score',thComp:'Comp.',resExplain:'',apikal:'apical',basal:'basal',stNoisyHeavy:'Bruit fort',stNoisyMore:'Bruit avec ton',stNoisyLess:'Ton avec bruit',stAlmMute:'presque muet',stMute:'muet',stExcl:'exclure',total:'Total',prev:'précédent',excluded:'exclu',copyDone:'Copié.',fClear:'Supprimer résultats',delConfirmMeas:'Supprimer les mesures?',delConfirmAll:'Aussi réinitialiser?',manComp:'Manuel',pairsRem:'restantes',exclDuring:'exclu',plTitle:'Lecteur audio avec correction',plDesc:'Ce lecteur simule comment la musique ou la parole pourrait sonner si la courbe de volume IC était corrigée.',plNoData:'Pas de données.',plFile:'Fichier audio',plFileTitle:'Fichier audio',plEqOn:'Equalizer ON',plEqOff:'Equalizer OFF',plEqStr:'Force Equalizer:',plEqTitle:'Courbe Equalizer',plNotice:'Simulation de correction.',plNHLabel:'Simulation audition normale',plNHExpl:'Rend la distorsion audible pour les normo-entendants.',plMapLabel:'Simulation MAPLAW',plMapExpl:'Simulation compression MED-EL.',fileTitle:'Charger / Sauver',fileDesc:'Paramètres et résultats en JSON.',fLoad:'Charger',fSave:'Sauver',fPrint:'Imprimer',fCopy:'Copier',fExplain:'Les réglages du lecteur sont inclus dans l\'impression.',eeDesc:'Export EasyEffects pour PipeWire.',eeExport:'Exporter EasyEffects',eeHowTo:'Copier dans ~/.config/easyeffects/output/ et activer.',eePlayerHint:'L\'export utilise les réglages actuels du lecteur.',tabLevels:'Levels',lvTitle:'Levels manuels',lvExpl:'Ajuster manuellement le volume de chaque électrode. Clavier: ↑↓ changer, ←→ ±0,5 dB, Shift ±0,1 dB.',lvPreset:'Preset:',lvPrNone:'Aucun',lvPrTilt:'Tilt',lvPrPivot:'Pivot',lvPrSpeech:'Parole (SII)',lvPrScurve:'Courbe S',lvPrGauss:'Gauss',lvPrBass:'Bass Boost',lvPrHigh:'High Boost',lvPrCenter:'Centre:',lvPrWidth:'Largeur:',lvPrCutoff:'Limite:',lvPrStr:'Force:',lvReset:'Réinitialiser',lvPrExplTilt:'Pente linéaire. Correspond à Tilt MAESTRO.',lvPrExplPivot:'Centre accentué. Correspond à Pivot MAESTRO.',lvPrExplSpeech:'Pondération ANSI S3.5.',lvPrExplScurve:'Transition douce au centre.',lvPrExplGauss:'Courbe en cloche.',lvPrExplBass:'Renforcer les basses.',lvPrExplHigh:'Renforcer les aigus.',lvPresetTitle:'Presets',lvPresetBoth:'Appliquer les changements aux deux côtés',

plBothLabel:'Les deux côtés',
plMonoEQLabel:'Appliquer l\'EQ du côté actif aux deux canaux Gauche+Droite',
freqAbfHint:'<b>Important – Anatomy Based Fitting (ABF) et FAT :</b> Avec l\'Anatomy Based Fitting (ABF), d\'autres fréquences centrales s\'appliquent également aux électrodes. En général : demandez à votre audiologiste la FAT (Frequency Allocation Table) de votre IC pour connaître toutes les fréquences attribuées aux électrodes.',
recommend:'Recommandé : <br> - Réglez le volume à un niveau qui frôle l\'inconfort.<br> - Utilisez autant que possible une connexion Bluetooth.<br> - D\'abord «Complet», puis «Convergence». Les deux sont répétables à volonté.<br> - «Complet» est divisé en tours. Dans chaque tour, chaque électrode est comparée exactement une fois. Les premières estimations fiables apparaissent après trois ou quatre tours complets ; valeurs sûres seulement après tous les tours.<br> - En cas d\'arrêt, le prochain démarrage de «Complet» reprend où vous vous êtes arrêté.<br> - Si les réglages sont fondamentalement corrects, cochez «Ajustement fin» et répétez «Convergence».<br> - Dans l\'onglet Résultats, évaluez la qualité par les couleurs.',
printPlayerTitle:'Réglages lecteur',printPreCorrect:'Ajustement fin avec pré-correction: actif',reliabilityTitle:'Fiabilité des mesures',glossTitle:'Glossaire',glossResiduum:'<b>Résidu</b>: Indique l\'incohérence de vos jugements pour une électrode. Barres courtes = jugements cohérents, barres longues = jugements variables.',glossErrBar:'<b>Barres d\'erreur</b> (traits verticaux sur les barres): Indiquent la taille du résidu.',glossAnpassung:'<b>Correction</b>: De combien de dB cette électrode est réglée plus fort (+) ou moins fort (−) que la référence.',glossFarbe:'<b>Couleurs</b>: Vert = fiable, Jaune = limite, Rouge = incertain, Gris = pas encore mesuré. La couleur indique la qualité de mesure, pas l\'amplitude de la correction.',glossRef:'<b>Électrode de référence</b>: Le point fixe de la mesure. Sa correction est toujours 0 dB.',glossLS:'<b>Least Squares</b>: Méthode mathématique qui calcule simultanément les meilleures valeurs d\'offset à partir de toutes les comparaisons de paires. Les erreurs de mesure individuelles ont peu d\'influence. Les électrodes marquées comme problématiques dans l\'onglet «Implantat» contribuent avec un poids réduit.',preCorrHint:'Valeur précédente: {v} dB de l\'estimation'},

function loadSideData(side,d){const s=sideData[side];if(d.manufacturer&&MFR[d.manufacturer]){s.manufacturer=d.manufacturer;s.nEl=MFR[s.manufacturer].n;s.freqs=d.frequencies||[...MFR[s.manufacturer].freqs];}else{s.nEl=MFR[s.manufacturer].n;s.freqs=[...MFR[s.manufacturer].freqs];}
s.elSt=d.electrodeStatus||new Array(s.nEl).fill(null);s.elNt=d.electrodeNotes||new Array(s.nEl).fill('');s.elExDur=d.electrodeExcludedDuring||new Array(s.nEl).fill(null);
// Migrate old 'excluded' from elSt to elExDur
for(let _i=0;_i<s.elSt.length;_i++){if(s.elSt[_i]==='excluded'){s.elExDur[_i]=s.elExDur[_i]||Date.now();s.elSt[_i]=null;}}
// Deactivated: ensure elExDur is set
for(let _i=0;_i<s.elSt.length;_i++){if(s.elSt[_i]==='deactivated'){s.elExDur[_i]=s.elExDur[_i]||Date.now();}}
s.refEl=(d.referenceElectrode!==undefined?d.referenceElectrode:Math.floor(s.nEl/2));s.jRes=d.judgmentResults||[];s.bRes=d.balanceResults||[];s.manualLevels=d.manualLevels||new Array(s.nEl).fill(0);s.presets=d.presets||s.presets;
s.fullSweepRound=(d.fullSweepRound!==undefined?d.fullSweepRound:null);
s.fullSweepDonePairs=(d.fullSweepDonePairs!==undefined?d.fullSweepDonePairs:[]);
// Load elFreqOwn: if present use it; else split loaded freqs vs defaults
if(d.electrodeFreqOwn){s.elFreqOwn=[...d.electrodeFreqOwn];}
else{const defF=MFR[s.manufacturer].freqs;s.elFreqOwn=s.freqs.map((f,i)=>Math.round(f)===Math.round(defF[i])?null:f);}
}

const SII_THIRD_OCT={freq:[160,200,250,315,400,500,630,800,1000,1250,1600,2000,2500,3150,4000,5000,6300,8000],
  wt:[0.0083,0.0095,0.015,0.0289,0.044,0.0578,0.0653,0.0711,0.0818,0.0844,0.0882,0.0898,0.0868,0.0844,0.0771,0.0527,0.0364,0.0185]};
function siiWeightsForFreqs(fArr){
  const sf=SII_THIRD_OCT.freq,sw=SII_THIRD_OCT.wt,n=fArr.length,w=[];
  for(let i=0;i<n;i++){const f=fArr[i];if(f<=sf[0])w.push(sw[0]);
    else if(f>=sf[sf.length-1])w.push(sw[sw.length-1]);
    else{let j=0;while(j<sf.length-1&&sf[j+1]<f)j++;
      const r=(Math.log(f)-Math.log(sf[j]))/(Math.log(sf[j+1])-Math.log(sf[j]));
      w.push(sw[j]+r*(sw[j+1]-sw[j]));}}
  const mx=Math.max(...w);return w.map(v=>v/mx);}
function calcPresetCurve(pr){
  const act=allEl(),n=nEl,c=new Array(n).fill(0);if(act.length<2)return c;
  // center can be fractional (half positions like 5.5)
  const ctr=pr.center!=null?pr.center:Math.floor((act[0]+act[act.length-1])/2);
  const mn=act[0],mx=act[act.length-1],span=mx-mn||1;
  if(pr.type==='tilt'){for(const i of act)c[i]=(i-ctr)/(span/2);const mx2=Math.max(...c.map(Math.abs))||1;for(const i of act)c[i]/=mx2;return c;}
  if(pr.type==='scurve'){for(const i of act){const x=(i-ctr)/(span/2);c[i]=Math.sign(x)*Math.pow(Math.abs(x),0.6);}const mx2=Math.max(...c.map(Math.abs))||1;for(const i of act)c[i]/=mx2;return c;}
  if(pr.type==='pivot'){for(const i of act){const d=Math.abs(i-ctr)/(span/2);c[i]=-(d*d*2-1);}const mx2=Math.max(...c.map(Math.abs))||1;for(const i of act)c[i]/=mx2;return c;}
  if(pr.type==='gauss'){const sig=Math.max(0.5,pr.width||2);for(const i of act)c[i]=Math.exp(-0.5*Math.pow((i-ctr)/sig,2));const mx2=Math.max(...c.map(Math.abs))||1;for(const i of act)c[i]/=mx2;return c;}
  if(pr.type==='bassboost'){const cut=pr.cutoff!=null?pr.cutoff:Math.floor(nEl/3);for(const i of act){if(i<=cut)c[i]=1;else{const d=(i-cut)/(mx-cut||1);c[i]=Math.max(0,1-d*2);}}return c;}
  if(pr.type==='highboost'){const cut=pr.cutoff!=null?pr.cutoff:Math.floor(nEl*2/3);for(const i of act){if(i>=cut)c[i]=1;else{const d=(cut-i)/(cut-mn||1);c[i]=Math.max(0,1-d*2);}}return c;}
  if(pr.type==='speech'){const effF=Array.from({length:n},(_,i)=>effFreq(i));const w=siiWeightsForFreqs(effF);const mean=w.reduce((a,b)=>a+b,0)/n;for(let i=0;i<n;i++)c[i]=w[i]-mean;const mx2=Math.max(...c.map(Math.abs))||1;for(let i=0;i<n;i++)c[i]/=mx2;return c;}
  return c;}
function getTotalPresetCurve(){const c=new Array(nEl).fill(0);
  for(const pr of presets){if(!pr.on||pr.strength===0)continue;const pc=calcPresetCurve(pr);for(let i=0;i<nEl;i++)c[i]+=pc[i]*pr.strength;}return c;}

function gAC(){if(!audioCtx||audioCtx.state==='closed')audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function gVol(){return Math.pow(parseInt(testAct?document.getElementById('vol2').value:document.getElementById('vol1').value)/100,2);}
function gDur(){return parseInt((testAct?document.getElementById('dur2'):document.getElementById('dur1')).value)||1000;}
function gPau(){return parseInt((testAct?document.getElementById('pau2'):document.getElementById('pau1')).value)||500;}
function dB2G(d){return Math.pow(10,d/20);}
function stopAll(){if(curOsc){try{curOsc.stop();}catch(e){}curOsc=null;}if(playTO){clearTimeout(playTO);playTO=null;}sweepAct=false;isPlay=false;holdIdx=-1;updInd(-1);}

function playHold(hz,vol){stopAll();const c=gAC(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=hz;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(Math.max(0,vol),c.currentTime+.02);o.connect(g);g.connect(c.destination);curOsc=o;o.start();}
function corrG(i){if(!document.getElementById('corrToggle').checked||bRes.length===0)return 1;const{levels}=compWLS();return dB2G(-levels[i]);}

function actEl(){return[...Array(nEl).keys()].filter(i=>elExDur[i]===null&&elSt[i]!=='mute');}
function allEl(){return[...Array(nEl).keys()];}
function allPairs(){const a=actEl(),p=[];for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++)p.push([a[i],a[j]]);return p;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function randAB(p){return p.map(([x,y])=>Math.random()<.5?[x,y]:[y,x]);}
function gWt(i){const s=elSt[i];if(elExDur[i]!==null||s==='mute')return 0;if(s==='almostMute')return .05;if(s==='noisyHeavy')return .15;if(s==='noisyMore')return .4;if(s==='noisyLess')return .8;return 1;}
function compWLS(){const n=nEl,lv=new Array(n).fill(0);
  const valid=bRes.filter(r=>r.a>=0&&r.a<n&&r.b>=0&&r.b<n&&elExDur[r.a]===null&&elSt[r.a]!=='mute'&&elExDur[r.b]===null&&elSt[r.b]!=='mute');
  if(!valid.length)return{levels:lv,residuals:[],elRes:new Array(n).fill(0),elWt:new Array(n).fill(1)};
  for(let it=0;it<80;it++){const su=new Array(n).fill(0),wt=new Array(n).fill(0);
    for(const r of valid){const w=Math.min(gWt(r.a),gWt(r.b));su[r.b]+=(lv[r.a]-r.offset)*w;wt[r.b]+=w;su[r.a]+=(lv[r.b]+r.offset)*w;wt[r.a]+=w;}
    for(let i=0;i<n;i++){if(i===refEl){lv[i]=0;continue;}if(wt[i]>0)lv[i]=su[i]/wt[i];}}
  const res=valid.map(r=>({...r,residual:Math.abs(r.offset-(lv[r.a]-lv[r.b]))}));
  const ea=new Array(n).fill(null).map(()=>[]);for(const r of res){ea[r.a].push(r.residual);ea[r.b].push(r.residual);}
  const elRes=ea.map(a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0);
  return{levels:lv,residuals:res,elRes,elWt:new Array(n).fill(0).map((_,i)=>gWt(i))};}

function getConvPairs(fast){
  if(fast&&bRes.length>0){const{residuals}=compWLS();const act=new Set(actEl());
    const vr=residuals.filter(r=>act.has(r.a)&&act.has(r.b)).sort((a,b)=>b.residual-a.residual);
    const tp=vr.slice(0,Math.max(5,Math.ceil(vr.length*.2))).map(r=>[r.a,r.b]);
    const ap=allPairs(),ex=shuffle(ap).slice(0,Math.min(5,ap.length));
    const seen=new Set(),mg=[];[...tp,...ex].forEach(p=>{const k=Math.min(p[0],p[1])+'-'+Math.max(p[0],p[1]);if(!seen.has(k)){seen.add(k);mg.push(p);}});return mg;}
  return allPairs();}

  // Returns the LS-predicted offset for pair a,b (level[a]-level[b])

  const{levels}=compWLS();

}

function startTest(){const pt=document.getElementById('pairType').value;testMode=document.getElementById('testMode').value;refEl=+document.getElementById('refEl').value;

    const s=sideData[activeSide];

    if(!rrTable){p=allPairs();}
    else{
      if(s.fullSweepRound===null){s.fullSweepRound=1;s.fullSweepDonePairs=[];}
      fullSweepRound=s.fullSweepRound;fullSweepDonePairs=s.fullSweepDonePairs;
      const roundPairs=rrTable[fullSweepRound-1];
      // Nur Paare mit aktiven Elektroden
      const actSet=new Set(actEl());
      const available=roundPairs.filter(([a,b])=>actSet.has(a)&&actSet.has(b));
      const doneSet=new Set(fullSweepDonePairs.map(([a,b])=>a+'-'+b));
      const open=available.filter(([a,b])=>!doneSet.has(a+'-'+b));
      p=open;
    }
    testPairs=randAB(shuffle(p));testIdx=0;undoSt=[];testAct=true;curPlayed=false;compCnt=0;
    convRnd=0;tStart=Date.now();
    document.getElementById('startBtn').disabled=true;document.getElementById('stopTBtn').disabled=false;
    document.getElementById('testArea').style.display='block';document.getElementById('exclDlg').classList.add('hidden');
    document.getElementById('roundInfo').classList.remove('hidden');
    updFullSweepInfo();
    updateTabLockState();startTmr();showMode();showCurPair();return;
  }
  if(pt==='conv_fast')p=getConvPairs(true);else p=allPairs();
  testPairs=randAB(shuffle(p));testIdx=0;undoSt=[];testAct=true;curPlayed=false;compCnt=0;
  convRnd=(pt==='conv_fast')?1:0;tStart=Date.now();
  document.getElementById('startBtn').disabled=true;document.getElementById('stopTBtn').disabled=false;
  document.getElementById('testArea').style.display='block';document.getElementById('exclDlg').classList.add('hidden');

// Vollständig korrigierte loadOldFormat
function loadOldFormat(d, targetSide) {
  console.log('loadOldFormat aufgerufen für', targetSide);
  const s = sideData[targetSide];
  
  // Hersteller setzen
  if (d.manufacturer && MFR[d.manufacturer]) {
    s.manufacturer = d.manufacturer;
  } else {
    s.manufacturer = 'medel';
  }
  
  // Anzahl Elektroden und Frequenzen
  s.nEl = MFR[s.manufacturer].n;
  s.freqs = d.frequencies ? [...d.frequencies] : [...MFR[s.manufacturer].freqs];
  
  // Falls die geladenen Frequenzen nicht zur Elektrodenanzahl passen, korrigieren
  if (s.freqs.length !== s.nEl) {
    console.warn('Frequenzanzahl passt nicht, verwende Standard');
    s.freqs = [...MFR[s.manufacturer].freqs];
  }
  
  // Arrays initialisieren
  s.elSt = d.electrodeStatus ? [...d.electrodeStatus] : new Array(s.nEl).fill(null);
  s.elNt = d.electrodeNotes ? [...d.electrodeNotes] : new Array(s.nEl).fill('');
  s.elExDur = d.electrodeExcludedDuring ? [...d.electrodeExcludedDuring] : new Array(s.nEl).fill(null);
  
  // Migration: 'excluded' aus elSt in elExDur verschieben
  for (let i = 0; i < s.elSt.length; i++) {
    if (s.elSt[i] === 'excluded') {
      s.elExDur[i] = s.elExDur[i] || Date.now();
      s.elSt[i] = null;
    }
  }
  
  // Referenzelektrode
  s.refEl = (d.referenceElectrode !== undefined && d.referenceElectrode < s.nEl) 
    ? d.referenceElectrode 
    : Math.floor(s.nEl / 2);
  
  // Messergebnisse
  s.jRes = d.judgmentResults ? [...d.judgmentResults] : [];
  s.bRes = d.balanceResults ? [...d.balanceResults] : [];
  s.manualLevels = d.manualLevels ? [...d.manualLevels] : new Array(s.nEl).fill(0);
  
  // Presets
  if (d.presets && Array.isArray(d.presets)) {
    s.presets = d.presets;
  } else {
    const centerMap = { medel: 5.5, ab: 7.5, cochlear: 10.5 };
    const defaultCenter = centerMap[s.manufacturer] || Math.floor(s.nEl / 2);
    s.presets = PR_TYPES.map(tp => ({
      type: tp,
      on: false,
      strength: 0,
      center: defaultCenter,
      width: Math.max(2, Math.floor(s.nEl / 4)),
      cutoff: tp === 'bassboost' ? Math.floor(s.nEl / 3) : Math.floor(s.nEl * 2 / 3)
    }));
  }
  // elFreqOwn: split loaded freqs vs defaults
  if (d.electrodeFreqOwn) {
    s.elFreqOwn = [...d.electrodeFreqOwn];
  } else {
    const defF = MFR[s.manufacturer].freqs;
    s.elFreqOwn = s.freqs.map((f, i) => Math.round(f) === Math.round(defF[i] || 0) ? null : f);
  }
  // Deactivated: ensure elExDur is set
  for (let _i = 0; _i < s.elSt.length; _i++) {
    if (s.elSt[_i] === 'deactivated') { s.elExDur[_i] = s.elExDur[_i] || Date.now(); }
  }
  console.log('loadOldFormat fertig, nEl=', s.nEl, 'bRes.length=', s.bRes.length);
}

function loadJson(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);

      // Neues Format (mit sides)
      if (d.sides && d.sides.left && d.sides.right) {
        loadSideData('left', d.sides.left);
        loadSideData('right', d.sides.right);
        activeSide = SIDES.includes(d.currentSide) ? d.currentSide : 'left';
        applyLoadedData(d);
      }
      // Altes Format – Modal zur Seitenwahl anzeigen
      else {
        const overlay = document.getElementById('loadSideOverlay');
        overlay.classList.add('active');
        const doLoad = (side) => {
          overlay.classList.remove('active');
          loadOldFormat(d, side);
          activeSide = side;
          applyLoadedData(d);
        };
        document.getElementById('loadSideLeft').onclick = () => doLoad('left');
        document.getElementById('loadSideRight').onclick = () => doLoad('right');
        document.getElementById('loadSideCanc').onclick = () => {
          overlay.classList.remove('active');
          document.getElementById('fInput').value = '';
        };
      }
    } catch(err) {
      console.error('Fehler:', err);
      alert('Fehler beim Laden: ' + err.message);
    }
  };
  r.readAsText(file);
}

function exportEasyEffects(){
  const gains=getPlayerGains();const mode=getPlayerSide();

  const nhSim=document.getElementById('plNHSim').checked;
  const makeBand=(freq,gainVal,q)=>({"frequency":freq,"gain":parseFloat(gainVal.toFixed(1)),"mode":"APO (DR)","mute":false,"q":parseFloat(q.toFixed(2)),"slope":"x1","solo":false,"type":"Bell","width":4.0});
  // Gains pro Kanal ermitteln
  let leftArr, rightArr, splitChannels;
  if(mode==='both'){
    // Echtes Stereo: L und R unterschiedliche Kurven
    leftArr=gains.left||[];rightArr=gains.right||[];splitChannels=true;
  } else {
    // Mono oder eine Seite: beide Kanäle gleich
    const arr=Array.isArray(gains)?gains:[];
    leftArr=arr;rightArr=arr;splitChannels=false;
  }
  const hasGain=(arr)=>arr.some(v=>v!==0);
  if(!(hasGain(leftArr)||hasGain(rightArr))&&!plEqOn){alert(t('plNoData'));return;}
  const left={},right={};
  for(let i=0;i<nEl;i++){
    const gL=plEqOn?(nhSim?(leftArr[i]||0)*str:-(leftArr[i]||0)*str):0;
    const gR=plEqOn?(nhSim?(rightArr[i]||0)*str:-(rightArr[i]||0)*str):0;
    left['band'+i]=makeBand(effFreq(i),gL,pCompQ(i));
    right['band'+i]=makeBand(effFreq(i),gR,pCompQ(i));
  }

    if (!hasMeas) return '';
    const r = elResLocal[i];
    return (r !== undefined && r > 0) ? r.toFixed(1) + ' dB' : '';
  };

  // Formatierung für Preset-Parameter
  const formatPresetParams = (pr, mfrLocal, nElLocal, dENfn) => {
    const params = [];
    if (pr.center !== undefined) {
      const centerVal = pr.center;
      if (Number.isInteger(centerVal)) {
        params.push(`Center: E${dENfn(centerVal)}`);
      } else {
        const lower = Math.floor(centerVal);
        const upper = lower + 1;
        params.push(`Center: E${dENfn(lower)}–E${dENfn(upper)}`);
      }
    }
    if (pr.width !== undefined) params.push(`Breite: ${pr.width}`);
    if (pr.cutoff !== undefined) params.push(`Cutoff: E${dENfn(pr.cutoff)}`);
    return params.length ? ` (${params.join(', ')})` : '';
  };

  // EQ-Graphen für eine Seite zeichnen (auf einem separaten Canvas)
  const drawEqImageForSide = (side) => {
    return withSide(side, () => {
      // Temporäres Canvas erstellen
      const canvas = document.createElement('canvas');
      const width = 800, height = 300;
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      // Gains für diese Seite holen
      const gains = computeGains();
      const allE = allEl();
      const act = new Set(actEl());
      const str = parseInt(document.getElementById('plStr').value) / 100;
      const nhSim = document.getElementById('plNHSim').checked;
      const plEqOnLocal = plEqOn;

      // Maximaler Gain für Skalierung
      let maxAbs = 1;
      for (const i of allE) {
        if (!act.has(i)) continue;
        const g = Math.abs(gains[i]) * str;
        if (g > maxAbs) maxAbs = g;
      }
      maxAbs = Math.ceil(maxAbs / 2) * 2 + 2;

      const pad = { left: 40, right: 14, top: 14, bottom: 26 };
      const pW = width - pad.left - pad.right;
      const pH = height - pad.top - pad.bottom;
      const zY = pad.top + pH / 2;
      const gW = pW / allE.length;

      // Hintergrund
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 4]);

      // Horizontale Hilfslinien
      const steps = Math.min(4, Math.floor(maxAbs / 2));
      for (let s = 1; s <= steps; s++) {
        const dB = s * (maxAbs / steps);
        const yO = (dB / maxAbs) * (pH / 2);
        ctx.beginPath();
        ctx.moveTo(pad.left, zY - yO);
        ctx.lineTo(width - pad.right, zY - yO);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pad.left, zY + yO);
        ctx.lineTo(width - pad.right, zY + yO);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#999';
        ctx.font = '9px Consolas,monospace';
        ctx.textAlign = 'right';
        ctx.fillText('+' + dB.toFixed(0), pad.left - 4, zY - yO + 3);
        ctx.fillText('-' + dB.toFixed(0), pad.left - 4, zY + yO + 3);
        ctx.setLineDash([2, 4]);
      }
      ctx.setLineDash([]);
      ctx.fillStyle = '#999';
      ctx.fillText('0', pad.left - 4, zY + 3);

      // Null-Linie
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(pad.left, zY);
      ctx.lineTo(width - pad.right, zY);
      ctx.stroke();
      ctx.setLineDash([]);

      // Balken zeichnen
      for (let j = 0; j < allE.length; j++) {
        const i = allE[j];
        const x = pad.left + j * gW;
        const bW = Math.max(5, gW * 0.6);
        const isExcluded = elExDur[i] !== null;
        const isActive = act.has(i) && !isExcluded;
        let ag = 0;
        if (isActive && plEqOnLocal) {
          ag = nhSim ? gains[i] * str : -gains[i] * str;
        }
        const bH = (Math.abs(ag) / maxAbs) * (pH / 2);
        const y = ag >= 0 ? zY - bH : zY;

        if (!isActive || isExcluded) {
          ctx.fillStyle = '#d1d5db';
          ctx.fillRect(x + (gW - bW) / 2, zY - 0.5, bW, 1);
        } else {
          ctx.fillStyle = ag === 0 ? '#ccc' : (ag > 0 ? '#16a34a' : '#dc2626');
          if (bH > 0.5) {
            ctx.fillRect(x + (gW - bW) / 2, y, bW, bH);
          } else {
            ctx.fillStyle = '#ccc';
            ctx.fillRect(x + (gW - bW) / 2, zY - 0.5, bW, 1);
          }
        }

        // Beschriftung
        ctx.fillStyle = isActive ? '#666' : '#bbb';
        ctx.font = '8px Segoe UI,sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('E' + dEN(i), pad.left + j * gW + gW / 2, height - pad.bottom + 10);
        ctx.font = '7px Consolas,monospace';
        ctx.fillStyle = '#999';
        const ef_ii=effFreq(i);ctx.fillText(ef_ii >= 1000 ? (ef_ii / 1000).toFixed(1) + 'k' : ef_ii, pad.left + j * gW + gW / 2, height - pad.bottom + 20);
      }

        <tr style="border-bottom: 1px solid #ddd; ${rowStyle}">

        </tr>

    }

    // Aktive Presets mit allen Parametern
    let presetsHtml = '';
    if (data.activePresets.length > 0) {
      presetsHtml = `<p><strong>Aktive Presets:</strong> `;
      presetsHtml += data.activePresets.map(p => {

        <h3>Elektroden-Werte</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 0.85em; margin-bottom: 30px;">
          <thead>
            <tr style="background: #f0f0f0; border-bottom: 2px solid #ccc;">
              <th style="padding: 8px; text-align: left;">Elektrode</th>

    `;
  };

  const leftImage = drawEqImageForSide('left');
  const rightImage = drawEqImageForSide('right');

let pCtx=null,pBuf=null,pSourceBuf=null,pMonoBuf=null,pLeftOnlyBuf=null,pRightOnlyBuf=null,pSrc=null,pGain=null,pEqF=[],pEqFLeft=[],pEqFRight=[],pChannelSplitter=null,pChannelMerger=null,pChannelLeftGain=null,pChannelRightGain=null,pMapNode=null,pPlaying=false,pOff=0,pT0=0;

function gPC(){if(!pCtx)pCtx=new(window.AudioContext||window.webkitAudioContext)();if(pCtx.state==='suspended')pCtx.resume();return pCtx;}

function createLeftOnlyBuffer(buf){
    const c = gPC();
    const m = c.createBuffer(2, buf.length, buf.sampleRate);
    const leftData = m.getChannelData(0);
    const rightData = m.getChannelData(1);
    const srcLeft = buf.numberOfChannels > 0 ? buf.getChannelData(0) : null;
    for(let s = 0; s < buf.length; s++) {
        leftData[s] = srcLeft ? srcLeft[s] : 0;
        rightData[s] = 0;
    }
    return m;
}

function createRightOnlyBuffer(buf){
    const c = gPC();
    const m = c.createBuffer(2, buf.length, buf.sampleRate);
    const leftData = m.getChannelData(0);
    const rightData = m.getChannelData(1);
    const srcRight = buf.numberOfChannels > 1 ? buf.getChannelData(1) : (buf.numberOfChannels > 0 ? buf.getChannelData(0) : null);
    for(let s = 0; s < buf.length; s++) {
        leftData[s] = 0;
        rightData[s] = srcRight ? srcRight[s] : 0;
    }
    return m;
}

function createMonoBuffer(buf){
    const c = gPC();
    const m = c.createBuffer(2, buf.length, buf.sampleRate);
    const leftData = m.getChannelData(0);
    const rightData = m.getChannelData(1);
    for(let s = 0; s < buf.length; s++) {
        let sum = 0;
        for(let ch = 0; ch < buf.numberOfChannels; ch++) {

        }
        const val = sum / buf.numberOfChannels;
        leftData[s] = val;
        rightData[s] = val;
    }
    return m;
}

function getPlaybackBuffer(){
    const mode = getPlayerSide();
    if (!pSourceBuf) return null;
    
    switch(mode) {
        case 'left':
            if (!pLeftOnlyBuf) pLeftOnlyBuf = createLeftOnlyBuffer(pSourceBuf);
            return pLeftOnlyBuf;
        case 'right':
            if (!pRightOnlyBuf) pRightOnlyBuf = createRightOnlyBuffer(pSourceBuf);
            return pRightOnlyBuf;
        case 'both':
        case 'mono':
            if (pSourceBuf.numberOfChannels > 1) return pSourceBuf;
            if (!pMonoBuf) pMonoBuf = createMonoBuffer(pSourceBuf);
            return pMonoBuf;
        default:
            if (!pMonoBuf) pMonoBuf = createMonoBuffer(pSourceBuf);
            return pMonoBuf;
    }
}

function computeGains(){const{levels}=compWLS();const eff=getEffectiveLevels();const g=new Array(nEl).fill(0);for(let i=0;i<nEl;i++){const hd=bRes.some(r=>(r.a===i||r.b===i)&&elSt[r.a]!=='excluded'&&elSt[r.a]!=='mute'&&elSt[r.b]!=='excluded'&&elSt[r.b]!=='mute');const addMeas=plSrcMeas&&hd?levels[i]:0;const addLvls=plSrcLevels?-eff[i]:0;g[i]=addMeas+addLvls;}return g;}

else{ctx.fillStyle=ag===0?'#ccc':ag>=0?'#16a34a':'#dc2626';if(bH>.5)ctx.fillRect(x,y,bW,bH);else{ctx.fillStyle='#ccc';ctx.fillRect(x,zY-.5,bW,1);}}
ctx.fillStyle=isAct?'#666':'#bbb';ctx.font='8px Segoe UI,sans-serif';ctx.textAlign='center';ctx.fillText('E'+dEN(i),pad.left+j*gW+gW/2,H-pad.bottom+10);
ctx.font='7px Consolas,monospace';ctx.fillStyle='#999';const ef_i=effFreq(i);ctx.fillText(ef_i>=1000?(ef_i/1000).toFixed(1)+'k':ef_i,pad.left+j*gW+gW/2,H-pad.bottom+20);}}

function pBuildTbl(){let gains=getPlayerGains();if(typeof gains.left!=='undefined'){gains=gains.left;}const str=parseInt(document.getElementById('plStr').value)/100;
const nhSim=document.getElementById('plNHSim').checked;
const h=document.getElementById('plEqH'),lv=document.getElementById('plEqLv'),gn=document.getElementById('plEqGn');
h.innerHTML='<th></th>';lv.innerHTML='<td style="color:var(--text-muted);font-size:.78em">Pegel</td>';gn.innerHTML='<td style="color:var(--text-muted);font-size:.78em">Gain</td>';
for(let i=0;i<nEl;i++){h.innerHTML+=`<th>E${dEN(i)}</th>`;
const v=gains[i];lv.innerHTML+=`<td style="color:${v>.05?'#2563eb':v<-.05?'#dc2626':'#666'}">${v>=0?'+':''}${v.toFixed(1)}</td>`;
const g=plEqOn?(nhSim?v*str:-v*str):0;gn.innerHTML+=`<td style="color:${g>.05?'#16a34a':g<-.05?'#dc2626':'#666'}">${g>=0?'+':''}${g.toFixed(1)}</td>`;}}

window.addEventListener('resize',()=>{if(bRes.length>0){pDrawEQ();if(document.getElementById('resC').style.display!=='none')renderResults();}
  if(document.getElementById('panel-levels').classList.contains('active'))drawLvChart();});
</script>
